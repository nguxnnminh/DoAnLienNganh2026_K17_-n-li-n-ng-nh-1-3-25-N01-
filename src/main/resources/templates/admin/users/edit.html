<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- ================= HEADER ================= -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">

        <h1 class="text-2xl font-semibold tracking-tight">
            Chỉnh sửa khách hàng #<span th:text="${user.id}"></span>
        </h1>

        <a th:href="@{/admin/users}"
           class="text-sm text-zinc-500 dark:text-zinc-400 hover:underline transition">
            ← Quay lại danh sách
        </a>

    </div>


    <!-- ================= FORM CONTAINER ================= -->
    <div class="glass rounded-2xl p-8 border border-zinc-200 dark:border-zinc-800">

        <form th:object="${user}"
              th:action="@{/admin/users/{id}(id=${user.id})}"
              method="post"
              class="space-y-6">

            <input type="hidden" name="_method" value="PUT"/>


            <!-- ================= EMAIL ================= -->
            <div>
                <label class="block text-sm text-zinc-500 dark:text-zinc-400 mb-2">
                    Email
                </label>

                <input th:field="*{email}"
                       readonly
                       class="w-full px-4 py-3 rounded-xl
                              border border-zinc-300 dark:border-zinc-700
                              bg-zinc-100 dark:bg-zinc-900
                              text-zinc-500 dark:text-zinc-400
                              cursor-not-allowed">
            </div>


            <!-- ================= FULL NAME ================= -->
            <div>
                <label class="block text-sm text-zinc-500 dark:text-zinc-400 mb-2">
                    Họ tên
                </label>

                <input th:field="*{fullName}"
                       class="w-full px-4 py-3 rounded-xl
                              border border-zinc-300 dark:border-zinc-700
                              bg-white dark:bg-zinc-800
                              text-zinc-900 dark:text-zinc-100
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>


            <!-- ================= PHONE ================= -->
            <div>
                <label class="block text-sm text-zinc-500 dark:text-zinc-400 mb-2">
                    Số điện thoại
                </label>

                <input th:field="*{phone}"
                       class="w-full px-4 py-3 rounded-xl
                              border border-zinc-300 dark:border-zinc-700
                              bg-white dark:bg-zinc-800
                              text-zinc-900 dark:text-zinc-100
                              focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>


            <!-- ================= ADDRESS ================= -->
            <div>
                <label class="block text-sm text-zinc-500 dark:text-zinc-400 mb-2">
                    Địa chỉ
                </label>

                <textarea th:field="*{address}"
                          rows="3"
                          class="w-full px-4 py-3 rounded-xl
                                 border border-zinc-300 dark:border-zinc-700
                                 bg-white dark:bg-zinc-800
                                 text-zinc-900 dark:text-zinc-100
                                 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"></textarea>
            </div>


            <!-- ================= ROLE ================= -->
            <div>
                <label class="block text-sm text-zinc-500 dark:text-zinc-400 mb-2">
                    Vai trò
                </label>

                <select th:field="*{role}"
                        class="w-full px-4 py-3 rounded-xl
                               border border-zinc-300 dark:border-zinc-700
                               bg-white dark:bg-zinc-800
                               text-zinc-900 dark:text-zinc-100
                               focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">

                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r}">
                    </option>

                </select>
            </div>


            <!-- ================= ACTION BUTTONS ================= -->
            <div class="flex justify-end gap-4 pt-6 border-t border-zinc-200 dark:border-zinc-800">

                <a th:href="@{/admin/users}"
                   class="px-6 py-3 rounded-xl text-sm font-medium
                          border border-zinc-300 dark:border-zinc-700
                          hover:bg-zinc-100 dark:hover:bg-zinc-800
                          transition">
                    Hủy
                </a>

                <button type="submit"
                        class="px-8 py-3 rounded-xl text-sm font-medium
                               bg-black dark:bg-zinc-800
                               text-white
                               hover:bg-zinc-800 dark:hover:bg-zinc-700
                               transition">
                    Cập nhật
                </button>

            </div>

        </form>

    </div>

</div>

</html>
