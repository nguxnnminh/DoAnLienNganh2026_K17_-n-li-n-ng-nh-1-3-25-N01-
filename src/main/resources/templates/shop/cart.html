<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Cart — Nova')}">
<div th:fragment="content">
  <style>
    .cart-row {
      display: flex;
      gap: 32px;
      padding: 32px 0;
      border-bottom: 1px solid #1a1a1a;
      align-items: flex-start;
      transition: opacity .2s;
    }

    .cart-row:hover {
      opacity: .88;
    }

    .cart-img {
      width: 116px;
      height: 146px;
      object-fit: cover;
      background: #111;
      flex-shrink: 0;
    }

    .qty-input {
      width: 56px;
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #f5f5f3;
      text-align: center;
      padding: 9px 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      outline: none;
      transition: border-color .2s;
    }

    .qty-input:focus {
      border-color: #555;
    }

    .action-link {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color .2s;
    }
  </style>

  <div style="max-width:1240px; margin:0 auto; padding:64px 56px;">

    <!-- HEADER -->
    <div
      style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:52px; border-bottom:1px solid #1a1a1a; padding-bottom:28px;">
      <div>
        <p style="font-size:.6rem; letter-spacing:.42em; text-transform:uppercase; color:#444; margin-bottom:10px;">
          Review</p>
        <h1
          style="font-family:'Bebas Neue',sans-serif; font-size:4rem; letter-spacing:.06em; line-height:1; color:#f5f5f3;">
          Your Cart</h1>
      </div>
      <p style="font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:#555;">
        <span th:text="${cartItems.size()}">0</span>&nbsp;Items
      </p>
    </div>

    <!-- EMPTY -->
    <div th:if="${cartItems.isEmpty()}" style="text-align:center; padding:100px 0;">
      <p
        style="font-family:'Bebas Neue',sans-serif; font-size:4.5rem; letter-spacing:.08em; color:#1a1a1a; margin-bottom:32px;">
        Empty Bag</p>
      <a th:href="@{/products}"
        style="display:inline-block; background:#f5f5f3; color:#0a0a0a; font-size:.68rem; letter-spacing:.28em; text-transform:uppercase; text-decoration:none; padding:15px 40px; font-family:'DM Sans',sans-serif; font-weight:500; transition:background .25s;"
        onmouseover="this.style.background='#d8d8d4'" onmouseout="this.style.background='#f5f5f3'">
        Continue Shopping
      </a>
    </div>

    <!-- CONTENT -->
    <div th:unless="${cartItems.isEmpty()}"
      style="display:grid; grid-template-columns:1fr 360px; gap:64px; align-items:start;">

      <!-- ITEMS -->
      <div>
        <div th:each="item : ${cartItems}" class="cart-row">
          <img class="cart-img"
            th:src="${item.imageUrl != null and !item.imageUrl.isEmpty() ? item.imageUrl : '/images/no-image.png'}"
            alt="" />
          <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:16px;">
              <div>
                <h3
                  style="font-size:.85rem; letter-spacing:.16em; text-transform:uppercase; color:#e8e8e4; font-weight:400; margin-bottom:7px;"
                  th:text="${item.productName}"></h3>
                <p style="font-size:.65rem; letter-spacing:.14em; text-transform:uppercase; color:#555;">
                  <span th:text="${item.size}"></span>
                  <span style="margin:0 8px; color:#282828;">·</span>
                  <span th:text="${item.color}"></span>
                </p>
              </div>
              <p style="font-size:.82rem; letter-spacing:.06em; color:#888; white-space:nowrap;"
                th:text="${#numbers.formatDecimal(item.price,0,'POINT',0,'COMMA')} + ' ₫'"></p>
            </div>

            <div style="display:flex; align-items:center; gap:20px; margin-top:8px;">
              <!-- UPDATE QTY -->
              <form method="post" th:action="@{/cart/update}" style="display:flex; align-items:center; gap:10px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="variantId" th:value="${item.variantId}" />
                <input type="number" name="quantity" min="1" th:value="${item.quantity}" class="qty-input" />
                <button type="submit" class="action-link" style="color:#555;" onmouseover="this.style.color='#c0c0bc'"
                  onmouseout="this.style.color='#555'">Update</button>
              </form>
              <!-- REMOVE -->
              <form method="post" th:action="@{/cart/remove}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="variantId" th:value="${item.variantId}" />
                <button type="submit" class="action-link" style="color:#3a2020;"
                  onmouseover="this.style.color='#bf6d6d'" onmouseout="this.style.color='#3a2020'">Remove</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- SUMMARY -->
      <div style="position:sticky; top:100px; border:1px solid #1e1e1e; padding:36px;">
        <p style="font-size:.6rem; letter-spacing:.4em; text-transform:uppercase; color:#444; margin-bottom:28px;">Order
          Summary</p>

        <div style="display:flex; flex-direction:column; gap:14px; margin-bottom:26px;">
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:#666;">Subtotal</span>
            <span style="font-size:.72rem; letter-spacing:.06em; color:#999;"
              th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')} + ' ₫'"></span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:#666;">Shipping</span>
            <span style="font-size:.72rem; letter-spacing:.06em; color:#6dbf6d;">Free</span>
          </div>
        </div>

        <div style="height:1px; background:#1a1a1a; margin-bottom:26px;"></div>

        <div style="display:flex; justify-content:space-between; margin-bottom:32px;">
          <span style="font-size:.72rem; letter-spacing:.15em; text-transform:uppercase; color:#c0c0bc;">Total</span>
          <span style="font-size:1.05rem; letter-spacing:.05em; color:#f5f5f3;"
            th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')} + ' ₫'"></span>
        </div>

        <a th:href="@{/checkout}"
          style="display:block; text-align:center; background:#f5f5f3; color:#0a0a0a; font-size:.68rem; letter-spacing:.28em; text-transform:uppercase; text-decoration:none; padding:16px; font-family:'DM Sans',sans-serif; font-weight:500; transition:background .25s; margin-bottom:10px;"
          onmouseover="this.style.background='#d8d8d4'" onmouseout="this.style.background='#f5f5f3'">
          Checkout
        </a>

        <form method="post" th:action="@{/cart/clear}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit"
            style="width:100%; padding:13px; background:transparent; border:1px solid #1e1e1e; color:#444; font-family:'DM Sans',sans-serif; font-size:.64rem; letter-spacing:.22em; text-transform:uppercase; cursor:pointer; transition:all .2s;"
            onmouseover="this.style.borderColor='#333';this.style.color='#777'"
            onmouseout="this.style.borderColor='#1e1e1e';this.style.color='#444'">
            Clear Cart
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

</html>
