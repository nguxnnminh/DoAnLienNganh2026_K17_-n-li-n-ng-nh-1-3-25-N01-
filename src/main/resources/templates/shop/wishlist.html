<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Wishlist — Nova')}">
<div th:fragment="content">
  <style>
    .wish-card {
      border: 1px solid #242424;
      background: #161616;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.3s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
    }
    .wish-card:hover { border-color: #3a3a3a; transform: translateY(-2px); }
    .wish-card .wish-img-alt {
      position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 3/4;
      object-fit: cover; opacity: 0; transition: opacity 0.45s ease;
      pointer-events: none;
    }
    .wish-card:hover .wish-img-alt { opacity: 1; }

    .wish-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .wish-card-body { padding: 12px 12px 14px; }

    .wish-remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(10,10,10,0.85);
      border: 1px solid #333;
      color: #888;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      padding: 0;
    }
    .wish-remove-btn:hover { border-color: #888; color: #f5f5f3; }

  </style>

  <div class="max-w-[1400px] mx-auto px-4 md:px-8 lg:px-12 py-10 md:py-16">

    <!-- HEADER -->
    <div class="flex justify-between items-end mb-8 md:mb-12 border-b border-zinc-900 pb-6 md:pb-8">
      <div>
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-2">Account</p>
        <h1 class="font-display text-4xl md:text-6xl tracking-wide leading-none text-[#f5f5f3]">Wishlist</h1>
      </div>
      <p class="text-xs tracking-widest uppercase text-zinc-500">
        <span th:text="${#lists.size(wishlistItems)}">0</span>&nbsp;Items
      </p>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(wishlistItems)}" class="text-center py-20 md:py-28">
      <p class="font-display text-5xl md:text-7xl tracking-wide text-zinc-700 mb-3">Nothing Saved</p>
      <p class="text-xs tracking-widest uppercase text-zinc-700 mb-8">
        Browse the shop and save items you love.
      </p>
      <a th:href="@{/products}"
         class="h-11 md:h-12 px-8 bg-[#f5f5f3] text-[#0a0a0a] text-xs tracking-widest uppercase
                no-underline font-medium inline-flex items-center transition-colors duration-200 hover:bg-[#d8d8d4]">
        Browse Shop
      </a>
    </div>

    <!-- GRID -->
    <div th:unless="${#lists.isEmpty(wishlistItems)}"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">

      <div th:each="item : ${wishlistItems}" class="wish-card">

        <!-- Remove button -->
        <form th:action="@{/wishlist/{id}/remove(id=${item.product.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="wish-remove-btn" title="Remove from wishlist">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
              <path d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </form>

        <!-- Product image (links to detail) -->
        <a th:href="@{/products/{slug}(slug=${item.product.slug})}" class="block" style="position:relative; display:block;">
          <img th:src="${item.product.images != null and !item.product.images.isEmpty()
                         ? item.product.images[0].imageUrl
                         : '/images/sample.jpg'}"
               th:alt="${item.product.name}"
               class="w-full object-cover" style="aspect-ratio:3/4; display:block;" />
          <img th:if="${item.product.images != null and item.product.images.size() > 1}"
               class="wish-img-alt"
               th:src="${item.product.images[1].imageUrl}"
               th:alt="${item.product.name}" />
        </a>

        <div class="wish-card-body">
          <a th:href="@{/products/{slug}(slug=${item.product.slug})}"
             class="block text-[0.68rem] tracking-widest uppercase text-zinc-400 no-underline hover:text-[#f5f5f3] transition-colors leading-tight truncate"
             th:text="${item.product.name}">Product Name</a>

          <p class="text-[0.65rem] tracking-wide text-zinc-600 mt-1"
             th:text="${item.product.minPrice != null and item.product.minPrice.compareTo(T(java.math.BigDecimal).ZERO) > 0}
                       ? ${#numbers.formatDecimal(item.product.minPrice, 0, 'POINT', 0, 'COMMA')} + ' ₫'
                       : '—'">120.000 ₫</p>

          <a th:href="@{/products/{slug}(slug=${item.product.slug})}"
             class="mt-3 block text-center text-[0.6rem] tracking-widest uppercase text-zinc-600 border border-zinc-800 py-2 no-underline hover:border-zinc-600 hover:text-zinc-300 transition-all">
            View
          </a>
        </div>
      </div>

    </div>

  </div>
</div>
</html>
