<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- PAGE TITLE -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
        <h1 class="text-2xl font-semibold tracking-tight">
            Quản lý đơn hàng
        </h1>
    </div>


    <!-- FLASH -->
    <div th:if="${success}"
        class="glass border border-green-500/30 text-green-700 dark:text-green-400 px-5 py-4 rounded-2xl mb-6">
        <strong>Thành công:</strong>
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}"
        class="glass border border-red-500/30 text-red-700 dark:text-red-400 px-5 py-4 rounded-2xl mb-6">
        <strong>Lỗi:</strong>
        <span th:text="${error}"></span>
    </div>


    <!-- TABLE -->
    <div class="glass rounded-2xl overflow-x-auto border border-zinc-200 dark:border-zinc-800">

        <table class="w-full table-fixed text-sm text-zinc-700 dark:text-zinc-300">

            <!-- LOCK WIDTH -->
            <colgroup>
                <col style="width:10%">
                <col style="width:30%">
                <col style="width:15%">
                <col style="width:15%">
                <col style="width:15%">
                <col style="width:15%">
            </colgroup>


            <thead class="bg-zinc-100/80 dark:bg-zinc-800/80 text-zinc-500 uppercase text-xs tracking-wide">
                <tr>
                    <th class="px-6 py-5 text-left font-medium">ID</th>
                    <th class="px-6 py-5 text-left font-medium">Khách hàng</th>
                    <th class="px-6 py-5 text-right font-medium">Tổng tiền</th>
                    <th class="px-6 py-5 text-center font-medium">Trạng thái</th>
                    <th class="px-6 py-5 text-center font-medium">Ngày tạo</th>
                    <th class="px-6 py-5 text-right font-medium">Hành động</th>
                </tr>
            </thead>


            <tbody class="divide-y divide-zinc-200 dark:divide-zinc-800">


                <tr th:each="o : ${orders}" class="hover:bg-zinc-50 dark:hover:bg-zinc-800/40 transition">


                    <!-- ID -->
                    <td
                        class="px-6 py-5 whitespace-nowrap font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">
                        #<span th:text="${o.id}"></span>
                    </td>


                    <!-- CUSTOMER -->
                    <td class="px-6 py-5 truncate">

                        <div class="font-semibold tracking-tight text-zinc-900 dark:text-zinc-100"
                            th:text="${o.customerName ?: (o.user != null ? o.user.fullName : 'Khách vãng lai')}">
                        </div>

                        <div class="text-xs text-zinc-500 mt-1 truncate"
                            th:text="${o.user != null ? o.user.email : 'Guest'}">
                        </div>

                    </td>


                    <!-- TOTAL -->
                    <td class="px-6 py-5 text-right whitespace-nowrap">

                        <span class="text-lg font-semibold tracking-tight text-zinc-900 dark:text-zinc-100" th:text="${
          o.total != null 
          ? #numbers.formatDecimal(o.total,0,'POINT',0,'COMMA')
          : '-'
      }"></span> ₫

                    </td>


                    <!-- STATUS -->
                    <td class="px-6 py-5 text-center whitespace-nowrap">

                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium tracking-tight"
                            th:classappend="${
        o.status.name() == 'PENDING' ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300' :
        o.status.name() == 'PROCESSING' ? 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300' :
        o.status.name() == 'SHIPPING' ? 'bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300' :
        o.status.name() == 'COMPLETED' ? 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300' :
        'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300'
      }">

                            <span th:text="${o.status}"></span>

                        </span>

                    </td>


                    <!-- DATE -->
                    <td class="px-6 py-5 text-center whitespace-nowrap text-zinc-500">
                        <span th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                    </td>


                    <!-- ACTION -->
                    <td class="px-6 py-5 text-right whitespace-nowrap">

                        <a th:href="@{/admin/orders/{id}(id=${o.id})}"
                            class="text-blue-600 hover:underline text-sm font-medium tracking-tight">
                            Xem chi tiết →
                        </a>

                    </td>

                </tr>


                <!-- EMPTY -->
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="6" class="px-6 py-16 text-center text-zinc-500">
                        Chưa có đơn hàng nào.
                    </td>
                </tr>

            </tbody>
        </table>

    </div>

</div>

</html>
