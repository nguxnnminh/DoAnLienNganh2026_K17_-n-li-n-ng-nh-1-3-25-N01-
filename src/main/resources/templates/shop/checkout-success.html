<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Order Confirmed — Nova')}">
<div th:fragment="content">
  <div
    style="min-height:calc(100vh - 108px); display:flex; align-items:center; justify-content:center; padding:80px 24px;">
    <div style="width:100%; max-width:480px; text-align:center;">

      <!-- ICON -->
      <div
        style="width:56px; height:56px; border:1px solid #2a4a2a; display:flex; align-items:center; justify-content:center; margin:0 auto 44px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6dbf6d" stroke-width="1.5">
          <path d="M5 13l4 4L19 7" />
        </svg>
      </div>

      <p style="font-size:.6rem; letter-spacing:.45em; text-transform:uppercase; color:#444; margin-bottom:14px;">
        Confirmed</p>
      <h1
        style="font-family:'Bebas Neue',sans-serif; font-size:4rem; letter-spacing:.06em; line-height:1; color:#f5f5f3; margin-bottom:18px;">
        Order Placed</h1>
      <p style="font-size:.8rem; letter-spacing:.06em; color:#666; line-height:1.9; margin-bottom:52px;">
        Thank you for shopping with Nova.<br>Your order is being processed.
      </p>

      <!-- ORDER INFO -->
      <div style="border:1px solid #1e1e1e; padding:32px; margin-bottom:40px; text-align:left;">
        <p style="font-size:.58rem; letter-spacing:.4em; text-transform:uppercase; color:#444; margin-bottom:22px;">
          Order Details</p>
        <div style="display:flex; flex-direction:column; gap:14px;">
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:#555;">Order ID</span>
            <span style="font-size:.72rem; color:#c0c0bc;" th:text="'#' + ${order.id}"></span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:#555;">Total</span>
            <span style="font-size:.72rem; color:#c0c0bc;"
              th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')} + ' ₫'"></span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:#555;">Status</span>
            <span style="font-size:.7rem; color:#6dbf6d; letter-spacing:.1em; text-transform:uppercase;"
              th:text="${order.status}"></span>
          </div>
        </div>
      </div>

      <div style="display:flex; gap:10px; justify-content:center;">
        <a th:href="@{/my-orders}"
          style="padding:15px 28px; border:1px solid #2a2a2a; font-size:.65rem; letter-spacing:.22em; text-transform:uppercase; color:#666; text-decoration:none; transition:all .2s;"
          onmouseover="this.style.borderColor='#555';this.style.color='#c0c0bc'"
          onmouseout="this.style.borderColor='#2a2a2a';this.style.color='#666'">
          My Orders
        </a>
        <a th:href="@{/products}"
          style="padding:15px 28px; background:#f5f5f3; color:#0a0a0a; font-size:.65rem; letter-spacing:.22em; text-transform:uppercase; text-decoration:none; font-weight:500; transition:background .25s;"
          onmouseover="this.style.background='#d8d8d4'" onmouseout="this.style.background='#f5f5f3'">
          Keep Shopping
        </a>
      </div>
    </div>
  </div>
</div>

</html>
