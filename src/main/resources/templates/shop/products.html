<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Shop — Nova')}">
<div th:fragment="content">
  <style>
    .shop-card .img-wrap {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #111;
    }
    .shop-card .img-main {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .7s cubic-bezier(.22,1,.36,1);
    }
    .shop-card .img-hover {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .5s ease;
    }
    .shop-card:hover .img-main { transform: scale(1.04); }
    .shop-card:hover .img-hover { opacity: 1; }

    .filter-link {
      display: block;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      padding: 8px 0;
      border-bottom: 1px solid transparent;
      transition: color .2s;
    }
    .filter-link:hover { color: #f5f5f3; }
    .filter-link.active { color: #f5f5f3; border-bottom-color: #3a3a3a; }

    .sidebar-label {
      font-size: .58rem;
      letter-spacing: .42em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 12px;
      display: block;
    }

    .pg-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #2a2a2a;
      font-size: .7rem;
      color: #555;
      text-decoration: none;
      transition: all .2s;
    }
    .pg-btn:hover { border-color: #f5f5f3; color: #f5f5f3; }
    .pg-btn.pg-active { background: #f5f5f3; color: #0a0a0a; border-color: #f5f5f3; }

    .sort-select {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #888;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 14px;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .sort-select:hover { border-color: #444; }
    .sort-select option { background: #0a0a0a; color: #f5f5f3; }

    /* Mobile sidebar: horizontal scroll strip */
    .shop-sidebar-mobile {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 16px;
      border-bottom: 1px solid #1a1a1a;
      -webkit-overflow-scrolling: touch;
    }
    .shop-sidebar-mobile::-webkit-scrollbar { display: none; }

    .mobile-filter-pill {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      padding: 7px 16px;
      border: 1px solid #2a2a2a;
      transition: all .2s;
      flex-shrink: 0;
    }
    .mobile-filter-pill:hover { color: #f5f5f3; border-color: #555; }
    .mobile-filter-pill.active { color: #f5f5f3; border-color: #555; background: #1a1a1a; }
  </style>

  <!-- PAGE HEADER -->
  <div class="px-4 md:px-8 lg:px-12 pt-8 md:pt-12 border-b border-zinc-900">
    <div class="flex justify-between items-end pb-6 md:pb-8">
      <div>
        <p class="text-[0.6rem] tracking-widest3 uppercase text-zinc-600 mb-2">Nova Store</p>
        <h1 class="font-display text-4xl md:text-6xl lg:text-7xl tracking-wide leading-none text-[#f5f5f3]">
          <span th:if="${currentSubCategory != null}" th:text="${currentSubCategory.name}"></span>
          <span th:if="${currentCategory != null and currentSubCategory == null}" th:text="${currentCategory.name}"></span>
          <span th:if="${currentCategory == null}">All Pieces</span>
        </h1>
      </div>
      <p class="text-[0.65rem] tracking-widest uppercase text-zinc-500">
        <span th:text="${products.totalElements}">0</span>&nbsp;Items
      </p>
    </div>

    <!-- BREADCRUMB -->
    <div class="flex items-center gap-3 pb-5 text-[0.62rem] tracking-widest uppercase flex-wrap">
      <a th:href="@{/}" class="text-zinc-700 no-underline transition-colors hover:text-[#f5f5f3]">Home</a>
      <span class="text-zinc-800">—</span>
      <a th:href="@{/products}" class="text-zinc-700 no-underline transition-colors hover:text-[#f5f5f3]">Shop</a>
      <span th:if="${currentCategory != null}" class="text-zinc-800">—</span>
      <span th:if="${currentCategory != null}" class="text-zinc-500" th:text="${currentCategory.name}"></span>
      <span th:if="${currentSubCategory != null}" class="text-zinc-800">—</span>
      <span th:if="${currentSubCategory != null}" class="text-zinc-500" th:text="${currentSubCategory.name}"></span>
    </div>
  </div>

  <!-- MOBILE FILTERS (visible on small screens only) -->
  <div class="lg:hidden px-4 md:px-8 py-4">
    <div class="shop-sidebar-mobile">
      <a th:href="@{/products}" class="mobile-filter-pill"
        th:classappend="${currentCategory == null ? ' active' : ''}">All</a>
      <a th:each="cat : ${categories}"
        th:href="@{/products/{slug}(slug=${cat.slug})}"
        class="mobile-filter-pill"
        th:classappend="${currentCategory != null and currentCategory.id == cat.id ? ' active' : ''}"
        th:text="${cat.name}">Category</a>
      <a th:if="${currentCategory != null}" th:each="sub : ${subCategories}"
        th:href="@{/products/{catSlug}/{subSlug}(catSlug=${currentCategory.slug},subSlug=${sub.slug})}"
        class="mobile-filter-pill"
        th:classappend="${currentSubCategory != null and currentSubCategory.id == sub.id ? ' active' : ''}"
        th:text="${sub.name}">Sub</a>
    </div>
    <div class="mt-3">
      <select id="sortSelectMobile" class="sort-select"
        th:data-baseurl="${currentSubCategory != null
          ? '/products/' + currentCategory.slug + '/' + currentSubCategory.slug
          : (currentCategory != null ? '/products/' + currentCategory.slug : '/products')}">
        <option value="newest" th:selected="${sort == 'newest' or sort == null}">Newest</option>
        <option value="price_asc" th:selected="${sort == 'price_asc'}">Price ↑</option>
        <option value="price_desc" th:selected="${sort == 'price_desc'}">Price ↓</option>
        <option value="best_seller" th:selected="${sort == 'best_seller'}">Best Seller</option>
      </select>
    </div>
  </div>

  <!-- LAYOUT: SIDEBAR + GRID -->
  <div class="flex gap-0 min-h-[60vh]">

    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden lg:block w-52 flex-shrink-0 border-r border-zinc-900 px-7 py-10">
      <div class="mb-8">
        <span class="sidebar-label">Category</span>
        <a th:href="@{/products}" class="filter-link"
          th:classappend="${currentCategory == null ? ' active' : ''}">All</a>
        <a th:each="cat : ${categories}"
          th:href="@{/products/{slug}(slug=${cat.slug})}"
          class="filter-link"
          th:classappend="${currentCategory != null and currentCategory.id == cat.id ? ' active' : ''}"
          th:text="${cat.name}">Category</a>
      </div>

      <div th:if="${currentCategory != null}" class="mb-8">
        <span class="sidebar-label">Type</span>
        <a th:each="sub : ${subCategories}"
          th:href="@{/products/{catSlug}/{subSlug}(catSlug=${currentCategory.slug},subSlug=${sub.slug})}"
          class="filter-link"
          th:classappend="${currentSubCategory != null and currentSubCategory.id == sub.id ? ' active' : ''}"
          th:text="${sub.name}">Sub</a>
      </div>

      <div>
        <span class="sidebar-label">Sort</span>
        <select id="sortSelect" class="sort-select"
          th:data-baseurl="${currentSubCategory != null
            ? '/products/' + currentCategory.slug + '/' + currentSubCategory.slug
            : (currentCategory != null ? '/products/' + currentCategory.slug : '/products')}">
          <option value="newest" th:selected="${sort == 'newest' or sort == null}">Newest</option>
          <option value="price_asc" th:selected="${sort == 'price_asc'}">Price ↑</option>
          <option value="price_desc" th:selected="${sort == 'price_desc'}">Price ↓</option>
          <option value="best_seller" th:selected="${sort == 'best_seller'}">Best Seller</option>
        </select>
      </div>
    </aside>

    <!-- PRODUCT GRID -->
    <div class="flex-1 px-4 md:px-8 lg:px-10 py-6 md:py-10">

      <!-- EMPTY STATE -->
      <div th:if="${products.content.isEmpty()}" class="text-center py-20">
        <p class="font-display text-5xl md:text-6xl tracking-wide text-zinc-900 mb-5">No Items Found</p>
        <a th:href="@{/products}"
          class="text-[0.7rem] tracking-widest uppercase text-zinc-500 no-underline transition-colors hover:text-[#f5f5f3]">
          View All
        </a>
      </div>

      <!-- GRID -->
      <div th:unless="${products.content.isEmpty()}"
        class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-0.5">
        <div th:each="product : ${products.content}" class="shop-card">
          <a th:href="@{'/products/' + ${product.subCategory.category.slug} + '/' + ${product.subCategory.slug} + '/' + ${product.id}}"
            class="block no-underline text-inherit">
            <div class="img-wrap">
              <img class="img-main"
                th:src="${product.images != null and !product.images.isEmpty() ? product.images[0].imageUrl : '/images/no-image.png'}"
                alt="" />
              <img th:if="${product.images != null and product.images.size() > 1}"
                class="img-hover"
                th:src="${product.images[1].imageUrl}" alt="" />
            </div>
            <div class="py-3 md:py-4 pb-6">
              <div class="flex justify-between items-baseline gap-2">
                <h3 class="text-[0.78rem] tracking-widest uppercase text-[#e0e0de] font-normal flex-1"
                  th:text="${product.name}"></h3>
                <span class="text-[0.75rem] tracking-wide text-zinc-500 whitespace-nowrap">
                  <span th:if="${product.minPrice != null and product.minPrice > 0}"
                    th:text="${#numbers.formatDecimal(product.minPrice,0,'POINT',0,'COMMA')} + ' ₫'"></span>
                  <span th:if="${product.minPrice == null or product.minPrice == 0}" class="text-zinc-800">—</span>
                </span>
              </div>
              <p class="text-[0.62rem] tracking-widest text-zinc-700 uppercase mt-1"
                th:text="${product.subCategory?.name}"></p>
            </div>
          </a>
        </div>
      </div>

      <!-- PAGINATION -->
      <div th:if="${products.totalPages > 1}"
        class="flex justify-center items-center gap-1 mt-16 md:mt-20">
        <a th:if="${!products.first}"
          th:href="@{''(page=${products.number - 1},sort=${sort})}"
          class="pg-btn">←</a>
        <a th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
          th:href="@{''(page=${i},sort=${sort})}"
          class="pg-btn"
          th:classappend="${i == products.number ? ' pg-active' : ''}"
          th:text="${i + 1}"></a>
        <a th:if="${!products.last}"
          th:href="@{''(page=${products.number + 1},sort=${sort})}"
          class="pg-btn">→</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('sortSelect')?.addEventListener('change', function () {
      window.location.href = (this.dataset.baseurl || '/products') + '?sort=' + this.value;
    });
    document.getElementById('sortSelectMobile')?.addEventListener('change', function () {
      window.location.href = (this.dataset.baseurl || '/products') + '?sort=' + this.value;
    });
  </script>
</div>
</html>
