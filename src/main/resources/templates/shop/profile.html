<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Profile — Nova')}">
<div th:fragment="content">
  <style>
    .pf-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2e2e2e;
      color: #e8e8e4;
      padding: 13px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: .84rem;
      outline: none;
      transition: border-color .2s;
      letter-spacing: .03em;
    }

    .pf-input:focus {
      border-bottom-color: #666;
    }

    .pf-input::placeholder {
      color: #2e2e2e;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .pf-input:disabled {
      color: #3a3a3a;
      cursor: not-allowed;
    }

    .pf-label {
      font-size: .6rem;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: #555;
      display: block;
      margin-bottom: 7px;
    }

    .pf-section {
      border: 1px solid #1a1a1a;
      padding: 44px;
    }
  </style>

  <div style="max-width:800px; margin:0 auto; padding:64px 56px;">

    <!-- HEADER -->
    <div
      style="margin-bottom:52px; border-bottom:1px solid #1a1a1a; padding-bottom:28px; display:flex; justify-content:space-between; align-items:flex-end;">
      <div>
        <p style="font-size:.6rem; letter-spacing:.42em; text-transform:uppercase; color:#444; margin-bottom:10px;">
          Account</p>
        <h1
          style="font-family:'Bebas Neue',sans-serif; font-size:4rem; letter-spacing:.06em; line-height:1; color:#f5f5f3;">
          Profile</h1>
      </div>
      <a th:href="@{/my-orders}"
        style="font-size:.64rem; letter-spacing:.2em; text-transform:uppercase; color:#555; text-decoration:none; display:flex; align-items:center; gap:8px; transition:color .2s;"
        onmouseover="this.style.color='#c0c0bc'" onmouseout="this.style.color='#555'">
        My Orders
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </a>
    </div>

    <!-- PROFILE FORM -->
    <div class="pf-section" style="margin-bottom:2px;">
      <p style="font-size:.58rem; letter-spacing:.4em; text-transform:uppercase; color:#444; margin-bottom:36px;">
        Personal Info</p>
      <form method="post" th:action="@{/profile/update}" style="display:flex; flex-direction:column; gap:34px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
          <label class="pf-label">Email</label>
          <input class="pf-input" type="email" th:value="${user.email}" disabled />
        </div>
        <div>
          <label class="pf-label">Full Name</label>
          <input class="pf-input" type="text" name="fullName" th:value="${user.fullName}" placeholder="Your name" />
        </div>
        <div>
          <label class="pf-label">Phone</label>
          <input class="pf-input" type="text" name="phone" th:value="${user.phone}" placeholder="0900 000 000" />
        </div>
        <div>
          <label class="pf-label">Address</label>
          <textarea class="pf-input" name="address" rows="3" style="resize:none;" placeholder="Delivery address"
            th:text="${user.address}"></textarea>
        </div>

        <div style="display:flex; justify-content:flex-end; padding-top:8px; border-top:1px solid #1a1a1a;">
          <button type="submit"
            style="padding:15px 40px; background:#f5f5f3; color:#0a0a0a; border:none; font-family:'DM Sans',sans-serif; font-size:.68rem; letter-spacing:.28em; text-transform:uppercase; font-weight:500; cursor:pointer; transition:background .25s;"
            onmouseover="this.style.background='#d8d8d4'" onmouseout="this.style.background='#f5f5f3'">
            Save Changes
          </button>
        </div>
      </form>
    </div>

    <!-- CHANGE PASSWORD -->
    <div class="pf-section">
      <p style="font-size:.58rem; letter-spacing:.4em; text-transform:uppercase; color:#444; margin-bottom:36px;">Change
        Password</p>
      <form method="post" th:action="@{/profile/change-password}"
        style="display:flex; flex-direction:column; gap:30px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
          <label class="pf-label">Current Password</label>
          <input class="pf-input" type="password" name="oldPassword" placeholder="••••••••" required />
        </div>
        <div>
          <label class="pf-label">New Password</label>
          <input class="pf-input" type="password" name="newPassword" placeholder="Min 6 characters" required />
        </div>
        <div>
          <label class="pf-label">Confirm New Password</label>
          <input class="pf-input" type="password" name="confirmPassword" placeholder="Repeat password" required />
        </div>

        <div style="display:flex; justify-content:flex-end; padding-top:8px; border-top:1px solid #1a1a1a;">
          <button type="submit"
            style="padding:15px 40px; background:transparent; color:#c0c0bc; border:1px solid #2e2e2e; font-family:'DM Sans',sans-serif; font-size:.68rem; letter-spacing:.28em; text-transform:uppercase; cursor:pointer; transition:all .25s;"
            onmouseover="this.style.borderColor='#555'" onmouseout="this.style.borderColor='#2e2e2e'">
            Update Password
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

</html>
