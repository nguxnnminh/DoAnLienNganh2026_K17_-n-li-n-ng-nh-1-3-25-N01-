<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: html">

<div th:fragment="content" class="max-w-md mx-auto py-20">

    <h1 class="text-2xl font-semibold mb-8 text-center">
        Forgot Password
    </h1>

    <form method="post"
          th:action="@{/forgot-password}"
          class="space-y-5">

        <input type="email"
               name="email"
               placeholder="Enter your email"
               required
               class="w-full border px-4 py-3 focus:outline-none focus:border-black">

        <button
            class="w-full bg-black text-white py-3 hover:opacity-90 transition">
            Send reset link
        </button>
    </form>

    <div class="text-center text-sm mt-6">
        <a href="/login"
           class="underline hover:text-gray-500">
            Back to login
        </a>
    </div>

</div>
</html>
