<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Đặt lại mật khẩu')}">

<div th:fragment="content">

    <div class="max-w-md mx-auto py-20">

        <!-- TITLE -->
        <h1 class="text-3xl font-semibold mb-3 text-center tracking-tight">
            Đặt lại mật khẩu
        </h1>

        <p class="text-center text-sm text-zinc-500 mb-10">
            Vui lòng nhập mật khẩu mới cho tài khoản của bạn
        </p>

        <!-- FORM -->
        <form method="post"
              th:action="@{/reset-password}"
              class="space-y-6">

            <!-- TOKEN -->
            <input type="hidden"
                   name="token"
                   th:value="${token}">

            <!-- NEW PASSWORD -->
            <div>
                <label class="block text-sm font-medium mb-2">
                    Mật khẩu mới
                </label>

                <input type="password"
                       name="password"
                       placeholder="••••••••"
                       required
                       class="w-full border border-zinc-300 dark:border-zinc-700
                              bg-white dark:bg-zinc-900
                              px-4 py-3 rounded-xl
                              focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <!-- CONFIRM PASSWORD -->
            <div>
                <label class="block text-sm font-medium mb-2">
                    Xác nhận mật khẩu
                </label>

                <input type="password"
                       name="confirmPassword"
                       placeholder="••••••••"
                       required
                       class="w-full border border-zinc-300 dark:border-zinc-700
                              bg-white dark:bg-zinc-900
                              px-4 py-3 rounded-xl
                              focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <!-- SUBMIT -->
            <button
                class="w-full bg-black text-white py-3 rounded-xl
                       hover:opacity-90 transition font-medium tracking-wide">

                Đặt lại mật khẩu
            </button>

        </form>

        <!-- BACK -->
        <div class="text-center text-sm mt-8 text-zinc-500">
            <a th:href="@{/login}"
               class="underline hover:text-black dark:hover:text-white transition">
                Quay lại đăng nhập
            </a>
        </div>

    </div>

</div>
</html>
