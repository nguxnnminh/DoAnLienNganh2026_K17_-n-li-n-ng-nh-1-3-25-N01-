<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">
<div th:fragment="content">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:28px;">
        <div>
            <h1 style="font-size:20px; font-weight:600; letter-spacing:-0.3px; margin:0 0 4px;">Sửa danh mục phụ</h1>
            <p style="font-size:13px; color:#9ca3af; margin:0;" th:text="'ID #' + ${subCategory.id}"></p>
        </div>
        <a th:href="@{/admin/subcategories}" class="btn btn-secondary">← Quay lại</a>
    </div>

    <div style="display:grid; grid-template-columns:1fr 280px; gap:20px; align-items:start; max-width:900px;">

        <div class="card" style="padding:28px;">
            <form th:action="@{/admin/subcategories/{id}(id=${subCategory.id})}" method="post" data-validate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div style="display:flex; flex-direction:column; gap:18px;">

                    <div>
                        <label class="form-label">Tên danh mục phụ <span style="color:#ef4444;">*</span></label>
                        <input type="text" name="name" class="form-control"
                               data-required="tên danh mục phụ"
                               th:value="${subCategory.name}" maxlength="100">
                    </div>

                    <div>
                        <label class="form-label">Danh mục chính <span style="color:#ef4444;">*</span></label>
                        <select name="categoryId" class="form-control" data-required="danh mục chính">
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${subCategory.category?.id == cat.id}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label">Loại size</label>
                        <select name="sizeType" class="form-control">
                            <option value="">-- Không chọn --</option>
                            <option th:each="st : ${sizeTypes}"
                                    th:value="${st}" th:text="${st}"
                                    th:selected="${subCategory.sizeType == st}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label">Slug</label>
                        <input type="text" name="slug" class="form-control"
                               th:value="${subCategory.slug}"
                               style="font-family:monospace; font-size:13px;">
                    </div>

                    <div class="divider"></div>

                    <div style="display:flex; justify-content:flex-end; gap:10px;">
                        <a th:href="@{/admin/subcategories}" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn btn-primary">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            Lưu thay đổi
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div style="display:flex; flex-direction:column; gap:14px;">
            <div class="card" style="padding:20px;">
                <div class="section-title">Thông tin</div>
                <div style="font-size:13px; color:#6b7280; line-height:1.6;">
                    <div style="margin-bottom:8px;">
                        <span style="color:#9ca3af;">Danh mục chính:</span><br>
                        <strong th:text="${subCategory.category?.name}">—</strong>
                    </div>
                    <div style="margin-bottom:8px;">
                        <span style="color:#9ca3af;">Tạo lúc:</span><br>
                        <span th:text="${#temporals.format(subCategory.createdAt, 'dd/MM/yyyy HH:mm')}">—</span>
                    </div>
                </div>
            </div>

            <div class="card" style="padding:20px; border-color:#fecaca;">
                <div class="section-title" style="color:#dc2626;">Vùng nguy hiểm</div>
                <p style="font-size:12px; color:#9ca3af; margin:0 0 14px;">Chỉ xóa được khi không còn sản phẩm.</p>
                <form th:action="@{/admin/subcategories/{id}/delete(id=${subCategory.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-danger" style="width:100%; justify-content:center;"
                            data-confirm="Xóa danh mục phụ này?">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        Xóa danh mục phụ
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>
</html>
