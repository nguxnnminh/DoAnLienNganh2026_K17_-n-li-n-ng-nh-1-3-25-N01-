<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Checkout — Nova')}">
<div th:fragment="content">
  <style>
    .n-field {
      width:100%;background:transparent;border:none;border-bottom:1px solid #353535;
      color:#e8e8e4;padding:13px 0;font-family:'DM Sans',sans-serif;font-size:.9rem;
      outline:none;transition:border-color .2s;letter-spacing:.03em;
    }
    .n-field:focus { border-bottom-color:#777; }
    .n-field::placeholder { color:#555;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase; }
    .n-label { font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:#888;display:block;margin-bottom:8px; }
    textarea.n-field { overflow:hidden; line-height:1.6; resize:none; }
    #couponMsg.ok  { color:#6dbf6d; }
    #couponMsg.err { color:#bf6d6d; }

    /* ===== COUPON RADIO CARDS ===== */
    .coupon-radio-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .coupon-radio-list::-webkit-scrollbar { width: 3px; }
    .coupon-radio-list::-webkit-scrollbar-thumb { background: #333; }

    .coupon-radio-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid #1e1e1e;
      background: #0a0a0a;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .coupon-radio-card:hover { border-color: #333; background: #0f0f0f; }
    .coupon-radio-card.selected {
      border-color: #555;
      background: #111;
    }

    .coupon-radio-card input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border: 1px solid #444;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .coupon-radio-card input[type="radio"]:checked {
      border-color: #f5f5f3;
    }
    .coupon-radio-card input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 6px; height: 6px;
      background: #f5f5f3;
      border-radius: 50%;
    }

    .coupon-radio-info { flex: 1; min-width: 0; }

    .coupon-radio-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .coupon-radio-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #f5f5f3;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .coupon-radio-badge {
      font-size: 0.45rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid #4a4a2a;
      color: #d4a843;
      background: rgba(212, 168, 67, 0.06);
    }

    .coupon-radio-code {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: #555;
      font-family: monospace;
      text-transform: uppercase;
    }

    .coupon-radio-desc {
      font-size: 0.6rem;
      color: #444;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .coupon-radio-meta {
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      flex-shrink: 0;
      text-align: right;
    }

    .coupon-section-toggle {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .coupon-section-toggle:hover { color: #aaa; }

    .manual-input-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #1a1a1a;
    }
  </style>

  <div class="max-w-[1400px] mx-auto px-4 md:px-8 lg:px-12 py-10 md:py-16">

    <!-- HEADER -->
    <div class="flex justify-between items-end mb-8 md:mb-12 border-b border-zinc-900 pb-6 md:pb-8">
      <div>
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-2">Final Step</p>
        <h1 class="font-display text-4xl md:text-6xl tracking-wide leading-none text-[#f5f5f3]">Checkout</h1>
      </div>
      <p class="text-xs tracking-widest uppercase text-zinc-500">
        <span th:text="${cartItems.size()}">0</span>&nbsp;Items
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_380px] gap-8 md:gap-16 items-start">

      <!-- FORM -->
      <div>
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-8 md:mb-10">Delivery Information</p>
        <form th:action="@{/checkout}" method="post" class="flex flex-col gap-8 md:gap-9">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <!-- couponCode is populated by JS when user selects a coupon -->
          <input type="hidden" id="couponCodeHidden" name="couponCode" />

          <div>
            <label class="n-label">Full Name</label>
            <input class="n-field" type="text" name="customerName"
                   th:value="${user!=null?user.fullName:''}" required
                   maxlength="100" placeholder="Your name" />
          </div>
          <div>
            <label class="n-label">Phone</label>
            <input class="n-field" type="tel" name="phone"
                   th:value="${user!=null?user.phone:''}" required
                   pattern="^(\+84|0)(3|5|7|8|9)\d{8}$"
                   placeholder="0900 000 000" />
          </div>
          <div>
            <label class="n-label">Delivery Address</label>
            <textarea class="n-field" name="address" rows="1" required
                      maxlength="500" placeholder="Street, District, City"
                      th:text="${user!=null?user.address:''}"></textarea>
          </div>

          <div>
            <label class="n-label">Order Note <span style="color:#555; font-size:.65rem;">(optional)</span></label>
            <textarea class="n-field" name="note" rows="1"
                      maxlength="500" placeholder="Special instructions, gift message..."></textarea>
          </div>

          <div th:if="${error}"
               class="border border-zinc-800 bg-zinc-900/60 text-zinc-500 text-xs tracking-widest uppercase px-4 py-3.5 leading-relaxed"
               th:text="${error}"></div>

          <button type="submit"
                  class="h-12 bg-[#f5f5f3] text-[#0a0a0a] border-none font-body
                         text-xs tracking-widest uppercase font-medium cursor-pointer
                         transition-colors duration-200 hover:bg-[#d8d8d4]">
            Place Order
          </button>
        </form>
      </div>

      <!-- SUMMARY PANEL -->
      <div class="lg:sticky lg:top-24 border border-zinc-800/60 p-6 md:p-8">
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-6">Order Summary</p>

        <!-- ITEMS -->
        <div class="flex flex-col gap-4 mb-6 pb-6 border-b border-zinc-900">
          <div th:each="item : ${cartItems}" class="flex justify-between items-start gap-3">
            <div class="flex-1">
              <p class="text-xs tracking-widest uppercase text-[#e0e0dc] mb-1"
                 th:text="${item.productName}"></p>
              <p class="text-xs tracking-widest uppercase text-zinc-600">
                <span th:text="${item.size}"></span>&nbsp;·&nbsp;<span
                  th:text="${item.color}"></span>&nbsp;·&nbsp;×<span th:text="${item.quantity}"></span>
              </p>
            </div>
            <span class="text-xs text-zinc-500 whitespace-nowrap"
                  th:text="${#numbers.formatDecimal(item.lineTotal,0,'POINT',0,'COMMA')}+' ₫'"></span>
          </div>
        </div>

        <!-- COUPON SECTION -->
        <div class="mb-6 pb-6 border-b border-zinc-900">
          <label class="n-label mb-3 block">Discount Code</label>

          <!-- Available coupon cards (only for logged-in users with coupons) -->
          <div th:if="${isLoggedIn and !#lists.isEmpty(availableCoupons)}">
            <div class="coupon-radio-list" id="couponRadioList">
              <label th:each="c, iter : ${availableCoupons}"
                     class="coupon-radio-card"
                     th:attr="data-code=${c.code}, data-discount-display=${c.discountDisplay}">
                <input type="radio" name="couponSelect"
                       th:value="${c.code}"
                       th:attr="data-code=${c.code}" />
                <div class="coupon-radio-info">
                  <div class="coupon-radio-top">
                    <span class="coupon-radio-value" th:text="${c.discountDisplay}">100,000₫</span>
                    <span th:if="${iter.index == 0}" class="coupon-radio-badge">★ Recommended</span>
                  </div>
                  <div class="coupon-radio-code" th:text="${c.code}">WELCOME-ABC</div>
                  <div th:if="${c.description}" class="coupon-radio-desc" th:text="${c.description}"></div>
                </div>
                <div class="coupon-radio-meta">
                  <div th:if="${c.minOrderAmount != null}">
                    Min <span th:text="${#numbers.formatDecimal(c.minOrderAmount, 0, 'POINT', 0, 'COMMA')}">200,000</span>₫
                  </div>
                  <div th:if="${c.expiryDate != null}" th:text="'Exp. ' + ${#temporals.format(c.expiryDate, 'dd/MM')}">Exp. 01/06</div>
                </div>
              </label>
            </div>

            <!-- Toggle for manual input -->
            <div class="manual-input-section">
              <button type="button" id="toggleManualInput" class="coupon-section-toggle">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Enter a different code
              </button>
              <div id="manualInputWrap" style="display:none; margin-top:10px;">
                <div class="flex gap-2">
                  <input id="couponInput" type="text" class="n-field flex-1"
                         placeholder="ENTER CODE"
                         style="text-transform:uppercase;letter-spacing:.1em" />
                  <button type="button" id="applyCouponBtn"
                          class="h-[46px] px-4 bg-transparent border border-zinc-700 text-zinc-500
                                 text-xs tracking-widest uppercase cursor-pointer shrink-0
                                 transition-all hover:border-zinc-500 hover:text-[#c0c0bc]">
                    Apply
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Manual input only (for guests or users with no coupons) -->
          <div th:if="${!isLoggedIn or #lists.isEmpty(availableCoupons)}">
            <div th:if="${!isLoggedIn}" class="text-[0.6rem] tracking-widest uppercase text-zinc-600 mb-3">
              <a th:href="@{/login}" class="text-zinc-500 hover:text-[#c0c0bc] transition-colors" style="text-decoration:underline;">Sign in</a> to view your discount codes
            </div>
            <div class="flex gap-2">
              <input id="couponInput" type="text" class="n-field flex-1"
                     placeholder="ENTER CODE"
                     style="text-transform:uppercase;letter-spacing:.1em" />
              <button type="button" id="applyCouponBtn"
                      class="h-[46px] px-4 bg-transparent border border-zinc-700 text-zinc-500
                             text-xs tracking-widest uppercase cursor-pointer shrink-0
                             transition-all hover:border-zinc-500 hover:text-[#c0c0bc]">
                Apply
              </button>
            </div>
          </div>

          <p id="couponMsg" class="mt-2 text-xs tracking-wide"></p>
        </div>

        <!-- TOTALS -->
        <div class="flex flex-col gap-3 mb-6">
          <div class="flex justify-between">
            <span class="text-xs tracking-widest uppercase text-zinc-500">Subtotal</span>
            <span id="subtotalDisplay" class="text-xs text-zinc-400"
                  th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')}+' ₫'"></span>
          </div>

          <!-- Discount row — hidden until a valid coupon is applied -->
          <div id="discountRow" class="flex justify-between" style="display:none!important">
            <span class="text-xs tracking-widest uppercase text-[#6dbf6d]">Discount</span>
            <span id="discountAmount" class="text-xs text-[#6dbf6d]"></span>
          </div>

          <div class="flex justify-between">
            <span class="text-xs tracking-widest uppercase text-zinc-500">Shipping</span>
            <span th:if="${shippingFee == 0}" class="text-xs text-[#6dbf6d]">Free</span>
            <span th:unless="${shippingFee == 0}" id="shippingDisplay" class="text-xs text-zinc-400"
                  th:text="${#numbers.formatDecimal(shippingFee,0,'POINT',0,'COMMA')}+' ₫'"></span>
          </div>
        </div>

        <div class="h-px bg-zinc-900 mb-6"></div>

        <div class="flex justify-between">
          <span class="text-xs tracking-widest uppercase text-[#c0c0bc]">Total</span>
          <span id="totalDisplay" class="text-base text-[#f5f5f3]"
                th:text="${#numbers.formatDecimal(total + shippingFee,0,'POINT',0,'COMMA')}+' ₫'"></span>
        </div>
      </div>

    </div>
  </div>

  <!-- Embed subtotal for JS (BigDecimal serializes as plain number in Thymeleaf inline) -->
  <script th:inline="javascript">
    /*<![CDATA[*/
    const SUBTOTAL    = /*[[${total}]]*/ 0;
    const SHIP_FEE    = /*[[${shippingFee}]]*/ 0;
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ '';
    const CSRF_TOKEN  = /*[[${_csrf.token}]]*/ '';
    const HAS_COUPON_CARDS = /*[[${isLoggedIn and !#lists.isEmpty(availableCoupons)}]]*/ false;
    /*]]>*/

    const couponInput     = document.getElementById('couponInput');
    const applyCouponBtn  = document.getElementById('applyCouponBtn');
    const couponMsg       = document.getElementById('couponMsg');
    const couponCodeHidden = document.getElementById('couponCodeHidden');
    const discountRow     = document.getElementById('discountRow');
    const discountAmount  = document.getElementById('discountAmount');
    const totalDisplay    = document.getElementById('totalDisplay');

    function formatVND(amount) {
      return new Intl.NumberFormat('vi-VN').format(Math.round(amount)) + ' ₫';
    }

    function resetCoupon() {
      couponCodeHidden.value = '';
      discountRow.style.setProperty('display', 'none', 'important');
      discountAmount.textContent = '';
      totalDisplay.textContent = formatVND(SUBTOTAL + SHIP_FEE);
      couponMsg.textContent = '';
      couponMsg.className = 'mt-2 text-xs tracking-wide';
      // Deselect radio cards
      document.querySelectorAll('.coupon-radio-card').forEach(card => {
        card.classList.remove('selected');
        const radio = card.querySelector('input[type="radio"]');
        if (radio) radio.checked = false;
      });
    }

    async function applyCouponCode(code) {
      if (!code) return;

      try {
        const res = await fetch('/api/coupons/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, orderTotal: SUBTOTAL })
        });

        const data = await res.json();

        if (data.valid) {
          couponCodeHidden.value = code;
          couponMsg.textContent  = 'Applied — You save ' + formatVND(data.savedAmount);
          couponMsg.className    = 'mt-2 text-xs tracking-wide ok';
          discountRow.style.removeProperty('display');
          discountAmount.textContent = '− ' + formatVND(data.savedAmount);
          totalDisplay.textContent   = formatVND(data.discountedTotal + SHIP_FEE);
        } else {
          resetCoupon();
          couponMsg.textContent = data.message || 'Invalid or expired code.';
          couponMsg.className   = 'mt-2 text-xs tracking-wide err';
        }
      } catch (_) {
        resetCoupon();
        couponMsg.textContent = 'Could not validate code. Please try again.';
        couponMsg.className   = 'mt-2 text-xs tracking-wide err';
      }
    }

    // ===== COUPON RADIO CARDS =====
    if (HAS_COUPON_CARDS) {
      const radioCards = document.querySelectorAll('.coupon-radio-card');
      radioCards.forEach(card => {
        card.addEventListener('click', function(e) {
          // Don't interfere with the radio input's native behavior
          const radio = this.querySelector('input[type="radio"]');
          if (e.target !== radio) {
            radio.checked = true;
          }

          // Visual feedback
          radioCards.forEach(c => c.classList.remove('selected'));
          this.classList.add('selected');

          // Apply coupon
          const code = radio.value;
          applyCouponCode(code);
        });
      });

      // Toggle manual input
      const toggleBtn = document.getElementById('toggleManualInput');
      const manualWrap = document.getElementById('manualInputWrap');
      if (toggleBtn && manualWrap) {
        toggleBtn.addEventListener('click', () => {
          const isHidden = manualWrap.style.display === 'none';
          manualWrap.style.display = isHidden ? 'block' : 'none';
          toggleBtn.querySelector('svg').style.transform = isHidden ? 'rotate(45deg)' : '';
        });
      }
    }

    // ===== MANUAL COUPON INPUT =====
    if (applyCouponBtn) {
      applyCouponBtn.addEventListener('click', async () => {
        const code = couponInput.value.trim().toUpperCase();
        if (!code) {
          couponMsg.textContent = 'Please enter a discount code.';
          couponMsg.className = 'mt-2 text-xs tracking-wide err';
          return;
        }

        // Deselect any radio card
        document.querySelectorAll('.coupon-radio-card').forEach(card => {
          card.classList.remove('selected');
          const radio = card.querySelector('input[type="radio"]');
          if (radio) radio.checked = false;
        });

        applyCouponBtn.disabled = true;
        applyCouponBtn.textContent = '...';

        await applyCouponCode(code);

        applyCouponBtn.disabled = false;
        applyCouponBtn.textContent = 'Apply';
      });
    }

    // Clear coupon state if the user edits the manual code field
    if (couponInput) {
      couponInput.addEventListener('input', resetCoupon);
    }

    // Auto-resize textareas
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }
    document.querySelectorAll('textarea.n-field').forEach(ta => {
      autoResize(ta);
      ta.addEventListener('input', () => autoResize(ta));
    });
  </script>
</div>
</html>
