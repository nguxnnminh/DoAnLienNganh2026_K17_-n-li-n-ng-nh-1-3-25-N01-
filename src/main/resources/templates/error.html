<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Error — Nova')}">
<div th:fragment="content">

  <div class="min-h-[70vh] flex items-center justify-center px-4 py-16 md:py-20">
    <div class="w-full max-w-md text-center">

      <!-- ERROR CODE -->
      <h1 class="font-display text-[6rem] md:text-[10rem] leading-none text-zinc-900 tracking-[0.04em]"
          th:text="${status} ?: '500'">500</h1>

      <!-- ERROR TITLE -->
      <p class="font-display text-2xl md:text-4xl tracking-[0.1em] text-[#f5f5f3] mb-4"
         th:text="${error} ?: 'Something went wrong'">Error</p>

      <!-- DESCRIPTION -->
      <p class="text-sm text-zinc-600 leading-loose tracking-[0.04em] mb-12"
         th:text="${message} ?: 'An unexpected error occurred. Please try again or contact support.'">
        An error occurred.
      </p>

      <!-- ACTIONS -->
      <div class="flex gap-3 justify-center flex-wrap">
        <a href="/"
           class="h-11 px-6 bg-[#f5f5f3] text-[#0a0a0a] no-underline font-medium
                  text-[0.6rem] tracking-[0.25em] uppercase flex items-center
                  transition-colors duration-200 hover:bg-[#ccc]">
          Home
        </a>
        <button onclick="history.back()"
                class="h-11 px-6 bg-transparent text-zinc-600 border border-zinc-800
                       font-body text-[0.6rem] tracking-[0.25em] uppercase cursor-pointer
                       transition-all duration-200 hover:border-zinc-500 hover:text-[#f5f5f3]">
          Go Back
        </button>
      </div>

    </div>
  </div>

</div>
</html>
