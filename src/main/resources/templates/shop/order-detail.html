<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: html">

<div th:fragment="content">

    <a href="/my-orders"
       class="text-sm underline mb-6 inline-block">
        ← Back to My Orders
    </a>

    <h1 class="text-2xl font-semibold mb-6">
        Order #
        <span th:text="${order.id}"></span>
    </h1>

    <div class="grid grid-cols-12 gap-10">

        <!-- ITEMS -->
        <div class="col-span-8 space-y-4">

            <div th:each="item : ${order.items}"
                 class="flex justify-between border-b pb-4">

                <div>
                    <p class="font-medium"
                       th:text="${item.productName}"></p>

                    <p class="text-sm text-gray-500">
                        Size:
                        <span th:text="${item.size}"></span>
                        · Color:
                        <span th:text="${item.color}"></span>
                    </p>

                    <p class="text-sm">
                        Qty:
                        <span th:text="${item.quantity}"></span>
                    </p>
                </div>

                <div class="font-medium">
                    <span th:text="${item.price}"></span> ₫
                </div>

            </div>

        </div>

        <!-- SUMMARY -->
        <div class="col-span-4 border p-6 h-fit">

            <h3 class="font-semibold mb-4">
                Order Summary
            </h3>

            <div class="flex justify-between mb-2 text-sm">
                <span>Subtotal</span>
                <span>
                    <span th:text="${order.total}"></span> ₫
                </span>
            </div>

            <div class="flex justify-between mb-4 text-sm">
                <span>Shipping</span>
                <span>Free</span>
            </div>

            <hr class="mb-4">

            <div class="flex justify-between font-semibold text-lg">
                <span>Total</span>
                <span>
                    <span th:text="${order.total}"></span> ₫
                </span>
            </div>

        </div>

    </div>

</div>
</html>
