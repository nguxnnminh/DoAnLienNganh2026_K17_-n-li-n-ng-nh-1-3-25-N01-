<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- Flash -->
    <div th:if="${success}"
        class="glass border border-green-500/30 text-green-700 dark:text-green-400 px-5 py-4 rounded-2xl mb-6">
        <strong>Thành công:</strong>
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}"
        class="glass border border-red-500/30 text-red-700 dark:text-red-400 px-5 py-4 rounded-2xl mb-6">
        <strong>Lỗi:</strong>
        <span th:text="${error}"></span>
    </div>


    <!-- Back -->
    <a th:href="@{/admin/orders}"
        class="text-sm text-zinc-500 hover:text-zinc-900 underline mb-6 inline-block transition">
        ← Quay lại danh sách đơn hàng
    </a>


    <!-- TITLE -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">

        <h1 class="text-2xl font-semibold tracking-tight">
            Chi tiết đơn hàng #<span th:text="${order.id}"></span>
        </h1>


        <!-- STATUS -->
        <span class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-medium tracking-tight"
            th:classappend="${
        order.status.name() == 'PENDING' ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300' :
        order.status.name() == 'PROCESSING' ? 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300' :
        order.status.name() == 'SHIPPING' ? 'bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300' :
        order.status.name() == 'COMPLETED' ? 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300' :
        'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300'
      }">

            <span th:text="${order.status}"></span>

        </span>

    </div>


    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">


        <!-- LEFT -->
        <div class="lg:col-span-8 glass rounded-2xl p-6">

            <h3 class="text-lg font-semibold tracking-tight mb-5">
                Sản phẩm trong đơn hàng
            </h3>


            <div th:each="item : ${order.items}"
                class="flex flex-col sm:flex-row justify-between border-b border-zinc-200 dark:border-zinc-800 py-5 last:border-b-0">

                <div class="flex-1">

                    <p class="font-semibold tracking-tight" th:text="${item.productName}">
                    </p>

                    <p class="text-sm text-zinc-500 mt-1">
                        Size: <span th:text="${item.size}"></span> ·
                        Màu: <span th:text="${item.color}"></span>
                    </p>

                    <p class="text-sm text-zinc-500 mt-1">
                        Số lượng: <strong th:text="${item.quantity}"></strong>
                    </p>

                </div>


                <!-- PRICE -->
                <div class="text-lg font-semibold tracking-tight mt-3 sm:mt-0">

                    <span th:text="${
    item.price != null
    ? #numbers.formatDecimal(item.price,0,'POINT',0,'COMMA')
    : '-'
}"></span> ₫

                </div>

            </div>


            <!-- TOTAL -->
            <div class="mt-6 flex justify-between items-center border-t border-zinc-200 dark:border-zinc-800 pt-5">

                <span class="text-lg font-semibold tracking-tight">
                    Tổng cộng
                </span>

                <span class="text-2xl font-semibold tracking-tight">

                    <span th:text="${
    order.total != null
    ? #numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')
    : '-'
}"></span> ₫

                </span>

            </div>


            <div class="mt-4 text-sm text-zinc-500">
                Ngày tạo:
                <span th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
            </div>

        </div>


        <!-- RIGHT -->
        <div class="lg:col-span-4 glass rounded-2xl p-6">

            <h3 class="text-lg font-semibold tracking-tight mb-5">
                Thông tin đơn hàng
            </h3>

            <div class="space-y-4">

                <div>
                    <span class="text-sm text-zinc-500">Khách hàng:</span>
                    <p class="font-semibold tracking-tight" th:text="${order.customerName}">
                    </p>
                </div>

                <div>
                    <span class="text-sm text-zinc-500">SĐT:</span>
                    <p class="font-semibold tracking-tight" th:text="${order.phone}">
                    </p>
                </div>

                <div>
                    <span class="text-sm text-zinc-500">Địa chỉ:</span>
                    <p class="font-semibold tracking-tight" th:text="${order.address}">
                    </p>
                </div>

                <div>
                    <span class="text-sm text-zinc-500">User:</span>
                    <p class="font-semibold tracking-tight"
                        th:text="${order.user != null ? order.user.email : 'Khách vãng lai'}">
                    </p>
                </div>

            </div>


            <!-- UPDATE STATUS -->
            <div class="mt-8">

                <h4 class="text-base font-medium tracking-tight mb-3">
                    Cập nhật trạng thái
                </h4>

                <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="space-y-4">

                    <select name="status"
                        class="w-full border border-zinc-300 dark:border-zinc-700 rounded-lg px-4 py-2.5 bg-white dark:bg-zinc-800">

                        <option th:each="s : ${statuses}" th:value="${s}" th:selected="${s == order.status}"
                            th:text="${s}">
                        </option>

                    </select>

                    <button type="submit"
                        class="w-full bg-black dark:bg-zinc-800 text-white py-3 rounded-xl hover:bg-zinc-800 dark:hover:bg-zinc-700 transition font-medium">
                        Cập nhật trạng thái
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</html>
