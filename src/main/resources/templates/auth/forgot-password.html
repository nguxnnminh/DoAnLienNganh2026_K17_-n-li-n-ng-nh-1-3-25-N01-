<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Quên mật khẩu')}">

<div th:fragment="content" class="py-16">

    <!-- TITLE -->
    <div class="text-center mb-10">
        <h1 class="text-3xl font-semibold tracking-tight">
            Quên mật khẩu
        </h1>

        <p class="text-sm text-zinc-500 mt-2">
            Nhập email để nhận link đặt lại mật khẩu
        </p>
    </div>

    <!-- FORM -->
    <form method="post" th:action="@{/forgot-password}" class="space-y-6 max-w-sm mx-auto">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- EMAIL -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Email
            </label>

            <input type="email" name="email" required placeholder="example@email.com" class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="w-full bg-black text-white py-3 rounded-xl
                       hover:bg-zinc-800 transition
                       font-medium tracking-wide">
            Gửi link đặt lại mật khẩu
        </button>

    </form>

    <!-- BACK LOGIN -->
    <div class="text-center text-sm text-zinc-500 mt-8">
        <a th:href="@{/login}" class="text-black dark:text-white font-medium hover:underline">
            Quay lại đăng nhập
        </a>
    </div>

</div>

</html>
