<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Checkout — Nova')}">
<div th:fragment="content">
  <style>
    .co-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2e2e2e;
      color: #e8e8e4;
      padding: 13px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: .84rem;
      outline: none;
      transition: border-color .2s;
      letter-spacing: .03em;
    }

    .co-input:focus {
      border-bottom-color: #666;
    }

    .co-input::placeholder {
      color: #2e2e2e;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .co-label {
      font-size: .6rem;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: #555;
      display: block;
      margin-bottom: 7px;
    }
  </style>

  <div style="max-width:1240px; margin:0 auto; padding:64px 56px;">
    <div style="margin-bottom:52px; border-bottom:1px solid #1a1a1a; padding-bottom:28px;">
      <p style="font-size:.6rem; letter-spacing:.42em; text-transform:uppercase; color:#444; margin-bottom:10px;">Final
        Step</p>
      <h1
        style="font-family:'Bebas Neue',sans-serif; font-size:4rem; letter-spacing:.06em; line-height:1; color:#f5f5f3;">
        Checkout</h1>
    </div>

    <div style="display:grid; grid-template-columns:1fr 360px; gap:64px; align-items:start;">

      <!-- LEFT: FORM -->
      <div>
        <p style="font-size:.6rem; letter-spacing:.38em; text-transform:uppercase; color:#444; margin-bottom:36px;">
          Delivery Information</p>
        <form th:action="@{/checkout}" method="post" style="display:flex; flex-direction:column; gap:36px;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div>
            <label class="co-label">Full Name</label>
            <input class="co-input" type="text" name="customerName" th:value="${user != null ? user.fullName : ''}"
              required placeholder="Your name" />
          </div>
          <div>
            <label class="co-label">Phone</label>
            <input class="co-input" type="text" name="phone" th:value="${user != null ? user.phone : ''}" required
              placeholder="0900 000 000" />
          </div>
          <div>
            <label class="co-label">Delivery Address</label>
            <textarea class="co-input" name="address" rows="3" style="resize:none;" required
              placeholder="Street, District, City" th:text="${user != null ? user.address : ''}"></textarea>
          </div>

          <div th:if="${error}"
            style="border:1px solid #4a2a2a; background:#1a0a0a; color:#bf8080; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; padding:14px 18px; line-height:1.6;"
            th:text="${error}"></div>

          <button type="submit"
            style="background:#f5f5f3; color:#0a0a0a; border:none; padding:17px; font-family:'DM Sans',sans-serif; font-size:.68rem; letter-spacing:.28em; text-transform:uppercase; font-weight:500; cursor:pointer; transition:background .25s; margin-top:4px;"
            onmouseover="this.style.background='#d8d8d4'" onmouseout="this.style.background='#f5f5f3'">
            Place Order
          </button>
        </form>
      </div>

      <!-- RIGHT: SUMMARY -->
      <div style="position:sticky; top:100px; border:1px solid #1e1e1e; padding:36px;">
        <p style="font-size:.6rem; letter-spacing:.4em; text-transform:uppercase; color:#444; margin-bottom:28px;">Order
          Summary</p>

        <!-- ITEMS -->
        <div
          style="display:flex; flex-direction:column; gap:18px; margin-bottom:26px; padding-bottom:26px; border-bottom:1px solid #1a1a1a;">
          <div th:each="item : ${cartItems}"
            style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
            <div style="flex:1;">
              <p style="font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:#e0e0dc; margin-bottom:4px;"
                th:text="${item.productName}"></p>
              <p style="font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:#444;">
                <span th:text="${item.size}"></span>&nbsp;·&nbsp;<span
                  th:text="${item.color}"></span>&nbsp;·&nbsp;×<span th:text="${item.quantity}"></span>
              </p>
            </div>
            <span style="font-size:.7rem; color:#666; white-space:nowrap;"
              th:text="${#numbers.formatDecimal(item.lineTotal,0,'POINT',0,'COMMA')} + ' ₫'"></span>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:14px; margin-bottom:26px;">
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:#666;">Subtotal</span>
            <span style="font-size:.7rem; color:#888;"
              th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')} + ' ₫'"></span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:#666;">Shipping</span>
            <span style="font-size:.7rem; color:#6dbf6d;">Free</span>
          </div>
        </div>

        <div style="height:1px; background:#1a1a1a; margin-bottom:26px;"></div>
        <div style="display:flex; justify-content:space-between;">
          <span style="font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:#c0c0bc;">Total</span>
          <span style="font-size:1.05rem; color:#f5f5f3;"
            th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')} + ' ₫'"></span>
        </div>
      </div>
    </div>
  </div>
</div>

</html>
