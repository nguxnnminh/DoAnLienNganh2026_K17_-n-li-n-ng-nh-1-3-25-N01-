<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: html">

<div th:fragment="content">

    <!-- HERO -->
    <section class="mb-24">
        <div class="text-center max-w-3xl mx-auto">
            <h1 class="text-5xl font-semibold tracking-tight mb-6">
                Modern Essentials
            </h1>
            <p class="text-gray-600 text-lg mb-10">
                Premium basics designed for everyday wear.
            </p>

            <a href="/shop"
               class="inline-block border border-gray-900 px-10 py-3 text-sm uppercase tracking-wide
                      hover:bg-gray-900 hover:text-white transition">
                Shop Now
            </a>
        </div>
    </section>

    <!-- PRODUCT GRID -->
    <section>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10">
    <div th:each="product : ${products}">
        <a th:href="@{/product/{id}(id=${product.id})}"
           class="group block">

            <!-- IMAGE -->
            <div class="relative aspect-[3/4] bg-gray-100 overflow-hidden">

                            <!-- Primary image -->
                            <img
                            th:if="${product.images != null and !product.images.isEmpty()}"
                            th:src="${product.images[0].imageUrl}"
                            class="w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0"
                            />

                            <!-- Hover image -->
                            <img
                            th:if="${product.images.size() > 1}"
                            th:src="${product.images[1].imageUrl}"
                            class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500 group-hover:opacity-100"
                            />

                            <!-- Fallback -->
                            <div th:if="${product.images == null or product.images.isEmpty()}"
                                class="w-full h-full flex items-center justify-center text-gray-400 text-sm">
                                No image
                            </div>
                        </div>

                        <!-- INFO -->
                        <div class="mt-4 space-y-1">
                            <h3 class="text-sm font-medium uppercase tracking-wide"
                                th:text="${product.name}">
                            </h3>

                            <p class="text-sm text-gray-600">
                                <span
                                th:if="${product.productVariants != null and !product.productVariants.isEmpty()}"
                                th:text="${#numbers.formatDecimal(product.productVariants[0].price, 0, 'COMMA', 0, 'POINT')}">
                                </span>
                                ₫
                            </p>
                        </div>

                    </a>
                </div>
            </div>
            <!-- END PRODUCT ITEM -->

        </div>
    </section>

</div>
</html>
