<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — NOVA Admin'">NOVA Admin</title>

    <meta name="csrf-token" th:content="${_csrf.token}" />
    <meta name="csrf-header" th:content="${_csrf.headerName}" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        mono: ['DM Mono', 'monospace'],
                        display: ['Bebas Neue', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --sidebar-w: 260px;
            --header-h: 60px;
            --accent: #b8960c;
            --accent-soft: #fdf8e7;
            --accent-dark: #8b6f00;
            --accent-text: #92720a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f6f4ef;
            color: #1c1c1c;
            margin: 0;
            opacity: 0;
            animation: adminIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes adminIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .dark body { background: #0f0f0f; color: #e8e8e8; }

        /* ======= SIDEBAR ======= */
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w);
            background: #fff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            z-index: 40;
            transition: transform 0.3s ease;
        }

        .dark .sidebar {
            background: #161616;
            border-right-color: #262626;
        }

        .sidebar-logo {
            height: var(--header-h);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 24px;
            border-bottom: 1px solid #e5e7eb;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 0.1em;
            color: #111;
            text-decoration: none;
        }

        .dark .sidebar-logo { border-bottom-color: #262626; color: #f5f5f5; }

        .sidebar-logo span {
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        /* NAV GROUPS */
        .nav-group-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #9ca3af;
            padding: 20px 24px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            margin: 1px 8px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 400;
            color: #6b7280;
            text-decoration: none;
            transition: all 0.15s;
            cursor: pointer;
            position: relative;
        }

        .nav-item:hover {
            background: #f3f4f6;
            color: #111;
        }

        .dark .nav-item:hover { background: #262626; color: #f5f5f5; }

        .nav-item.active {
            background: var(--accent-soft);
            color: var(--accent-text);
            font-weight: 500;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -8px; top: 6px; bottom: 6px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--accent);
        }

        .dark .nav-item.active { background: #241d00; color: #d4a22a; }
        .dark .nav-item.active::before { background: #d4a22a; }

        .nav-icon {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
            opacity: 0.65;
        }

        .nav-item.active .nav-icon,
        .nav-item:hover .nav-icon { opacity: 1; }

        /* SIDEBAR FOOTER */
        .sidebar-footer {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .dark .sidebar-footer { border-top-color: #262626; }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #f9fafb;
            margin-bottom: 8px;
        }

        .dark .user-card { background: #1f1f1f; }

        .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1.5px solid #333;
            display: flex; align-items: center; justify-content: center;
            color: #c9a227;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        /* ======= MAIN AREA ======= */
        .main-wrap {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ======= TOPBAR ======= */
        .topbar {
            height: var(--header-h);
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 32px;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .topbar-search {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f6f4ef;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 7px 14px;
            width: 220px;
            transition: border-color 0.15s, width 0.25s;
        }

        .topbar-search:focus-within {
            border-color: var(--accent);
            width: 280px;
        }

        .dark .topbar-search { background: #1f1f1f; border-color: #2a2a2a; }

        .topbar-search input {
            background: none;
            border: none;
            outline: none;
            font-size: 13px;
            color: #374151;
            font-family: 'DM Sans', sans-serif;
            width: 100%;
        }

        .dark .topbar-search input { color: #e5e7eb; }
        .topbar-search input::placeholder { color: #9ca3af; }

        .dark .topbar { background: #161616; border-bottom-color: #262626; }

        .topbar-breadcrumb {
            font-size: 13px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }

        .topbar-breadcrumb strong { color: #374151; font-weight: 500; }
        .dark .topbar-breadcrumb strong { color: #e5e7eb; }

        /* ======= CONTENT ======= */
        .content {
            flex: 1;
            padding: 32px;
        }

        /* ======= CARDS ======= */
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
        }

        .dark .card { background: #1a1a1a; border-color: #2a2a2a; }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dark .card-header { border-bottom-color: #262626; }

        /* ======= KPI CARDS ======= */
        .kpi-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
        }

        .dark .kpi-card { background: #1a1a1a; border-color: #2a2a2a; }

        .kpi-label { font-size: 12px; color: #9ca3af; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .kpi-value { font-size: 28px; font-weight: 600; margin-top: 8px; letter-spacing: -0.5px; }
        .kpi-sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }

        /* ======= TABLES ======= */
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table thead tr { border-bottom: 1px solid #f3f4f6; }
        .dark .data-table thead tr { border-bottom-color: #2a2a2a; }
        .data-table th { padding: 12px 20px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; white-space: nowrap; }
        .data-table td { padding: 14px 20px; border-bottom: 1px solid #f9fafb; vertical-align: middle; }
        .dark .data-table td { border-bottom-color: #1f1f1f; }
        .data-table tbody tr:hover td { background: #f9fafb; }
        .dark .data-table tbody tr:hover td { background: #1f1f1f; }
        .data-table tbody tr:last-child td { border-bottom: none; }

        /* ======= BADGES ======= */
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-yellow { background: #fef9c3; color: #854d0e; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-indigo { background: #e0e7ff; color: #3730a3; }
        .badge-purple { background: #f3e8ff; color: #6b21a8; }
        .badge-gray { background: #f3f4f6; color: #4b5563; }

        .dark .badge-green { background: #14532d; color: #86efac; }
        .dark .badge-red { background: #7f1d1d; color: #fca5a5; }
        .dark .badge-yellow { background: #713f12; color: #fde68a; }
        .dark .badge-blue { background: #1e3a5f; color: #93c5fd; }
        .dark .badge-indigo { background: #312e81; color: #a5b4fc; }
        .dark .badge-purple { background: #581c87; color: #d8b4fe; }
        .dark .badge-gray { background: #262626; color: #9ca3af; }

        /* ======= BUTTONS ======= */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-danger { background: #fee2e2; color: #991b1b; }
        .btn-danger:hover { background: #fecaca; }
        .btn-success { background: #dcfce7; color: #166534; }
        .btn-success:hover { background: #bbf7d0; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-icon { padding: 7px; border-radius: 6px; }

        .dark .btn-secondary { background: #262626; color: #e5e7eb; border-color: #404040; }
        .dark .btn-secondary:hover { background: #333; }
        .dark .btn-danger { background: #7f1d1d; color: #fca5a5; }
        .dark .btn-danger:hover { background: #991b1b; }

        /* ======= FORM ======= */
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        .dark .form-label { color: #d1d5db; }
        .form-hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .form-control {
            width: 100%;
            padding: 9px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            background: #fff;
            color: #111;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,150,12,0.12); }
        .dark .form-control { background: #1f1f1f; border-color: #374151; color: #e5e7eb; }
        .dark .form-control:focus { border-color: #c9a227; box-shadow: 0 0 0 3px rgba(201,162,39,0.15); }
        .form-control[readonly] { background: #f9fafb; color: #9ca3af; cursor: not-allowed; }
        .dark .form-control[readonly] { background: #111; color: #6b7280; }

        /* ======= TOAST ======= */
        .toast {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 9999;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            animation: slideInRight 0.3s ease;
            max-width: 380px;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast-success { background: #fff; border: 1px solid #bbf7d0; color: #166534; }
        .toast-error { background: #fff; border: 1px solid #fecaca; color: #991b1b; }
        .dark .toast-success { background: #1a1a1a; border-color: #14532d; color: #86efac; }
        .dark .toast-error { background: #1a1a1a; border-color: #7f1d1d; color: #fca5a5; }

        /* ======= MODAL ======= */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 28px;
            width: 420px;
            max-width: calc(100vw - 40px);
            transform: scale(0.95);
            transition: transform 0.2s;
            border: 1px solid #e5e7eb;
        }
        .dark .modal-box { background: #1a1a1a; border-color: #2a2a2a; }
        .modal-overlay.open .modal-box { transform: scale(1); }
        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .modal-body { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }

        /* ======= PAGINATION ======= */
        .pagination { display: flex; align-items: center; gap: 4px; }
        .page-btn {
            min-width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            background: #fff;
            color: #374151;
            text-decoration: none;
            transition: all 0.15s;
        }
        .page-btn:hover { background: #f3f4f6; }
        .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .dark .page-btn { background: #1a1a1a; border-color: #2a2a2a; color: #e5e7eb; }
        .dark .page-btn:hover { background: #262626; }

        /* ======= MISC ======= */
        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        .text-muted { color: #9ca3af; }
        .divider { height: 1px; background: #f3f4f6; margin: 20px 0; }
        .dark .divider { background: #262626; }

        .module-tabs {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .module-tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #fff;
            color: #6b7280;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .module-tab:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            color: #111;
        }

        .module-tab.active {
            background: var(--accent-soft);
            border-color: #f4d56a;
            color: var(--accent-text);
        }

        .dark .module-tab {
            background: #1a1a1a;
            border-color: #2a2a2a;
            color: #9ca3af;
        }

        .dark .module-tab:hover {
            background: #222;
            color: #f5f5f5;
        }

        .dark .module-tab.active {
            background: #241d00;
            border-color: #5c4700;
            color: #d4a22a;
        }

        .admin-content-loading {
            opacity: 0.55;
            pointer-events: none;
            transition: opacity 0.16s ease;
        }

        /* ======= SCROLLBAR ======= */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        .dark ::-webkit-scrollbar-thumb { background: #2a2a2a; }

        /* ======= SIDEBAR ENHANCEMENTS ======= */
        .sidebar { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #e5e7eb transparent; }
        .dark .sidebar { scrollbar-color: #2a2a2a transparent; }

        /* ======= TOPBAR DARK ======= */
        .dark .topbar-search { background: #1f1f1f; }
        .dark .topbar #darkToggle { background: #1f1f1f; border-color: #2a2a2a; color: #9ca3af; }
        .dark .topbar [href="/admin/orders"] { background: #1f1f1f; border-color: #2a2a2a; }

        /* ======= RESPONSIVE GRID UTILITIES ======= */
        .g-kpi { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
        .g-2col { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
        .g-3mix { display:grid; grid-template-columns:1fr 220px 300px; gap:16px; margin-bottom:20px; }
        .g-sidebar { display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start; }
        .g-sidebar-sm { display:grid; grid-template-columns:1fr 260px; gap:16px; align-items:start; }

        /* ======= MOBILE ======= */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,0.2); }
            .main-wrap { margin-left: 0; }
            .content { padding: 20px; }
            .topbar { padding: 0 20px; }
            .g-3mix { grid-template-columns: 1fr 280px; }
        }

        @media (max-width: 768px) {
            .content { padding: 14px; }
            .topbar { padding: 0 14px; gap: 8px; }
            .topbar-breadcrumb { font-size: 12px; min-width: 0; overflow: hidden; }
            .topbar-breadcrumb strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; display: inline-block; }
            .g-kpi  { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
            .g-2col { grid-template-columns: 1fr; }
            .g-3mix { grid-template-columns: 1fr; }
            .g-sidebar { grid-template-columns: 1fr; }
            .g-sidebar-sm { grid-template-columns: 1fr; }
            .kpi-card { padding: 14px 16px !important; }
            .kpi-value { font-size: 22px !important; }
            .welcome-banner { flex-wrap: wrap; padding: 16px 18px; }
            .welcome-banner::after { font-size: 56px; }
            .data-table th { padding: 10px 12px; font-size: 10px; }
            .data-table td { padding: 10px 12px; font-size: 13px; }
            .toast { left: 14px; right: 14px; top: 10px; max-width: none; }
            footer { padding: 14px 16px !important; }
            .section-title { font-size: 13px; }

            /* Inline sidebar grids — all page forms with right-hand panel */
            [style*="grid-template-columns:1fr 360px"],
            [style*="grid-template-columns:1fr 340px"],
            [style*="grid-template-columns:1fr 320px"],
            [style*="grid-template-columns:1fr 300px"],
            [style*="grid-template-columns:1fr 280px"],
            [style*="grid-template-columns:1fr 260px"] {
                grid-template-columns: 1fr !important;
                max-width: 100% !important;
            }

            /* Two-col form field rows (coupons, etc.) — ends with "1fr;" to avoid matching 5-col variant rows */
            [style*="grid-template-columns:1fr 1fr;"] {
                grid-template-columns: 1fr !important;
            }

            /* Variant rows: wrap the container for horizontal scroll instead of stacking */
            #variantsContainer {
                overflow-x: auto;
                padding-bottom: 4px;
            }
        }

        @media (max-width: 480px) {
            .content { padding: 10px; }
            .g-kpi  { grid-template-columns: 1fr; }
            .btn { padding: 7px 12px; font-size: 12px; }
            .card-header { padding: 14px 16px; }
        }
    </style>
</head>

<body>

<!-- SIDEBAR OVERLAY (mobile) -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="closeSidebar()"></div>

<!-- ======= SIDEBAR ======= -->
<aside class="sidebar" id="sidebar">
    <a href="/admin" class="sidebar-logo">NOVA<span></span></a>

    <nav class="flex-1 py-4 overflow-y-auto">
        <!-- OVERVIEW -->
        <div class="nav-group-label">Overview</div>

        <!--
            Active state uses currentUri (always set by AdminBaseController.globalAttributes)
            instead of currentPage (was inconsistently set — most controllers never set it).
        -->
        <a th:href="@{/admin}"
           th:classappend="${currentUri != null and (currentUri == '/admin' or currentUri == '/admin/')} ? ' active' : ''"
           class="nav-item">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>

        <!-- MANAGEMENT -->
        <div class="nav-group-label">Management</div>

        <a th:href="@{/admin/products}"
           th:classappend="${currentUri != null and currentUri.startsWith('/admin/products')} ? ' active' : ''"
           class="nav-item">

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title">Confirm Action</div>
        <div class="modal-body" id="confirmMessage">Are you sure you want to perform this action?</div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-danger" id="confirmBtn">Confirm</button>
        </div>
    </div>
</div>

<script>
    // ===== DARK MODE =====
    (function(){
        if(localStorage.getItem('nova-dark') === '1') document.documentElement.classList.add('dark');
    })();

    function toggleDark(){
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('nova-dark', isDark ? '1' : '0');
    }

    // ===== SIDEBAR MOBILE =====
    function openSidebar(){
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').classList.remove('hidden');
    }
    function closeSidebar(){
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.add('hidden');
    }

    // ===== TOAST =====
    document.addEventListener('DOMContentLoaded', function(){
        ['toastSuccess','toastError'].forEach(id => {
            const el = document.getElementById(id);
            if(el) setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translateX(20px)';
                el.style.transition = 'all 0.3s';
                setTimeout(() => el.remove(), 300);
            }, 3500);
        });
    });

    // ===== CONFIRM MODAL =====
    let _pendingForm = null;

    function openModal(message, form){
        _pendingForm = form;
        document.getElementById('confirmMessage').textContent = message;
        document.getElementById('confirmModal').classList.add('open');
    }
    function closeModal(){
        document.getElementById('confirmModal').classList.remove('open');
        _pendingForm = null;
    }

    document.getElementById('confirmBtn').onclick = function(){
        if(_pendingForm) _pendingForm.submit();
        closeModal();
    };

    document.getElementById('confirmModal').addEventListener('click', function(e){
        if(e.target === this) closeModal();
    });

    document.addEventListener('click', function(e){
        const trigger = e.target.closest('[data-confirm]');
        if(trigger){
            e.preventDefault();
            const form = trigger.closest('form');
            openModal(trigger.getAttribute('data-confirm'), form);
        }
    });

    // ===== GLOBAL FORM VALIDATION =====
    // Usage: add data-validate to <form>, and data-required="Label" to required inputs/selects
    document.addEventListener('submit', function(e) {
        const form = e.target;
        if (!form.hasAttribute('data-validate')) return;

        const errors = [];
        form.querySelectorAll('[data-required]').forEach(el => {
            const label = el.getAttribute('data-required');
            if (el.tagName === 'SELECT') {
                if (!el.value) errors.push('Please select ' + label);
            } else if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                if (!el.value.trim()) errors.push('Please fill in ' + label);
            }
        });

        if (errors.length === 0) return;

        e.preventDefault();

        // Remove old banner
        const old = document.getElementById('_vBanner');
        if (old) old.remove();

        const banner = document.createElement('div');
        banner.id = '_vBanner';
        banner.style.cssText = 'background:#fef3c7; border:1px solid #fcd34d; border-radius:10px; padding:14px 18px; margin-bottom:20px; font-size:13px; color:#92400e; animation:slideInRight 0.3s;';
        banner.innerHTML = '<strong style="display:block;margin-bottom:6px;">⚠ Please review the following:</strong>' +
            errors.map(e => '<div style="margin:3px 0 3px 12px;">• ' + e + '</div>').join('');

        // Highlight fields
        form.querySelectorAll('[data-required]').forEach(el => {
            el.style.borderColor = '';
        });
        form.querySelectorAll('[data-required]').forEach(el => {
            const label = el.getAttribute('data-required');
            const isEmpty = el.tagName === 'SELECT' ? !el.value : !el.value.trim();
            if (isEmpty) el.style.borderColor = '#f59e0b';
        });

        form.parentElement.insertBefore(banner, form);
        banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
</script>
<script th:src="@{/js/admin-spa.js}"></script>

<!-- ===== REAL-TIME NOTIFICATIONS (SSE) — admin nhận toast đơn mới ===== -->
<div id="nova-toasts" style="position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>
<script>
    (function initAdminSse() {
        if (!window.EventSource) return;
        function toast(title, message) {
            const wrap = document.getElementById('nova-toasts');
            if (!wrap) return;
            const el = document.createElement('div');
            el.style.cssText = 'background:#fff;border:1px solid #e5e5e5;border-left:3px solid #16a34a;'
                + 'padding:12px 16px;max-width:340px;box-shadow:0 12px 32px rgba(0,0,0,.18);border-radius:6px;'
                + 'opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;';
            el.innerHTML = '<p style="font-size:.78rem;font-weight:600;color:#111;margin-bottom:3px;">'
                + (title || 'Thông báo') + '</p>'
                + '<p style="font-size:.74rem;color:#555;line-height:1.5;">' + (message || '') + '</p>';
            wrap.appendChild(el);
            requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
            setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(10px)'; setTimeout(() => el.remove(), 350); }, 7000);
        }
        let es;
        try { es = new EventSource('/notifications/stream'); } catch (e) { return; }
        es.addEventListener('new-order', (ev) => { try { const d = JSON.parse(ev.data); toast(d.title, d.message); } catch (_) {} });
        es.addEventListener('notification', (ev) => { try { const d = JSON.parse(ev.data); toast(d.title, d.message); } catch (_) {} });
    })();
</script>
