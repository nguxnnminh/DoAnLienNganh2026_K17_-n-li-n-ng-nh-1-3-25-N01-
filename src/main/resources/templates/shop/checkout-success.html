<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Order Confirmed — Nova')}">
<div th:fragment="content">
  <div class="min-h-[calc(100vh-108px)] flex items-center justify-center px-4 py-16 md:py-20">
    <div class="w-full max-w-md text-center">

      <!-- CHECK ICON -->
      <div class="w-14 h-14 border border-zinc-800 flex items-center justify-center mx-auto mb-10 md:mb-12">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6dbf6d" stroke-width="1.5">
          <path d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-3">Confirmed</p>
      <h1 class="font-display text-5xl md:text-6xl tracking-wide leading-none text-[#f5f5f3] mb-4">Order Placed</h1>
      <p class="text-sm text-zinc-500 leading-loose mb-12">
        Thank you for shopping with Nova.<br>Your order is being processed.
      </p>

      <!-- ORDER INFO -->
      <div class="border border-zinc-800/60 p-6 md:p-8 mb-8 md:mb-10 text-left">
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-5">Order Details</p>
        <div class="flex flex-col gap-4">
          <div class="flex justify-between">
            <span class="text-xs tracking-widest uppercase text-zinc-500">Order ID</span>
            <span class="text-xs text-[#c0c0bc]" th:text="'#'+${order.id}"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-xs tracking-widest uppercase text-zinc-500">Total</span>
            <span class="text-xs text-[#c0c0bc]"
                  th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')}+' ₫'"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-xs tracking-widest uppercase text-zinc-500">Status</span>
            <span class="text-xs text-[#6dbf6d] tracking-widest uppercase" th:text="${order.status}"></span>
          </div>
        </div>
      </div>

      <div class="flex gap-3 justify-center flex-wrap">
        <a th:href="@{/my-orders}"
           class="h-11 md:h-12 px-6 md:px-8 border border-zinc-700 text-zinc-500
                  text-xs tracking-widest uppercase no-underline flex items-center
                  transition-all duration-200 hover:border-zinc-500 hover:text-[#c0c0bc]">
          My Orders
        </a>
        <a th:href="@{/products}"
           class="h-11 md:h-12 px-6 md:px-8 bg-[#f5f5f3] text-[#0a0a0a]
                  text-xs tracking-widest uppercase no-underline font-medium flex items-center
                  transition-colors duration-200 hover:bg-[#d8d8d4]">
          Keep Shopping
        </a>
      </div>

    </div>
  </div>
</div>
</html>
