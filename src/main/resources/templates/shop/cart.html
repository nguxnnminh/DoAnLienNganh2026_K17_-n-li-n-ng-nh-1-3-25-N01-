<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Giỏ hàng')}">

<div th:fragment="content" class="py-10 space-y-12">

    <!-- TITLE -->
    <div class="space-y-2">
        <h1 class="text-3xl font-semibold tracking-tight">
            Giỏ hàng
        </h1>

        <p class="text-sm text-zinc-500">
            Kiểm tra sản phẩm trước khi thanh toán
        </p>
    </div>


    <!-- EMPTY CART -->
    <div th:if="${cartItems.isEmpty()}" class="text-center py-32 flex flex-col items-center gap-4">

        <div class="text-xl font-medium">
            Giỏ hàng đang trống
        </div>

        <a th:href="@{/products}"
            class="inline-block px-6 py-3 bg-black text-white rounded-xl hover:bg-zinc-800 transition">
            Tiếp tục mua sắm
        </a>

    </div>


    <!-- CART LIST -->
    <div th:if="${!cartItems.isEmpty()}" class="space-y-8">

        <div th:each="item : ${cartItems}" class="flex flex-wrap md:flex-nowrap gap-6
                    border-b border-zinc-200 dark:border-zinc-800
                    pb-8 items-start">

            <!-- IMAGE -->
            <img th:src="${item.imageUrl != null && !item.imageUrl.isEmpty()
                        ? item.imageUrl
                        : '/images/no-image.png'}" class="w-24 h-24 md:w-28 md:h-28
                        object-cover rounded-2xl
                        border border-zinc-200 dark:border-zinc-800" />


            <!-- PRODUCT INFO -->
            <div class="flex-1 flex flex-col justify-between">

                <div class="space-y-2">

                    <div class="font-medium text-lg" th:text="${item.productName}">
                    </div>

                    <div class="text-sm text-zinc-500">
                        Size:
                        <span th:text="${item.size}"></span>
                        •
                        Color:
                        <span th:text="${item.color}"></span>
                    </div>

                    <div class="font-medium text-blue-600"
                        th:text="${#numbers.formatDecimal(item.price,0,'POINT',0,'COMMA')} + ' ₫'">
                    </div>

                </div>


                <!-- ACTION -->
                <div class="flex items-center gap-6 mt-4">

                    <!-- UPDATE -->
                    <form method="post" th:action="@{/cart/update}" class="flex items-center gap-2">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <input type="hidden" name="variantId" th:value="${item.variantId}" />

                        <input type="number" name="quantity" min="1" th:value="${item.quantity}" class="w-16 border border-zinc-300 dark:border-zinc-700
                                      rounded-lg px-2 py-1 text-center bg-transparent" />

                        <button class="text-sm text-zinc-500 hover:text-black dark:hover:text-white transition">
                            Cập nhật
                        </button>

                    </form>


                    <!-- REMOVE -->
                    <form method="post" th:action="@{/cart/remove}">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <input type="hidden" name="variantId" th:value="${item.variantId}" />

                        <button class="text-sm text-red-500 hover:underline">
                            Xóa
                        </button>

                    </form>

                </div>

            </div>

        </div>


        <!-- SUMMARY -->
        <div class="flex justify-end">

            <div class="w-full md:w-80 space-y-6">

                <!-- TOTAL -->
                <div class="flex justify-between text-lg font-medium">
                    <span>Tổng</span>

                    <span th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')} + ' ₫'">
                    </span>
                </div>


                <div class="space-y-3">

                    <!-- CLEAR CART -->
                    <form method="post" th:action="@{/cart/clear}">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <button class="w-full border border-zinc-300 dark:border-zinc-700
                                       py-3 rounded-xl
                                       hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
                            Xóa toàn bộ
                        </button>

                    </form>


                    <!-- CHECKOUT -->
                    <a th:href="@{/checkout}" class="block text-center bg-black text-white
                              py-3 rounded-xl hover:bg-zinc-800 transition">

                        Thanh toán

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</html>
