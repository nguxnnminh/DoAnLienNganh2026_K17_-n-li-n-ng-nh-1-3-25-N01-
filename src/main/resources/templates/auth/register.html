<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Đăng ký')}">

<div th:fragment="content" class="max-w-md mx-auto py-24">

    <!-- TITLE -->
    <div class="text-center mb-10">
        <h1 class="text-3xl font-semibold tracking-tight">
            Đăng ký tài khoản
        </h1>

        <p class="text-sm text-zinc-500 mt-2">
            Tham gia cùng NOVA Fashion
        </p>
    </div>

    <!-- FORM -->
    <form method="post" th:action="@{/register}" class="space-y-6" id="registerForm">

        <!-- EMAIL -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Email
            </label>

            <input type="email" name="email" required class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">
        </div>

        <!-- PASSWORD -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Mật khẩu
            </label>

            <input type="password" name="password" id="password" required class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">
        </div>

        <!-- CONFIRM PASSWORD -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Xác nhận mật khẩu
            </label>

            <input type="password" name="confirmPassword" id="confirmPassword" required class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">

            <!-- ERROR TEXT -->
            <p id="passwordError" class="text-red-500 text-sm mt-2 hidden">
                Mật khẩu không khớp
            </p>
        </div>

        <!-- SUBMIT -->
        <button type="submit" id="submitBtn" class="w-full bg-black text-white py-3 rounded-xl
                       hover:bg-zinc-800 transition
                       font-medium tracking-wide">
            Tạo tài khoản
        </button>

    </form>

    <!-- LOGIN LINK -->
    <div class="text-center text-sm text-zinc-500 mt-8">
        Đã có tài khoản?
        <a th:href="@{/login}" class="text-black dark:text-white font-medium hover:underline ml-1">
            Đăng nhập
        </a>
    </div>

</div>

<!-- SCRIPT VALIDATE -->
<script>
    const form = document.getElementById("registerForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const errorText = document.getElementById("passwordError");
    const submitBtn = document.getElementById("submitBtn");

    function validatePassword() {
        if (password.value !== confirmPassword.value) {
            errorText.classList.remove("hidden");
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-50", "cursor-not-allowed");
            return false;
        }

        errorText.classList.add("hidden");
        submitBtn.disabled = false;
        submitBtn.classList.remove("opacity-50", "cursor-not-allowed");
        return true;
    }

    password.addEventListener("input", validatePassword);
    confirmPassword.addEventListener("input", validatePassword);

    form.addEventListener("submit", function (e) {
        if (!validatePassword()) {
            e.preventDefault();
        }
    });
</script>

</html>
