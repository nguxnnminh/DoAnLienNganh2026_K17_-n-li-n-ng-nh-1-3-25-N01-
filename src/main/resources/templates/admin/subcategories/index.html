<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">
<div th:fragment="content">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
        <div>
            <h1 style="font-size:20px; font-weight:600; letter-spacing:-0.3px; margin:0 0 4px;">Danh mục phụ</h1>
            <p style="font-size:13px; color:#9ca3af; margin:0;">
                Tổng <strong th:text="${#lists.size(subCategories)}" style="color:#374151;">0</strong> danh mục phụ
            </p>
        </div>
        <div style="display:flex; gap:8px;">
            <a th:href="@{/admin/categories}" class="btn btn-secondary">← Danh mục chính</a>
            <a th:href="@{/admin/subcategories/create(categoryId=${filterCategoryId})}" class="btn btn-primary">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Thêm danh mục phụ
            </a>
        </div>
    </div>

    <!-- FILTER BY CATEGORY -->
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
        <a th:href="@{/admin/subcategories}"
           style="padding:6px 14px; border-radius:20px; font-size:13px; text-decoration:none; transition:all 0.15s;"
           th:style="${filterCategoryId == null} ? 'background:#2563eb; color:#fff; border:1px solid #2563eb;' : 'background:#fff; color:#374151; border:1px solid #e5e7eb;'">
            Tất cả
        </a>
        <a th:each="cat : ${categories}"
           th:href="@{/admin/subcategories(categoryId=${cat.id})}"
           th:text="${cat.name}"
           style="padding:6px 14px; border-radius:20px; font-size:13px; text-decoration:none; transition:all 0.15s;"
           th:style="${filterCategoryId == cat.id} ? 'background:#2563eb; color:#fff; border:1px solid #2563eb;' : 'background:#fff; color:#374151; border:1px solid #e5e7eb;'">
        </a>
    </div>

    <div class="card">
        <div style="overflow-x:auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:60px;">ID</th>
                        <th>Tên danh mục phụ</th>
                        <th>Danh mục chính</th>
                        <th>Slug</th>
                        <th style="text-align:center;">Loại size</th>
                        <th style="text-align:center;">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sc : ${subCategories}">
                        <td style="color:#9ca3af; font-family:monospace; font-size:12px;" th:text="${sc.id}"></td>
                        <td style="font-weight:500;" th:text="${sc.name}"></td>
                        <td>
                            <span class="badge badge-blue" th:text="${sc.category?.name}"></span>
                        </td>
                        <td>
                            <span style="font-family:monospace; font-size:12px; color:#6b7280; background:#f3f4f6; padding:2px 8px; border-radius:4px;" th:text="${sc.slug}"></span>
                        </td>
                        <td style="text-align:center;">
                            <span th:if="${sc.sizeType != null}" class="badge badge-gray" th:text="${sc.sizeType}"></span>
                            <span th:if="${sc.sizeType == null}" style="color:#d1d5db;">—</span>
                        </td>
                        <td>
                            <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
                                <a th:href="@{/admin/subcategories/{id}/edit(id=${sc.id})}"
                                   class="btn btn-sm btn-secondary">Sửa</a>
                                <form th:action="@{/admin/subcategories/{id}/delete(id=${sc.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            data-confirm="Xóa danh mục phụ này? Chỉ xóa được nếu không có sản phẩm.">Xóa</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(subCategories)}">
                        <td colspan="6" style="text-align:center; padding:48px; color:#9ca3af;">
                            Chưa có danh mục phụ nào.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</html>
