<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- PAGE TITLE -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">

        <h1 class="text-2xl font-semibold tracking-tight">
            Quản lý sản phẩm
        </h1>

        <a th:href="@{/admin/products/create}"
           class="bg-black dark:bg-zinc-800 text-white px-6 py-2.5 rounded-xl hover:bg-zinc-800 dark:hover:bg-zinc-700 transition font-medium">
            + Thêm sản phẩm mới
        </a>

    </div>

    <!-- ================= DESKTOP TABLE ================= -->
    <div class="hidden lg:block glass rounded-2xl overflow-x-auto border border-zinc-200 dark:border-zinc-800">

        <table class="min-w-[1000px] w-full text-sm text-zinc-700 dark:text-zinc-300">

            <thead class="bg-zinc-100/80 dark:bg-zinc-800/80 text-zinc-500 uppercase text-xs tracking-wide">
                <tr>
                    <th class="px-6 py-5 text-left">Tên sản phẩm</th>
                    <th class="px-6 py-5 text-left">Danh mục phụ</th>
                    <th class="px-6 py-5 text-center">Giá</th>
                    <th class="px-6 py-5 text-center">Tồn kho tổng</th>
                    <th class="px-6 py-5 text-center">Trạng thái</th>
                    <th class="px-6 py-5 text-center">Hành động</th>
                </tr>
            </thead>

            <tbody class="divide-y divide-zinc-200 dark:divide-zinc-800">

            <tr th:each="product : ${products}"
                class="hover:bg-zinc-50 dark:hover:bg-zinc-800/40 transition">

                <!-- NAME -->
                <td class="px-6 py-5 whitespace-nowrap">
                    <div class="font-medium text-zinc-900 dark:text-zinc-100">
                        <span th:text="${product.name}"></span>
                    </div>
                </td>

                <!-- SUB CATEGORY -->
                <td class="px-6 py-5 whitespace-nowrap text-zinc-500">
                    <span th:text="${product.subCategory != null ? product.subCategory.name : 'Chưa phân loại'}"></span>
                </td>

                <!-- PRICE -->
                <td class="px-6 py-5 text-center whitespace-nowrap">
                    <span class="font-semibold text-zinc-900 dark:text-zinc-100"
                        th:text="${product.minPrice != null ? #numbers.formatDecimal(product.minPrice,0,'POINT',0,'COMMA') : '-'}">
                    </span> ₫
                </td>

                <!-- STOCK -->
                <td class="px-6 py-5 text-center whitespace-nowrap font-medium text-zinc-900 dark:text-zinc-100">
                    <span th:text="${product.totalStock ?: 0}"></span>
                </td>

                <!-- STATUS -->
                <td class="px-6 py-5 text-center whitespace-nowrap">
                    <span th:if="${product.active}"
                        class="inline-flex px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300">
                        Active
                    </span>

                    <span th:unless="${product.active}"
                        class="inline-flex px-3 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300">
                        Inactive
                    </span>
                </td>

                <!-- ACTION -->
                <td class="px-6 py-5 text-center whitespace-nowrap">
                    <div class="flex justify-center items-center gap-3">

                        <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                            class="px-4 py-2 rounded-xl text-sm font-medium
                                bg-indigo-50 text-indigo-600
                                hover:bg-indigo-100
                                dark:bg-indigo-900/30 dark:text-indigo-300
                                dark:hover:bg-indigo-900/50
                                transition">
                            Sửa
                        </a>

                        <form th:action="@{/admin/products/{id}(id=${product.id})}"
                            method="post">

                            <input type="hidden" name="_method" value="DELETE"/>

                            <button type="submit"
                                data-confirm="Bạn chắc chắn muốn xóa sản phẩm này? Hành động không thể hoàn tác."
                                class="px-4 py-2 rounded-xl text-sm font-medium
                                    bg-red-50 text-red-600
                                    hover:bg-red-100
                                    dark:bg-red-900/30 dark:text-red-300
                                    dark:hover:bg-red-900/50
                                    transition">
                                Xóa
                            </button>

                        </form>

                    </div>
                </td>

            </tr>

                <!-- EMPTY -->
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6"
                        class="px-6 py-16 text-center text-zinc-500">
                        Chưa có sản phẩm nào.
                    </td>
                </tr>

            </tbody>
        </table>
    </div>



    <!-- ================= MOBILE CARD VIEW ================= -->
    <div class="lg:hidden space-y-4">

        <div th:each="product : ${products}"
            class="glass rounded-2xl p-5 border border-zinc-200 dark:border-zinc-800 shadow-sm">

            <!-- Header -->
            <div class="flex justify-between items-start mb-3">
                <div>
                    <div class="font-semibold text-lg">
                        <span th:text="${product.name}"></span>
                    </div>
                    <div class="text-xs text-zinc-500"
                        th:text="${product.subCategory != null ? product.subCategory.name : 'Chưa phân loại'}">
                    </div>
                </div>

                <span th:if="${product.active}"
                    class="inline-flex px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300">
                    Active
                </span>

                <span th:unless="${product.active}"
                    class="inline-flex px-3 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300">
                    Inactive
                </span>
            </div>

            <!-- Price + Stock -->
            <div class="flex justify-between items-center mb-4">
                <div class="text-lg font-bold text-zinc-900 dark:text-zinc-100">
                    <span th:text="${product.minPrice != null ? #numbers.formatDecimal(product.minPrice,0,'POINT',0,'COMMA') : '-'}"></span> ₫
                </div>

                <div class="text-sm text-zinc-500">
                    Tồn kho: <span th:text="${product.totalStock ?: 0}"></span>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3">

                <!-- EDIT -->
                <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                class="px-4 py-2 rounded-xl text-sm font-medium
                        bg-indigo-50 text-indigo-600
                        hover:bg-indigo-100
                        dark:bg-indigo-900/30 dark:text-indigo-300
                        dark:hover:bg-indigo-900/50
                        transition">
                    Sửa
                </a>

                <!-- DELETE -->
                <form th:action="@{/admin/products/{id}(id=${product.id})}"
                    method="post">

                    <input type="hidden" name="_method" value="DELETE"/>

                    <button type="submit"
                            data-confirm="Bạn chắc chắn muốn xóa sản phẩm này? Hành động không thể hoàn tác."
                            class="px-4 py-2 rounded-xl text-sm font-medium
                                bg-red-50 text-red-600
                                hover:bg-red-100
                                dark:bg-red-900/30 dark:text-red-300
                                dark:hover:bg-red-900/50
                                transition">
                        Xóa
                    </button>

                </form>

            </div>

        </div>

        <!-- EMPTY MOBILE -->
        <div th:if="${#lists.isEmpty(products)}"
            class="text-center text-zinc-500 py-16">
            Chưa có sản phẩm nào.
        </div>

    </div>

</div>

</html>
