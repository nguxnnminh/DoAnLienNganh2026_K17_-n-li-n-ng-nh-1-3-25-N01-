<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Register — Nova')}">

<div th:fragment="content">
<style>
.auth-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #d0d0cc;
    color: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    padding: 12px 0;
    outline: none;
    transition: border-color 0.2s;
}
.auth-input:focus { border-bottom-color: #0a0a0a; }
.auth-input::placeholder { color: #aaa; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; }
.auth-label {
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #999;
    display: block;
    margin-bottom: 4px;
}
</style>

<div style="min-height: calc(100vh - 72px); display:flex; align-items:stretch;">

    <!-- LEFT: BRANDING (dark) -->
    <div style="flex: 1; background:#0d0d0d; display:flex; flex-direction:column; justify-content:flex-end; padding:64px; position:relative; overflow:hidden;" class="hidden lg:flex">
        <div style="position:absolute; top:40px; left:48px; font-family:'Bebas Neue',sans-serif; font-size:0.7rem; letter-spacing:0.5em; color:#3a3a3a; text-transform:uppercase;"></div>
        <div style="font-family:'Bebas Neue',sans-serif; font-size:7rem; line-height:0.85; letter-spacing:0.02em; color:#222; margin-bottom:48px; pointer-events:none; user-select:none;">NOVA<br>ESSENTIALS</div>
        <p style="font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:#555; line-height:2;">Streetwear for the<br>modern generation.</p>
    </div>

    <!-- RIGHT: FORM (light) -->
    <div style="width:min(100%, 480px); flex-shrink:0; display:flex; flex-direction:column; justify-content:center; padding:64px 56px; background:#f5f5f3; border-left:1px solid #e0e0dc;">

        <div style="margin-bottom:48px;">
            <p style="font-size:0.55rem; letter-spacing:0.45em; text-transform:uppercase; color:#aaa; margin-bottom:12px;">Join Nova</p>
            <h1 style="font-family:'Bebas Neue',sans-serif; font-size:3rem; letter-spacing:0.05em; line-height:1; color:#0a0a0a;">Create Account</h1>
        </div>

        <form method="post" th:action="@{/register}" id="regForm" style="display:flex; flex-direction:column; gap:32px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div>
                <label class="auth-label" for="registerEmail">Email</label>
                <input id="registerEmail" type="email" name="email" placeholder="your@email.com" required autocomplete="email" class="auth-input" />
            </div>

            <div>
                <label class="auth-label" for="pw">Password</label>
                <input type="password" name="password" id="pw" placeholder="Min 8 characters" required autocomplete="new-password" class="auth-input" />
            </div>

            <div>
                <label class="auth-label" for="cpw">Confirm Password</label>
                <input type="password" name="confirmPassword" id="cpw" placeholder="Repeat password" required autocomplete="new-password" class="auth-input" aria-describedby="pwErr" />
                <p id="pwErr" role="alert" aria-live="assertive" style="font-size:0.6rem; letter-spacing:0.1em; color:#c05050; margin-top:8px; display:none;">Passwords do not match</p>
            </div>

            <button type="submit" id="subBtn" style="
                background: #0a0a0a;
                color: #f5f5f3;
                border: none;
                padding: 16px;
                font-family: 'DM Sans', sans-serif;
                font-size: 0.65rem;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.25s;
                margin-top: 8px;
            " onmouseover="this.style.background='#333'" onmouseout="this.style.background='#0a0a0a'">Create Account</button>
        </form>

        <div style="margin-top:40px; padding-top:32px; border-top:1px solid #e0e0dc;">
            <p style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:#aaa; text-align:center;">
                Already a member?
                <a th:href="@{/login}" style="color:#0a0a0a; text-decoration:none; margin-left:8px; transition:color 0.2s;" onmouseover="this.style.color='#555'" onmouseout="this.style.color='#0a0a0a'">Sign In →</a>
            </p>
        </div>
    </div>
</div>

<script>
    const pw = document.getElementById('pw'), cpw = document.getElementById('cpw'), err = document.getElementById('pwErr'), btn = document.getElementById('subBtn');
    function validate() { const ok = pw.value === cpw.value; err.style.display = ok ? 'none' : 'block'; btn.disabled = !ok; }
    pw.addEventListener('input', validate); cpw.addEventListener('input', validate);
    document.getElementById('regForm').addEventListener('submit', function(e) { if (pw.value !== cpw.value) e.preventDefault(); });
</script>
</div>
</html>
