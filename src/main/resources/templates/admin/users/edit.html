<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:28px;">
        <div>
            <h1 style="font-size:20px; font-weight:600; letter-spacing:-0.3px; margin:0 0 4px;">
                Chỉnh sửa khách hàng
            </h1>
            <p style="font-size:13px; color:#9ca3af; margin:0;" th:text="'ID: #' + ${user.id}"></p>
        </div>
        <a th:href="@{/admin/users}" class="btn btn-secondary">← Quay lại</a>
    </div>

    <div style="display:grid; grid-template-columns:1fr 300px; gap:20px; align-items:start;">

        <!-- FORM -->
        <div class="card" style="padding:28px;">
            <form th:object="${user}"
                  th:action="@{/admin/users/{id}(id=${user.id})}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div style="display:flex; flex-direction:column; gap:18px;">

                    <div>
                        <label class="form-label">Email</label>
                        <input th:field="*{email}" readonly class="form-control"
                               style="background:#f9fafb; color:#9ca3af; cursor:not-allowed;">
                        <p class="form-hint">Email không thể thay đổi</p>
                    </div>

                    <div>
                        <label class="form-label">Họ và tên <span style="color:#ef4444;">*</span></label>
                        <input th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A">
                    </div>

                    <div>
                        <label class="form-label">Số điện thoại</label>
                        <input th:field="*{phone}" class="form-control" placeholder="0901234567">
                    </div>

                    <div>
                        <label class="form-label">Địa chỉ</label>
                        <textarea th:field="*{address}" rows="3" class="form-control"
                                  placeholder="Địa chỉ giao hàng..."></textarea>
                    </div>

                    <div>
                        <label class="form-label">Vai trò</label>
                        <select th:field="*{role}" class="form-control">
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                        <p class="form-hint">Thận trọng khi cấp quyền ADMIN</p>
                    </div>

                    <div class="divider"></div>

                    <div style="display:flex; justify-content:flex-end; gap:10px;">
                        <a th:href="@{/admin/users}" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn btn-primary">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            Lưu thay đổi
                        </button>
                    </div>

                </div>
            </form>
        </div>

        <!-- USER INFO CARD -->
        <div style="display:flex; flex-direction:column; gap:14px;">
            <div class="card" style="padding:20px;">
                <div style="display:flex; flex-direction:column; align-items:center; text-align:center; gap:12px;">
                    <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:white;font-size:24px;font-weight:600;"
                         th:text="${user.fullName != null and !user.fullName.isEmpty() ? user.fullName.substring(0,1).toUpperCase() : user.email.substring(0,1).toUpperCase()}"></div>
                    <div>
                        <div style="font-size:15px; font-weight:600;" th:text="${user.fullName ?: 'Chưa cập nhật'}"></div>
                        <div style="font-size:13px; color:#9ca3af;" th:text="${user.email}"></div>
                    </div>
                    <span class="badge" style="font-size:12px;"
                          th:classappend="${user.role?.name() == 'ADMIN' ? ' badge-purple' : ' badge-blue'}"
                          th:text="${user.role}"></span>
                </div>
            </div>

            <!-- NGUY HIỂM: XÓA USER -->
            <div class="card" style="padding:20px; border-color:#fecaca;">
                <div class="section-title" style="color:#dc2626;">Vùng nguy hiểm</div>
                <p style="font-size:12px; color:#9ca3af; margin:0 0 14px;">Xóa tài khoản này sẽ xóa tất cả dữ liệu liên quan.</p>
                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit"
                            class="btn btn-danger" style="width:100%; justify-content:center;"
                            data-confirm="Xóa vĩnh viễn tài khoản này? Hành động không thể hoàn tác.">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        Xóa tài khoản
                    </button>
                </form>
            </div>
        </div>

    </div>

</div>
</html>
