<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Shop — Nova')}">
<div th:fragment="content">
  <style>
    /* ── PRODUCTS PAGE ─────────────────────────────── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .shop-card .img-wrap {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #111;
    }

    .shop-card .img-main {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .7s cubic-bezier(.22, 1, .36, 1);
    }

    .shop-card .img-hover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .5s ease;
    }

    .shop-card:hover .img-main {
      transform: scale(1.04);
    }

    .shop-card:hover .img-hover {
      opacity: 1;
    }

    /* filter sidebar links */
    .filter-link {
      display: block;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      padding: 9px 0;
      border-bottom: 1px solid transparent;
      transition: color .2s;
    }

    .filter-link:hover {
      color: #f5f5f3;
    }

    .filter-link.active {
      color: #f5f5f3;
      border-bottom-color: #3a3a3a;
    }

    /* sidebar section label */
    .sidebar-label {
      font-size: .58rem;
      letter-spacing: .42em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 14px;
      display: block;
    }

    /* pagination */
    .pg-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #2a2a2a;
      font-size: .7rem;
      color: #555;
      text-decoration: none;
      transition: all .2s;
    }

    .pg-btn:hover {
      border-color: #f5f5f3;
      color: #f5f5f3;
    }

    .pg-btn.pg-active {
      background: #f5f5f3;
      color: #0a0a0a;
      border-color: #f5f5f3;
    }

    /* sort select */
    .sort-select {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #888;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 14px;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }

    .sort-select:hover {
      border-color: #444;
    }

    .sort-select option {
      background: #0a0a0a;
      color: #f5f5f3;
    }

    @media(max-width: 900px) {
      .shop-layout {
        flex-direction: column !important;
      }

      .shop-sidebar {
        width: 100% !important;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 10px;
        border-right: none !important;
        border-bottom: 1px solid #1a1a1a;
        padding-bottom: 24px !important;
      }

      .shop-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .sidebar-section {
        min-width: 140px;
      }
    }
  </style>

  <!-- PAGE HEADER -->
  <div style="padding: 56px 56px 0; border-bottom: 1px solid #1a1a1a;">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; padding-bottom: 28px;">
      <div>
        <p style="font-size:.6rem; letter-spacing:.42em; text-transform:uppercase; color:#444; margin-bottom:10px;">Nova
          Store</p>
        <h1
          style="font-family:'Bebas Neue',sans-serif; font-size:4.5rem; letter-spacing:.05em; line-height:1; color:#f5f5f3;">
          <span th:if="${currentSubCategory != null}" th:text="${currentSubCategory.name}"></span>
          <span th:if="${currentCategory != null and currentSubCategory == null}"
            th:text="${currentCategory.name}"></span>
          <span th:if="${currentCategory == null}">All Pieces</span>
        </h1>
      </div>
      <p style="font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:#555;">
        <span th:text="${products.totalElements}">0</span>&nbsp;Items
      </p>
    </div>

    <!-- BREADCRUMB -->
    <div
      style="display:flex; align-items:center; gap:12px; padding-bottom:22px; font-size:.62rem; letter-spacing:.18em; text-transform:uppercase;">
      <a th:href="@{/}" style="color:#3a3a3a; text-decoration:none; transition:color .2s;"
        onmouseover="this.style.color='#f5f5f3'" onmouseout="this.style.color='#3a3a3a'">Home</a>
      <span style="color:#222;">—</span>
      <a th:href="@{/products}" style="color:#3a3a3a; text-decoration:none; transition:color .2s;"
        onmouseover="this.style.color='#f5f5f3'" onmouseout="this.style.color='#3a3a3a'">Shop</a>
      <span th:if="${currentCategory != null}" style="color:#222;">—</span>
      <span th:if="${currentCategory != null}" style="color:#555;" th:text="${currentCategory.name}"></span>
      <span th:if="${currentSubCategory != null}" style="color:#222;">—</span>
      <span th:if="${currentSubCategory != null}" style="color:#666;" th:text="${currentSubCategory.name}"></span>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="shop-layout" style="display:flex; gap:0; min-height:70vh;">

    <!-- SIDEBAR -->
    <aside class="shop-sidebar" style="width:210px; flex-shrink:0; border-right:1px solid #1a1a1a; padding:40px 28px;">

      <div class="sidebar-section" style="margin-bottom:36px;">
        <span class="sidebar-label">Category</span>
        <a th:href="@{/products}" class="filter-link"
          th:classappend="${currentCategory == null ? ' active' : ''}">All</a>
        <a th:each="cat : ${categories}" th:href="@{/products/{slug}(slug=${cat.slug})}" class="filter-link"
          th:classappend="${currentCategory != null and currentCategory.id == cat.id ? ' active' : ''}"
          th:text="${cat.name}">Category</a>
      </div>

      <div th:if="${currentCategory != null}" class="sidebar-section" style="margin-bottom:36px;">
        <span class="sidebar-label">Type</span>
        <a th:each="sub : ${subCategories}"
          th:href="@{/products/{catSlug}/{subSlug}(catSlug=${currentCategory.slug},subSlug=${sub.slug})}"
          class="filter-link"
          th:classappend="${currentSubCategory != null and currentSubCategory.id == sub.id ? ' active' : ''}"
          th:text="${sub.name}">Sub</a>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">Sort</span>
        <select id="sortSelect" class="sort-select" th:data-baseurl="${currentSubCategory != null
                ? '/products/' + currentCategory.slug + '/' + currentSubCategory.slug
                : (currentCategory != null ? '/products/' + currentCategory.slug : '/products')}">
          <option value="newest" th:selected="${sort == 'newest' or sort == null}">Newest</option>
          <option value="price_asc" th:selected="${sort == 'price_asc'}">Price ↑</option>
          <option value="price_desc" th:selected="${sort == 'price_desc'}">Price ↓</option>
          <option value="best_seller" th:selected="${sort == 'best_seller'}">Best Seller</option>
        </select>
      </div>
    </aside>

    <!-- GRID -->
    <div style="flex:1; padding:40px 48px;">

      <!-- EMPTY STATE -->
      <div th:if="${products.content.isEmpty()}" style="text-align:center; padding:100px 0;">
        <p
          style="font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:.08em; color:#1e1e1e; margin-bottom:24px;">
          No Items Found</p>
        <a th:href="@{/products}"
          style="font-size:.7rem; letter-spacing:.28em; text-transform:uppercase; color:#555; text-decoration:none; transition:color .2s;"
          onmouseover="this.style.color='#f5f5f3'" onmouseout="this.style.color='#555'">View All</a>
      </div>

      <!-- PRODUCT GRID -->
      <div th:unless="${products.content.isEmpty()}" class="shop-grid">
        <div th:each="product : ${products.content}" class="shop-card">
          <a th:href="@{'/products/' + ${product.subCategory.category.slug} + '/' + ${product.subCategory.slug} + '/' + ${product.id}}"
            style="display:block; text-decoration:none; color:inherit;">
            <div class="img-wrap">
              <img class="img-main"
                th:src="${product.images != null and !product.images.isEmpty() ? product.images[0].imageUrl : '/images/no-image.png'}"
                alt="" />
              <img th:if="${product.images != null and product.images.size() > 1}" class="img-hover"
                th:src="${product.images[1].imageUrl}" alt="" />
            </div>
            <div style="padding:16px 0 28px;">
              <div style="display:flex; justify-content:space-between; align-items:baseline; gap:8px;">
                <h3
                  style="font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; color:#e0e0de; font-weight:400; flex:1;"
                  th:text="${product.name}"></h3>
                <span style="font-size:.75rem; letter-spacing:.06em; color:#666; white-space:nowrap;">
                  <span th:if="${product.minPrice != null and product.minPrice > 0}"
                    th:text="${#numbers.formatDecimal(product.minPrice,0,'POINT',0,'COMMA')} + ' ₫'"></span>
                  <span th:if="${product.minPrice == null or product.minPrice == 0}" style="color:#2a2a2a;">—</span>
                </span>
              </div>
              <p style="font-size:.62rem; letter-spacing:.1em; color:#3a3a3a; text-transform:uppercase; margin-top:5px;"
                th:text="${product.subCategory?.name}"></p>
            </div>
          </a>
        </div>
      </div>

      <!-- PAGINATION -->
      <div th:if="${products.totalPages > 1}"
        style="display:flex; justify-content:center; align-items:center; gap:4px; margin-top:72px;">
        <a th:if="${!products.first}" th:href="@{''(page=${products.number - 1},sort=${sort})}" class="pg-btn">←</a>
        <a th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}" th:href="@{''(page=${i},sort=${sort})}"
          class="pg-btn" th:classappend="${i == products.number ? ' pg-active' : ''}" th:text="${i + 1}"></a>
        <a th:if="${!products.last}" th:href="@{''(page=${products.number + 1},sort=${sort})}" class="pg-btn">→</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('sortSelect').addEventListener('change', function () {
      window.location.href = (this.dataset.baseurl || '/products') + '?sort=' + this.value;
    });
  </script>
</div>

</html>
