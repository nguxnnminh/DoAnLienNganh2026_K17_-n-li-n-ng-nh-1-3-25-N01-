<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Profile — Nova')}">
<div th:fragment="content">
  <style>
    .pf-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #353535;
      color: #e8e8e4;
      padding: 13px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: .84rem;
      outline: none;
      transition: border-color .2s;
      letter-spacing: .03em;
    }
    .pf-input:focus { border-bottom-color: #888; }
    .pf-input::placeholder { color: #555; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; }
    .pf-input:disabled { color: #666; cursor: not-allowed; }
    .pf-label { font-size: .6rem; letter-spacing: .38em; text-transform: uppercase; color: #aaa; display: block; margin-bottom: 7px; }

    .quick-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      transition: color .2s;
    }
    .quick-link:last-child { border-bottom: none; }
    .quick-link:hover { color: #c0c0bc; }
  </style>

  <div class="max-w-[1400px] mx-auto px-4 md:px-8 lg:px-12 py-10 md:py-16">

    <!-- HEADER -->
    <div class="mb-8 md:mb-12 border-b border-zinc-900 pb-6 md:pb-8 flex justify-between items-end">
      <div>
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-2">Account</p>
        <h1 class="font-display text-4xl md:text-6xl tracking-wide leading-none text-[#f5f5f3]">Profile</h1>
      </div>
      <p class="text-xs tracking-widest uppercase text-zinc-500">
        <span th:text="${user.role}">USER</span>
      </p>
    </div>

    <!-- FLASH MESSAGES -->
    <div th:if="${success}"
         class="mb-6 px-4 py-3 border text-[0.6rem] tracking-widest uppercase"
         style="border-color:#2a4a2a; color:#6dbf6d; background:rgba(109,191,109,0.06);"
         th:text="${success}"></div>
    <div th:if="${error}"
         class="mb-6 px-4 py-3 border text-[0.6rem] tracking-widest uppercase"
         style="border-color:#4a1a1a; color:#bf6d6d; background:rgba(191,109,109,0.06);"
         th:text="${error}"></div>

    <!-- 2-COLUMN GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-0.5">

      <!-- LEFT: FORMS -->
      <div class="flex flex-col gap-0.5">

        <!-- PERSONAL INFO -->
        <div class="border border-zinc-900 p-6 md:p-10">
          <p class="text-[0.58rem] tracking-widest3 uppercase text-zinc-600 mb-8">Personal Info</p>
          <form method="post" th:action="@{/profile/update}" class="flex flex-col gap-7 md:gap-8">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div>
              <label class="pf-label">Email</label>
              <input class="pf-input" type="email" th:value="${user.email}" disabled />
            </div>
            <div>
              <label class="pf-label">Full Name</label>
              <input class="pf-input" type="text" name="fullName" th:value="${user.fullName}" placeholder="Your name" />
            </div>
            <div>
              <label class="pf-label">Phone</label>
              <input class="pf-input" type="text" name="phone" th:value="${user.phone}" placeholder="0900 000 000" />
            </div>
            <div>
              <label class="pf-label">Address</label>
              <textarea class="pf-input" name="address" rows="3" style="resize:none;"
                placeholder="Delivery address" th:text="${user.address}"></textarea>
            </div>

            <div class="flex justify-end pt-2 border-t border-zinc-900">
              <button type="submit"
                class="px-8 py-4 bg-[#f5f5f3] text-[#0a0a0a] border-none font-body text-[0.68rem] tracking-widest uppercase font-medium cursor-pointer transition-colors duration-200 hover:bg-[#d8d8d4]">
                Save Changes
              </button>
            </div>
          </form>
        </div>

        <!-- CHANGE PASSWORD -->
        <div class="border border-zinc-900 p-6 md:p-10">
          <p class="text-[0.58rem] tracking-widest3 uppercase text-zinc-600 mb-8">Change Password</p>
          <form method="post" th:action="@{/profile/change-password}" class="flex flex-col gap-7">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div>
              <label class="pf-label">Current Password</label>
              <input class="pf-input" type="password" name="oldPassword" placeholder="••••••••" required />
            </div>
            <div>
              <label class="pf-label">New Password</label>
              <input class="pf-input" type="password" name="newPassword" placeholder="Min 8 characters" required />
            </div>
            <div>
              <label class="pf-label">Confirm New Password</label>
              <input class="pf-input" type="password" name="confirmPassword" placeholder="Repeat password" required />
            </div>

            <div class="flex justify-end pt-2 border-t border-zinc-900">
              <button type="submit"
                class="px-8 py-4 bg-transparent text-[#c0c0bc] border border-zinc-800 font-body text-[0.68rem] tracking-widest uppercase cursor-pointer transition-all duration-200 hover:border-zinc-500">
                Update Password
              </button>
            </div>
          </form>
        </div>

        <!-- REFERRAL -->
        <div class="border border-zinc-900 p-6 md:p-10" th:if="${user.referralCode != null}">
          <p class="text-[0.58rem] tracking-widest3 uppercase text-zinc-600 mb-3">Giới thiệu bạn bè</p>
          <p class="text-xs text-zinc-500 leading-relaxed mb-6">
            Chia sẻ mã của bạn. Khi bạn bè mua đơn đầu tiên, <span class="text-[#e8e8e4]">cả hai</span> nhận voucher giảm 50.000₫.
          </p>

          <label class="pf-label">Mã giới thiệu của bạn</label>
          <div class="flex gap-2 mb-5 mt-2">
            <input id="refCode" class="pf-input" type="text" th:value="${user.referralCode}" readonly
                   style="flex:1; letter-spacing:.2em; font-weight:600;" />
            <button type="button" onclick="copyRef('refCode', this)"
              class="px-4 bg-zinc-800 text-[#e8e8e4] border-none text-[0.58rem] tracking-widest uppercase cursor-pointer hover:bg-zinc-700">Copy</button>
          </div>

          <label class="pf-label">Link giới thiệu</label>
          <div class="flex gap-2 mt-2">
            <input id="refLink" class="pf-input" type="text" th:value="${user.referralCode}" readonly style="flex:1; font-size:.62rem;" />
            <button type="button" onclick="copyRef('refLink', this)"
              class="px-4 bg-[#f5f5f3] text-[#0a0a0a] border-none text-[0.58rem] tracking-widest uppercase cursor-pointer hover:bg-[#d8d8d4]">Copy</button>
          </div>
        </div>

      </div>

      <!-- RIGHT: ACCOUNT SIDEBAR -->
      <div class="lg:sticky lg:top-24 lg:self-start flex flex-col gap-0.5">

        <!-- MONOGRAM + INFO -->
        <div class="border border-zinc-900 p-8">
          <div class="w-16 h-16 border border-zinc-800 flex items-center justify-center mb-6">
            <span class="font-display text-2xl tracking-widest text-zinc-400"
                  th:text="${user.fullName != null and !#strings.isEmpty(user.fullName)}
                            ? ${#strings.toUpperCase(#strings.substring(user.fullName, 0, 1))}
                            : ${#strings.toUpperCase(#strings.substring(user.email, 0, 1))}">
            </span>
          </div>

          <p class="text-[0.85rem] tracking-wide text-[#e8e8e4] mb-1"
             th:text="${user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : 'No name set'}">
          </p>
          <p class="text-[0.6rem] tracking-widest uppercase text-zinc-400 mb-5"
             th:text="${user.email}"></p>

          <div class="h-px bg-zinc-900 mb-5"></div>

          <div class="flex flex-col gap-3">
            <div class="flex justify-between">
              <span class="text-[0.58rem] tracking-widest uppercase text-zinc-500">Role</span>
              <span class="text-[0.58rem] tracking-widest uppercase text-zinc-300"
                    th:text="${user.role}"></span>
            </div>
            <div class="flex justify-between" th:if="${user.phone != null and !#strings.isEmpty(user.phone)}">
              <span class="text-[0.58rem] tracking-widest uppercase text-zinc-500">Phone</span>
              <span class="text-[0.58rem] text-zinc-300" th:text="${user.phone}"></span>
            </div>
          </div>
        </div>

        <!-- QUICK LINKS -->
        <div class="border border-zinc-900 px-8 py-6">
          <p class="text-[0.5rem] tracking-widest3 uppercase text-zinc-700 mb-4">Quick Access</p>

          <a th:href="@{/my-orders}" class="quick-link">
            My Orders
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
          <a th:href="@{/wishlist}" class="quick-link">
            Wishlist
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
          <a th:href="@{/tryon-studio}" class="quick-link">
            Try-On Studio
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
        </div>

        <!-- SIGN OUT -->
        <form method="post" th:action="@{/logout}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit"
            class="w-full py-4 border border-zinc-900 text-[0.6rem] tracking-widest uppercase text-zinc-700 bg-transparent cursor-pointer font-body transition-all duration-200 hover:border-zinc-700 hover:text-zinc-500">
            Sign Out
          </button>
        </form>

      </div>
    </div>
  </div>

  <script>
    // Build full referral link from the code + current origin
    (function () {
      const linkInput = document.getElementById('refLink');
      const codeInput = document.getElementById('refCode');
      if (linkInput && codeInput) {
        linkInput.value = window.location.origin + '/register?ref=' + encodeURIComponent(codeInput.value.trim());
      }
    })();
    function copyRef(id, btn) {
      const el = document.getElementById(id);
      if (!el) return;
      el.select();
      navigator.clipboard?.writeText(el.value).then(() => {
        const old = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = old; }, 1500);
      }).catch(() => {});
    }
  </script>
</div>
</html>
