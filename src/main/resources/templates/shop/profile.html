<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Tài khoản của tôi')}">

<div th:fragment="content" class="py-10 max-w-3xl mx-auto space-y-10">

    <!-- TITLE -->
    <div>
        <h1 class="text-3xl font-semibold tracking-tight">
            Hồ sơ tài khoản
        </h1>

        <p class="text-zinc-500 text-sm mt-2">
            Quản lý thông tin cá nhân và liên hệ
        </p>
    </div>



    <!-- PROFILE CARD -->
    <div class="border border-zinc-200 dark:border-zinc-800
                rounded-2xl p-8 bg-white dark:bg-zinc-900">

        <form method="post" th:action="@{/profile/update}" class="space-y-6">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />



            <!-- EMAIL -->
            <div>

                <label class="text-sm text-zinc-500">
                    Email
                </label>

                <input type="email" th:value="${user.email}" disabled class="w-full mt-2 border border-zinc-200 dark:border-zinc-700
                              bg-zinc-100 dark:bg-zinc-800
                              px-4 py-3 rounded-xl cursor-not-allowed">

            </div>



            <!-- FULL NAME -->
            <div>

                <label class="text-sm text-zinc-500">
                    Họ và tên
                </label>

                <input type="text" name="fullName" th:value="${user.fullName}" class="w-full mt-2 border border-zinc-200 dark:border-zinc-700
                              bg-white dark:bg-zinc-900
                              px-4 py-3 rounded-xl
                              focus:outline-none
                              focus:ring-2 focus:ring-black dark:focus:ring-white">

            </div>



            <!-- PHONE -->
            <div>

                <label class="text-sm text-zinc-500">
                    Số điện thoại
                </label>

                <input type="text" name="phone" th:value="${user.phone}" class="w-full mt-2 border border-zinc-200 dark:border-zinc-700
                              bg-white dark:bg-zinc-900
                              px-4 py-3 rounded-xl
                              focus:outline-none
                              focus:ring-2 focus:ring-black dark:focus:ring-white">

            </div>



            <!-- ADDRESS -->
            <div>

                <label class="text-sm text-zinc-500">
                    Địa chỉ giao hàng
                </label>

                <textarea name="address" rows="3" th:text="${user.address}" class="w-full mt-2 border border-zinc-200 dark:border-zinc-700
                                 bg-white dark:bg-zinc-900
                                 px-4 py-3 rounded-xl
                                 focus:outline-none
                                 focus:ring-2 focus:ring-black dark:focus:ring-white">
                </textarea>

            </div>



            <!-- ACTION -->
            <div class="pt-4 flex justify-between items-center">

                <a th:href="@{/my-orders}" class="text-sm underline underline-offset-4
                          hover:text-blue-600 transition">
                    Xem đơn hàng
                </a>

                <button type="submit" class="bg-black text-white
                               px-8 py-3 rounded-xl
                               hover:opacity-90 transition">
                    Lưu thay đổi
                </button>

            </div>

        </form>

    </div>



    <!-- CHANGE PASSWORD -->
    <div class="border border-zinc-200 dark:border-zinc-800
                rounded-2xl p-8 bg-white dark:bg-zinc-900">

        <h2 class="text-lg font-semibold mb-6">
            Đổi mật khẩu
        </h2>



        <form method="post" th:action="@{/profile/change-password}" class="space-y-5">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />



            <input type="password" name="oldPassword" placeholder="Mật khẩu hiện tại" required class="w-full border border-zinc-200 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          px-4 py-3 rounded-xl
                          focus:outline-none
                          focus:ring-2 focus:ring-black dark:focus:ring-white">



            <input type="password" name="newPassword" placeholder="Mật khẩu mới" required class="w-full border border-zinc-200 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          px-4 py-3 rounded-xl
                          focus:outline-none
                          focus:ring-2 focus:ring-black dark:focus:ring-white">



            <input type="password" name="confirmPassword" placeholder="Xác nhận mật khẩu" required class="w-full border border-zinc-200 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          px-4 py-3 rounded-xl
                          focus:outline-none
                          focus:ring-2 focus:ring-black dark:focus:ring-white">



            <button type="submit" class="bg-black text-white
                           px-6 py-3 rounded-xl
                           hover:opacity-90 transition">

                Cập nhật mật khẩu

            </button>

        </form>

    </div>

</div>

</html>
