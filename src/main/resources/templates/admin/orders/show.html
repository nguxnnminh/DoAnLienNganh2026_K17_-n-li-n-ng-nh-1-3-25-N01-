<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- BACK + HEADER -->
    <div style="margin-bottom:24px;">
        <a th:href="@{/admin/orders}"
            style="display:inline-flex; align-items:center; gap:6px; font-size:13px; color:#9ca3af; text-decoration:none; margin-bottom:12px;">
            ← Back to Orders
        </a>
        <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
            <div>
                <h1 style="font-size:20px; font-weight:600; letter-spacing:-0.3px; margin:0 0 4px;">
                    Order <span style="font-family:'DM Mono',monospace;" th:text="'#' + ${order.id}"></span>
                </h1>
                <p style="font-size:13px; color:#9ca3af; margin:0;"
                    th:text="'Placed at ' + ${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
            </div>
            <span class="badge" style="font-size:13px; padding:6px 16px;" th:classappend="${order.status?.name() == 'PENDING'           ? ' badge-yellow' :
                                   order.status?.name() == 'PROCESSING'        ? ' badge-blue'   :
                                   order.status?.name() == 'SHIPPING'          ? ' badge-indigo' :
                                   order.status?.name() == 'COMPLETED'         ? ' badge-green'  :
                                   order.status?.name() == 'CANCEL_REQUESTED'  ? ' badge-yellow' : ' badge-red'}"
                th:style="${order.status?.name() == 'CANCEL_REQUESTED'} ? 'background:#fffbeb;color:#92400e;border-color:#fde68a;' : ''"
                th:text="${order.status}"></span>
        </div>
    </div>

    <!-- ERROR -->
    <div th:if="${error}"
        style="background:#fee2e2;border:1px solid #fecaca;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:14px;color:#991b1b;">
        <strong>Error:</strong> <span th:text="${error}"></span>
    </div>

    <!-- STATUS TIMELINE (PENDING → PROCESSING → SHIPPING → COMPLETED) -->
    <div class="card" style="padding:24px; margin-bottom:20px;">
        <div class="section-title">Order Progress</div>
        <div style="display:flex; align-items:center; gap:0; overflow-x:auto; padding-bottom:4px;">
            <th:block th:each="s, i : ${mainStatuses}"
                      th:with="isCurrent=${order.status == s},
                               isPast=${
                                 (order.status?.name() != 'CANCELLED' and order.status?.name() != 'CANCEL_REQUESTED' and order.status.ordinal() > s.ordinal())
                                 or (order.status?.name() == 'CANCEL_REQUESTED' and (s.name() == 'PENDING' or s.name() == 'PROCESSING'))
                               }">
                <div style="display:flex; align-items:center; flex-shrink:0;">
                    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; min-width:80px;">
                        <div style="width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; border:2px solid;"
                            th:style="${isCurrent} ? 'background:#2563eb;color:white;border-color:#2563eb;' :
                                       (${isPast} ? 'background:#dcfce7;color:#166534;border-color:#86efac;' : 'background:#f9fafb;color:#9ca3af;border-color:#e5e7eb;')">
                            <svg th:if="${isPast}" width="14" height="14" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                    clip-rule="evenodd" />
                            </svg>
                            <span th:unless="${isPast}" th:text="${i.index + 1}"></span>
                        </div>
                        <div style="font-size:11px; font-weight:500; text-align:center; white-space:nowrap;"
                            th:style="${isCurrent} ? 'color:#2563eb;' : 'color:#9ca3af;'" th:text="${s}"></div>
                    </div>
                    <div th:unless="${i.last}"
                        style="flex:1; height:2px; min-width:32px; margin:0 4px; margin-bottom:18px;"
                        th:style="${isPast} ? 'background:#86efac;' : 'background:#e5e7eb;'">
                    </div>
                </div>
            </th:block>
        </div>
    </div>

    <!-- MAIN GRID -->
    <div class="g-sidebar">

        <!-- LEFT: ITEMS -->
        <div style="display:flex; flex-direction:column; gap:20px;">

            <div class="card">
                <div class="card-header">
                    <span style="font-size:14px; font-weight:600;">
                        Order Items (<span th:text="${order.items?.size() ?: 0}"></span>)
                    </span>
                </div>
                <div>
                    <div th:each="item : ${order.items}"
                        style="display:flex; justify-content:space-between; align-items:flex-start; padding:16px 20px; border-bottom:1px solid #f9fafb;">
                        <div style="flex:1;">
                            <div style="font-weight:500; margin-bottom:4px;" th:text="${item.productName}"></div>
                            <div style="font-size:12px; color:#9ca3af;">
                                <span class="badge badge-gray" style="margin-right:4px;"
                                    th:text="'Size: ' + ${item.size}"></span>
                                <span class="badge badge-gray" th:text="'Color: ' + ${item.color}"></span>
                            </div>
                        </div>
                        <div style="text-align:right; flex-shrink:0; margin-left:16px;">
                            <div style="font-weight:600;">
                                <span
                                    th:text="${item.price != null ? #numbers.formatDecimal(item.price,0,'POINT',0,'COMMA') : '—'}"></span>₫
                            </div>
                            <div style="font-size:12px; color:#9ca3af; margin-top:2px;"
                                th:text="'x' + ${item.quantity}"></div>
                        </div>
                    </div>

                    <!-- TOTAL -->
                    <div
                        style="padding:16px 20px; background:#f9fafb; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:14px; font-weight:600;">Order Total</span>
                        <span style="font-size:20px; font-weight:700; letter-spacing:-0.5px;">
                            <span
                                th:text="${order.total != null ? #numbers.formatDecimal(order.total,0,'POINT',0,'COMMA') : '—'}"></span>₫
                        </span>
                    </div>
                </div>
            </div>

        </div>

        <!-- RIGHT: INFO + STATUS UPDATE -->
        <div style="display:flex; flex-direction:column; gap:16px;">

            <!-- CUSTOMER INFO -->
            <div class="card" style="padding:20px;">
                <div class="section-title">Order Information</div>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
                        <span style="font-size:12px; color:#9ca3af; flex-shrink:0;">Customer</span>
                        <span style="font-size:13px; font-weight:500; text-align:right;"
                            th:text="${order.customerName ?: (order.actor?.fullName ?: 'Guest')}"></span>
                    </div>
                    <div th:if="${order.actor != null}"
                        style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
                        <span style="font-size:12px; color:#9ca3af; flex-shrink:0;">Email</span>
                        <span style="font-size:13px; text-align:right;" th:text="${order.actor?.email}"></span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
                        <span style="font-size:12px; color:#9ca3af; flex-shrink:0;">Phone</span>
                        <span style="font-size:13px; font-weight:500;" th:text="${order.phone ?: '—'}"></span>
                    </div>
                    <div class="divider" style="margin:4px 0;"></div>
                    <div>
                        <span style="font-size:12px; color:#9ca3af; display:block; margin-bottom:4px;">Shipping Address</span>
                        <span style="font-size:13px; line-height:1.5;" th:text="${order.address ?: '—'}"></span>
                    </div>
                    <div th:if="${order.note != null and !order.note.isEmpty()}">
                        <span style="font-size:12px; color:#9ca3af; display:block; margin-bottom:4px;">Note</span>
                        <span style="font-size:13px; color:#6b7280; font-style:italic;" th:text="${order.note}"></span>
                    </div>
                </div>
            </div>

            <!-- CANCEL REQUEST — Accept / Deny -->
            <div th:if="${order.status?.name() == 'CANCEL_REQUESTED'}"
                style="padding:20px; border-radius:10px; background:#fffbeb; border:1px solid #fde68a;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                    <svg width="18" height="18" fill="none" stroke="#d97706" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <span style="font-size:14px; font-weight:600; color:#92400e;">Cancellation Requested</span>
                </div>
                <div th:if="${order.cancelReason != null and !order.cancelReason.isEmpty()}"
                    style="background:#fef3c7; border-radius:6px; padding:10px 12px; margin-bottom:14px; font-size:13px; color:#78350f;">
                    <span style="font-weight:500;">Customer reason: </span>
                    <span th:text="${order.cancelReason}"></span>
                </div>
                <div style="display:flex; gap:8px;">
                    <form th:action="@{/admin/orders/{id}/cancel-accept(id=${order.id})}" method="post" style="flex:1;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-secondary" style="width:100%; justify-content:center; background:#dc2626; color:white; border-color:#dc2626;"
                            onclick="return confirm('Accept cancellation? Stock will be restored.')">
                            Accept
                        </button>
                    </form>
                    <form th:action="@{/admin/orders/{id}/cancel-deny(id=${order.id})}" method="post" style="flex:1;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                            Deny &amp; Resume
                        </button>
                    </form>
                </div>
            </div>

            <!-- UPDATE STATUS (active, non-terminal orders) -->
            <div class="card" style="padding:20px;"
                th:if="${order.status?.name() != 'COMPLETED' and order.status?.name() != 'CANCELLED' and order.status?.name() != 'CANCEL_REQUESTED'}">
                <div class="section-title">Update Status</div>
                <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div style="margin-bottom:12px;">
                        <label class="form-label">New Status</label>
                        <select name="status" class="form-control">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                th:selected="${s == order.status}"
                                th:disabled="${
                                    s.name() == 'CANCEL_REQUESTED' or
                                    (order.status?.name() == 'SHIPPING'   and !(s.name() == 'SHIPPING'   or s.name() == 'COMPLETED'  or s.name() == 'CANCELLED')) or
                                    (order.status?.name() == 'PROCESSING' and !(s.name() == 'PROCESSING' or s.name() == 'SHIPPING'   or s.name() == 'CANCELLED')) or
                                    (order.status?.name() == 'PENDING'    and !(s.name() == 'PENDING'    or s.name() == 'PROCESSING' or s.name() == 'CANCELLED'))
                                }"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                        Update Status
                    </button>
                </form>
            </div>

            <!-- COMPLETED -->
            <div th:if="${order.status?.name() == 'COMPLETED'}"
                style="padding:16px; border-radius:10px; background:#f0fdf4; border:1px solid #bbf7d0; display:flex; align-items:center; gap:10px;">
                <svg width="18" height="18" fill="none" stroke="#16a34a" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span style="font-size:13px; font-weight:500; color:#15803d;">Order completed successfully</span>
            </div>

            <!-- CANCELLED -->
            <div th:if="${order.status?.name() == 'CANCELLED'}"
                style="padding:16px; border-radius:10px; background:#fff1f2; border:1px solid #fecdd3; display:flex; align-items:center; gap:10px;">
                <svg width="18" height="18" fill="none" stroke="#e11d48" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span style="font-size:13px; font-weight:500; color:#be123c;">Order has been cancelled</span>
            </div>

        </div>
    </div>

</div>

</html>
