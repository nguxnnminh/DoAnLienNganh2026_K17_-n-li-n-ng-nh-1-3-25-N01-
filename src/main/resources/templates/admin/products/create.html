<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-semibold">Thêm sản phẩm mới</h1>
        <a th:href="@{/admin/products}" class="text-sm text-zinc-500 hover:underline">← Quay lại danh sách</a>
    </div>

    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-5 py-4 rounded-2xl mb-6">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/admin/products/create}" method="post" enctype="multipart/form-data" class="space-y-8 bg-white border border-zinc-200 rounded-2xl p-8">

        <!-- Category chính -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">Danh mục chính <span class="text-red-500">*</span></label>
            <select id="categorySelect" name="categoryId" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Chọn danh mục</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>

        <!-- SubCategory (load động) -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">Danh mục phụ <span class="text-red-500">*</span></label>
            <select name="subCategoryId" id="subCategorySelect" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" disabled>
                <option value="">Chọn danh mục chính trước</option>
            </select>
        </div>

        <!-- Tên sản phẩm -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">Tên sản phẩm <span class="text-red-500">*</span></label>
            <input type="text" name="name" required class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Mô tả -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">Mô tả</label>
            <textarea name="description" rows="4" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <!-- Biến thể -->
        <div>
            <label class="block text-sm text-zinc-500 mb-3">Biến thể (Size - Màu - Giá - Tồn kho)</label>
            <div id="variants-container" class="space-y-4">
                <div class="variant-row flex gap-3">
                    <input type="text" name="variants[0].size" placeholder="Size" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="text" name="variants[0].color" placeholder="Màu" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number" name="variants[0].price" step="0.01" placeholder="Giá" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number" name="variants[0].stock" placeholder="Tồn kho" class="flex-1 px-4 py-3 border rounded-xl">
                    <button type="button" class="remove-variant text-red-500">Xóa</button>
                </div>
            </div>
            <button type="button" id="add-variant" class="text-blue-600 font-medium mt-3">+ Thêm biến thể</button>
        </div>

        <!-- Upload ảnh -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">Ảnh sản phẩm (có thể chọn nhiều)</label>
            <input type="file" name="images" multiple accept="image/*" class="w-full px-4 py-3 border rounded-xl">
        </div>

        <!-- Active -->
        <div class="flex items-center gap-3">
            <input type="checkbox" name="active" checked class="w-5 h-5">
            <label class="text-sm text-zinc-500">Hiển thị sản phẩm</label>
        </div>

        <!-- Submit -->
        <div class="flex justify-end pt-4">
            <button type="submit" class="bg-black text-white px-8 py-3 rounded-xl hover:bg-zinc-800">Tạo sản phẩm</button>
        </div>
    </form>

    <!-- JavaScript -->
    <script>
        // Cascading dropdown
        const categorySelect = document.getElementById('categorySelect');
        const subCategorySelect = document.getElementById('subCategorySelect');

        categorySelect.addEventListener('change', async function() {
            const categoryId = this.value;
            subCategorySelect.disabled = true;
            subCategorySelect.innerHTML = '<option value="">Đang tải...</option>';

            if (!categoryId) {
                subCategorySelect.innerHTML = '<option value="">Chọn danh mục chính trước</option>';
                return;
            }

            try {
                const response = await fetch(`/api/subcategories/by-category/${categoryId}`);
                const subCategories = await response.json();

                subCategorySelect.innerHTML = '<option value="">Chọn danh mục phụ</option>';
                subCategories.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub.id;
                    option.textContent = sub.name;
                    subCategorySelect.appendChild(option);
                });
                subCategorySelect.disabled = false;
            } catch (error) {
                subCategorySelect.innerHTML = '<option value="">Lỗi tải danh mục phụ</option>';
                console.error(error);
            }
        });

        // Thêm/xóa variant
        let variantIndex = 1;
        document.getElementById('add-variant').addEventListener('click', function() {
            const container = document.getElementById('variants-container');
            const html = `
                <div class="variant-row flex gap-3">
                    <input type="text" name="variants[${variantIndex}].size" placeholder="Size" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="text" name="variants[${variantIndex}].color" placeholder="Màu" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number" name="variants[${variantIndex}].price" step="0.01" placeholder="Giá" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number" name="variants[${variantIndex}].stock" placeholder="Tồn kho" class="flex-1 px-4 py-3 border rounded-xl">
                    <button type="button" class="remove-variant text-red-500">Xóa</button>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            variantIndex++;
        });

        document.addEventListener('click', e => {
            if (e.target.classList.contains('remove-variant')) {
                e.target.closest('.variant-row').remove();
            }
        });
    </script>

</div>
</html>
