<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Sản phẩm')}">

<div th:fragment="content" class="py-10 space-y-10">

    <!-- BREADCRUMB -->
    <div class="text-sm text-zinc-500">

        <a th:href="@{/}" class="hover:text-black transition">
            Trang chủ
        </a>

        <span class="mx-2">/</span>

        <a th:href="@{/products}" class="hover:text-black transition">
            Sản phẩm
        </a>

        <span th:if="${currentCategory != null}">
            <span class="mx-2">/</span>
            <span th:text="${currentCategory.name}"></span>
        </span>

        <span th:if="${currentSubCategory != null}">
            <span class="mx-2">/</span>
            <span th:text="${currentSubCategory.name}"></span>
        </span>

    </div>



    <div class="grid grid-cols-1 md:grid-cols-4 gap-10">

        <!-- SIDEBAR -->
        <aside class="space-y-8">

            <!-- CATEGORY -->
            <div>

                <h3 class="text-lg font-semibold mb-4">
                    Danh mục
                </h3>

                <div class="space-y-2">

                    <a th:each="cat : ${categories}" th:href="@{/products/{slug}(slug=${cat.slug})}"
                        class="block transition hover:text-black" th:classappend="${currentCategory != null and currentCategory.id == cat.id
                       ? 'font-semibold text-black'
                       : 'text-zinc-600'}">

                        <span th:text="${cat.name}"></span>

                    </a>

                </div>

            </div>



            <!-- SUB CATEGORY -->
            <div th:if="${currentCategory != null}">

                <h3 class="text-lg font-semibold mb-4">
                    Danh mục phụ
                </h3>

                <div class="space-y-2">

                    <a th:each="sub : ${subCategories}" th:href="@{/products/{catSlug}/{subSlug}
                       (catSlug=${currentCategory.slug}, subSlug=${sub.slug})}"
                        class="block transition hover:text-black" th:classappend="${currentSubCategory != null and currentSubCategory.id == sub.id
                       ? 'font-semibold text-black'
                       : 'text-zinc-600'}">

                        <span th:text="${sub.name}"></span>

                    </a>

                </div>

            </div>

        </aside>



        <!-- PRODUCT GRID -->
        <section class="md:col-span-3 space-y-6">

            <!-- SORT -->
            <div class="flex justify-between items-center">

                <p class="text-sm text-zinc-500">
                    Tìm thấy
                    <span th:text="${products.totalElements}"></span>
                    sản phẩm
                </p>


                <select class="border border-zinc-300 dark:border-zinc-700
                               rounded px-3 py-2 text-sm
                               bg-white dark:bg-zinc-900" onchange="window.location.href=this.value">

                    <option th:value="@{/products(sort='newest')}" th:selected="${sort == 'newest'}">
                        Mới nhất
                    </option>

                    <option th:value="@{/products(sort='price_asc')}" th:selected="${sort == 'price_asc'}">
                        Giá thấp → cao
                    </option>

                    <option th:value="@{/products(sort='price_desc')}" th:selected="${sort == 'price_desc'}">
                        Giá cao → thấp
                    </option>

                    <option th:value="@{/products(sort='best_seller')}" th:selected="${sort == 'best_seller'}">
                        Bán chạy
                    </option>

                </select>

            </div>



            <!-- EMPTY -->
            <div th:if="${products.content.isEmpty()}" class="text-center py-20 text-zinc-500">

                Không có sản phẩm

            </div>



            <!-- PRODUCT LIST -->
            <div class="grid grid-cols-2 lg:grid-cols-3 gap-6" th:if="${!products.content.isEmpty()}">

                <div th:each="product : ${products.content}" class="border border-zinc-200 dark:border-zinc-800
                            rounded-xl overflow-hidden
                            group hover:shadow-lg transition duration-300">

                    <a th:href="@{/products/{catSlug}/{subSlug}/{id}
                        (catSlug=${product.subCategory.category.slug},
                         subSlug=${product.subCategory.slug},
                         id=${product.id})}">


                        <!-- IMAGE -->
                        <img class="w-full aspect-square object-cover
                                   group-hover:scale-105 transition duration-300" th:src="${product.images != null and !product.images.isEmpty()
                                     ? product.images[0].imageUrl
                                     : '/images/no-image.png'}" />


                        <!-- INFO -->
                        <div class="p-4 space-y-2">

                            <h3 class="font-semibold line-clamp-2" th:text="${product.name}">
                            </h3>


                            <p class="text-sm text-zinc-600">

                                <span th:if="${product.minPrice != null and product.minPrice > 0}"
                                    th:text="${#numbers.formatDecimal(product.minPrice,0,'POINT',0,'COMMA')} + ' ₫'">
                                </span>

                                <span th:if="${product.minPrice == null or product.minPrice == 0}">
                                    Giá đang cập nhật
                                </span>

                            </p>

                        </div>

                    </a>

                </div>

            </div>

        </section>

    </div>

</div>

</html>
