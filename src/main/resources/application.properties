# ================= DATASOURCE CONFIG =================
spring.datasource.url=jdbc:mysql://localhost:3306/clothingstore
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — fail fast with a clear error if DB is unreachable
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
spring.mvc.hiddenmethod.filter.enabled=true

# ================= EMAIL CONFIG =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:nguyennhatminh1811@gmail.com}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================= SESSION CONFIG =================
spring.session.jdbc.initialize-schema=always
spring.session.timeout=24h

# ================= LOGGING CONFIG =================
logging.level.org.hibernate.SQL=WARN
logging.level.com.shop.clothingstore=DEBUG

# ================= CACHE CONFIG =================
spring.cache.type=caffeine

# ================= JWT CONFIG =================
# Required in runtime environments. Tests provide their own value under src/test/resources.
jwt.secret=${JWT_SECRET:DayLaSecretChiDungChoLocalDevKhongDungProduction}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
jwt.expiration=86400000

# ================= GRACEFUL SHUTDOWN =================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.info.env.enabled=true

# ================= ASYNC CONFIG =================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# ================= CHATBOT AI (Optional) =================
# Default OFF. Enable by setting:
# - chatbot.ai.enabled=true
chatbot.ai.enabled=${CHATBOT_AI_ENABLED:true}
chatbot.ai.timeout-ms=${CHATBOT_AI_TIMEOUT_MS:10000}
chatbot.ai.cooldown-seconds=${CHATBOT_AI_COOLDOWN_SECONDS:300}

# ---- OLLAMA (local) ----
chatbot.ai.ollama-base-url=${OLLAMA_BASE_URL:http://localhost:11434}
chatbot.ai.ollama-model=${OLLAMA_MODEL:llama3.2:3b}

# ================= FILE STORAGE =================
# Store uploads outside of src/ so they are not bundled into the JAR/classpath.
# Path is relative to the working directory (project root) when running locally.
upload.dir=uploads

# ================= VIRTUAL TRY-ON CONFIG =================
tryon.python.url=${TRYON_PYTHON_URL:http://localhost:8081}

# Local OOTDiffusion repo path (relative to python-tryon-server/ or absolute)
# Default: python-tryon-server/OOTDiffusion (cloned from GitHub)
tryon.ootd.root=${OOTD_ROOT:python-tryon-server/OOTDiffusion}

# GPU device index for local inference (0 = first GPU, -1 = CPU)
tryon.ootd.gpu=${GPU_ID:0}

# Set to 'true' to use offline mock instead of real inference (development only)
# NEVER set to 'true' in production — results will be FAKE
tryon.mock=${MOCK_INFERENCE:false}
