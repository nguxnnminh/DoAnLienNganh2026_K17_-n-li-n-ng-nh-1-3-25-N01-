<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | NOVA Admin'">NOVA Admin</title>

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        fadeIn: 'fadeIn 0.6s ease forwards'
                    },
                    keyframes: {
                        fadeIn: {
                            'from': { opacity: '0' },
                            'to': { opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            opacity: 0;
            animation: fadeInBody 0.8s ease forwards;
        }

        @keyframes fadeInBody {
            to { opacity: 1; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        .dark .glass {
            background: rgba(31, 41, 55, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-slideIn {
            animation: slideIn 0.4s ease forwards;
        }
    </style>
</head>

<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans">

<!-- MOBILE MENU -->
<div id="mobileOverlay" class="fixed inset-0 bg-black/60 z-50 hidden lg:hidden"></div>

<div id="mobileMenu"
     class="fixed top-0 right-0 bottom-0 w-80 bg-white dark:bg-zinc-900 shadow-2xl translate-x-full transition-transform duration-300 z-50 lg:hidden">

    <div class="p-6">
        <button id="mobileClose" class="text-3xl float-right">&times;</button>

        <div class="mt-10 space-y-6">
            <a th:href="@{/admin}" class="block py-2 text-lg font-medium">Bảng điều khiển</a>
            <a th:href="@{/admin/orders}" class="block py-2 text-lg font-medium">Đơn hàng</a>
            <a th:href="@{/admin/products}" class="block py-2 text-lg font-medium">Sản phẩm</a>
            <a th:href="@{/admin/users}" class="block py-2 text-lg font-medium">Người dùng</a>

            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="block py-2 text-red-600 font-medium w-full text-left">
                    Đăng xuất
                </button>
            </form>
        </div>
    </div>
</div>

<div class="min-h-screen flex flex-col lg:flex-row w-full">

    <!-- SIDEBAR -->
    <aside class="hidden lg:flex lg:w-72 flex-col bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800">
        <a th:href="@{/admin}" class="h-16 flex items-center px-8 border-b border-zinc-200 dark:border-zinc-800">
            <span class="text-2xl font-light">NOVA</span>
        </a>

        <nav class="flex-1 px-4 py-6">
            <ul class="space-y-1">
                <li><a th:href="@{/admin}" class="flex px-4 py-3 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Bảng điều khiển</a></li>
                <li><a th:href="@{/admin/orders}" class="flex px-4 py-3 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Đơn hàng</a></li>
                <li><a th:href="@{/admin/products}" class="flex px-4 py-3 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Sản phẩm</a></li>
                <li><a th:href="@{/admin/users}" class="flex px-4 py-3 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Người dùng</a></li>
            </ul>
        </nav>

        <div class="p-4 border-t border-zinc-200 dark:border-zinc-800">
            <div class="flex items-center gap-3 px-4 py-3 bg-zinc-100 dark:bg-zinc-800 rounded-2xl">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white">A</div>
                <div>
                    <div class="font-medium">Admin</div>
                    <div class="text-xs text-zinc-500">Quản trị viên</div>
                </div>
            </div>

            <form th:action="@{/logout}" method="post">
                <button type="submit"
                        class="block mt-4 text-red-600 text-sm font-medium px-4 py-2 w-full text-left hover:bg-red-50 rounded-xl transition">
                    Đăng xuất
                </button>
            </form>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col w-full min-w-0">

        <header class="h-16 border-b bg-white dark:bg-zinc-900 flex items-center px-6">
            <button id="hamburger" class="lg:hidden text-2xl">☰</button>
        </header>

        <main class="flex-1 w-full min-w-0 overflow-x-auto p-6 lg:p-10 relative">

            <!-- TOAST -->
            <div th:if="${success}" id="toastSuccess"
                 class="fixed top-6 right-6 z-50 bg-white dark:bg-zinc-900 border border-green-400
                        text-green-600 dark:text-green-400 px-6 py-4 rounded-2xl shadow-xl animate-slideIn">
                <div class="flex items-center gap-3">
                    <span th:text="${success}"></span>
                </div>
            </div>

            <div th:if="${error}" id="toastError"
                 class="fixed top-6 right-6 z-50 bg-white dark:bg-zinc-900 border border-red-400
                        text-red-600 dark:text-red-400 px-6 py-4 rounded-2xl shadow-xl animate-slideIn">
                <div class="flex items-center gap-3">
                    <span th:text="${error}"></span>
                </div>
            </div>

            <div th:insert="~{::content}"></div>
        </main>

        <footer class="border-t py-8 px-10 text-sm text-zinc-500 text-center">
            © 2026 NOVA Fashion
        </footer>
    </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal"
     class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center
            opacity-0 pointer-events-none transition duration-300 z-[100]">

    <div id="confirmBox"
         class="glass bg-white dark:bg-zinc-900 rounded-2xl p-8 w-[400px]
                transform scale-95 transition duration-300">

        <h2 class="text-lg font-semibold mb-4">Xác nhận hành động</h2>

        <p id="confirmMessage"
           class="text-sm text-zinc-500 mb-6">
            Bạn có chắc chắn muốn thực hiện hành động này?
        </p>

        <div class="flex justify-end gap-3">
            <button id="cancelConfirm"
                    class="px-5 py-2 rounded-xl border hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">
                Hủy
            </button>

            <button id="acceptConfirm"
                    class="px-5 py-2 rounded-xl bg-red-600 text-white hover:bg-red-700 transition">
                Xác nhận
            </button>
        </div>
    </div>
</div>

<script>
    // Toast auto hide
    document.addEventListener("DOMContentLoaded", function () {
        const toastSuccess = document.getElementById("toastSuccess");
        const toastError = document.getElementById("toastError");

        function autoHide(toast) {
            if (toast) {
                setTimeout(() => {
                    toast.style.opacity = "0";
                    toast.style.transform = "translateX(40px)";
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        }

        autoHide(toastSuccess);
        autoHide(toastError);
    });

    // Confirm Modal
    const modal = document.getElementById('confirmModal');
    const confirmBox = document.getElementById('confirmBox');
    const confirmMessage = document.getElementById('confirmMessage');
    const cancelBtn = document.getElementById('cancelConfirm');
    const acceptBtn = document.getElementById('acceptConfirm');

    let currentForm = null;

    function openConfirm(message, form) {
        currentForm = form;
        confirmMessage.textContent = message;
        modal.classList.remove('opacity-0', 'pointer-events-none');
        confirmBox.classList.remove('scale-95');
    }

    function closeConfirm() {
        modal.classList.add('opacity-0', 'pointer-events-none');
        confirmBox.classList.add('scale-95');
        currentForm = null;
    }

    cancelBtn.onclick = closeConfirm;

    acceptBtn.onclick = function () {
        if (currentForm) currentForm.submit();
    };

    document.addEventListener('click', function (e) {
        const trigger = e.target.closest('[data-confirm]');
        if (trigger) {
            e.preventDefault();
            const message = trigger.getAttribute('data-confirm');
            const form = trigger.closest('form');
            openConfirm(message, form);
        }
    });

    modal.addEventListener('click', function (e) {
        if (e.target === modal) closeConfirm();
    });

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const mobileClose = document.getElementById('mobileClose');

    if (hamburger) {
        hamburger.onclick = () => {
            mobileMenu.classList.remove('translate-x-full');
            mobileOverlay.classList.remove('hidden');
        }
    }

    if (mobileClose) {
        mobileClose.onclick = () => {
            mobileMenu.classList.add('translate-x-full');
            mobileOverlay.classList.add('hidden');
        }
    }

    if (mobileOverlay) {
        mobileOverlay.onclick = () => {
            mobileMenu.classList.add('translate-x-full');
            mobileOverlay.classList.add('hidden');
        }
    }
</script>

</body>
</html>
