<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- Thông báo -->
    <div th:if="${success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6">
        <strong>Thành công:</strong> <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
        <strong>Lỗi:</strong> <span th:text="${error}"></span>
    </div>

    <!-- Tiêu đề -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Quản lý khách hàng</h1>
    </div>

    <!-- Bảng -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 text-sm text-left">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-medium">
                    <tr>
                        <th class="px-6 py-4 whitespace-nowrap">ID</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Họ tên</th>
                        <th class="px-6 py-4">SĐT</th>
                        <th class="px-6 py-4">Địa chỉ</th>
                        <th class="px-6 py-4 text-center whitespace-nowrap">Vai trò</th>
                        <th class="px-6 py-4 text-right whitespace-nowrap">Hành động</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="user : ${users}" class="hover:bg-gray-50 transition duration-150">
                        <td class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">
                            #<span th:text="${user.id}"></span>
                        </td>
                        <td class="px-6 py-4 font-medium text-gray-900">
                            <div class="max-w-xs truncate" th:text="${user.email}"></div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="max-w-xs truncate" th:text="${user.fullName} ?: 'Chưa cập nhật'"></div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span th:text="${user.phone} ?: 'Chưa cập nhật'"></span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="max-w-xs truncate" th:text="${user.address} ?: 'Chưa cập nhật'"></div>
                        </td>
                        <td class="px-6 py-4 text-center whitespace-nowrap">
                            <span class="inline-flex px-2.5 py-1 rounded-full text-xs font-medium"
                                th:classappend="${user.role == 'ADMIN' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800'}">
                                <span th:text="${user.role}"></span>
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right whitespace-nowrap space-x-4">
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                                class="text-indigo-600 hover:text-indigo-800 font-medium text-sm transition">
                                Sửa
                            </a>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="inline"
                                onclick="return confirm('Bạn chắc chắn muốn xóa người dùng này? Tác vụ này không thể khôi phục.')">
                                <button type="submit" class="text-red-600 hover:text-red-800 font-medium text-sm">
                                    Xóa
                                </button>
                            </form>
                        </td>
                    </tr>

                    <!-- Không có dữ liệu -->
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7" class="px-6 py-16 text-center text-gray-500">
                            Chưa có khách hàng nào.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</html>
