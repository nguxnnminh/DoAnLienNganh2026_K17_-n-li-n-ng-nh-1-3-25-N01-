<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- PAGE HEADER -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
        <div>
            <h1 style="font-size:20px; font-weight:600; letter-spacing:-0.3px; margin:0 0 4px;">Orders</h1>
            <p style="font-size:13px; color:#9ca3af; margin:0;">
                Total <strong th:text="${orders?.totalElements ?: 0}" style="color:#374151;">0</strong> orders
            </p>
        </div>
    </div>

    <!-- SEARCH + FILTER BAR -->
    <form th:action="@{/admin/orders}" method="get" style="margin-bottom:16px;">
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">

            <!-- Keyword search -->
            <div style="flex:1; min-width:180px; max-width:280px;">
                <label style="display:block; font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;">Search</label>
                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="Name, phone, order ID…"
                       class="form-control">
            </div>

            <!-- Date From -->
            <div style="min-width:140px;">
                <label style="display:block; font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;">From</label>
                <input type="date" name="dateFrom" th:value="${dateFrom}" class="form-control">
            </div>

            <!-- Date To -->
            <div style="min-width:140px;">
                <label style="display:block; font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;">Big</label>
                <input type="date" name="dateTo" th:value="${dateTo}" class="form-control">
            </div>

            <div style="display:flex; gap:8px; align-items:flex-end; padding-bottom:1px;">
                <button type="submit" class="btn btn-primary">Filter</button>
                <a th:href="@{/admin/orders}" class="btn btn-secondary">Clear</a>
            </div>
        </div>
    </form>

    <!-- STATUS FILTER TABS — preserve search params -->
    <div style="display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;">
        <a th:href="@{/admin/orders(keyword=${keyword}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
           style="padding:7px 16px; border-radius:20px; font-size:13px; font-weight:500; text-decoration:none; border:1px solid;"
           th:style="${status == null} ? 'background:#2563eb;color:white;border-color:#2563eb;' : 'background:white;color:#4b5563;border-color:#e5e7eb;'">
            All
        </a>
        <th:block th:each="s : ${statuses}">
            <a th:href="@{/admin/orders(status=${s.name()}, keyword=${keyword}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
               th:text="${s.name()}"
               style="padding:7px 16px; border-radius:20px; font-size:13px; font-weight:500; text-decoration:none; border:1px solid;"
               th:style="${status == s.name()} ? 'background:#2563eb;color:white;border-color:#2563eb;' : 'background:white;color:#4b5563;border-color:#e5e7eb;'"></a>
        </th:block>
    </div>

    <!-- TABLE -->
    <div class="card">
        <div style="overflow-x:auto;">
            <table class="data-table" style="min-width:780px;">
                <thead>
                    <tr>
                        <th style="width:80px;">Order #</th>
                        <th>Customer</th>
                        <th>Address</th>
                        <th style="text-align:right;">Total</th>
                        <th style="text-align:center;">Status</th>
                        <th style="text-align:center;">Date</th>
                        <th style="text-align:center;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td>
                            <a th:href="@{/admin/orders/{id}(id=${o.id})}"
                               style="font-weight:700; color:#2563eb; text-decoration:none; font-family:'DM Mono',monospace;"
                               th:text="'#' + ${o.id}"></a>
                        </td>
                        <td>
                            <div style="font-weight:500;"
                                 th:text="${o.customerName ?: (o.actor?.fullName ?: 'Guest')}"></div>
                            <div style="font-size:12px; color:#9ca3af;"
                                 th:text="${o.actor?.email ?: (o.phone ?: '')}"></div>
                        </td>
                        <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; color:#6b7280;"
                            th:text="${o.address ?: '—'}"></td>
                        <td style="text-align:right; font-weight:600; white-space:nowrap;">
                            <span th:text="${o.total != null ? #numbers.formatDecimal(o.total,0,'POINT',0,'COMMA') : '—'}"></span>₫
                        </td>
                        <td style="text-align:center;">
                            <span class="badge"
                                  th:classappend="${o.status?.name() == 'PENDING'           ? ' badge-yellow' :
                                                   o.status?.name() == 'PROCESSING'        ? ' badge-blue'   :
                                                   o.status?.name() == 'SHIPPING'          ? ' badge-indigo' :
                                                   o.status?.name() == 'COMPLETED'         ? ' badge-green'  :
                                                   o.status?.name() == 'CANCEL_REQUESTED'  ? ' badge-yellow' : ' badge-red'}"
                                  th:style="${o.status?.name() == 'CANCEL_REQUESTED'} ? 'background:#fffbeb;color:#92400e;border-color:#fde68a;' : ''"
                                  th:text="${o.status}"></span>
                        </td>
                        <td style="text-align:center; font-size:12px; color:#6b7280; white-space:nowrap;"
                            th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td style="text-align:center;">
                            <a th:href="@{/admin/orders/{id}(id=${o.id})}" class="btn btn-sm btn-secondary">
                                View
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${orders == null or orders.isEmpty()}">
                        <td colspan="7" style="text-align:center; padding:48px; color:#9ca3af;">
                            <div style="margin-bottom:8px;">
                                <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto;display:block;opacity:0.4;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                            </div>
                            No orders found.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- PAGINATION — window of ±2, preserves all filter params -->
        <div th:if="${orders != null and orders.totalPages > 1}"
             style="padding:16px 20px; border-top:1px solid #f3f4f6; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
            <div style="font-size:13px; color:#9ca3af;">
                Page <strong style="color:#374151;" th:text="${orders.number + 1}"></strong> /
                <span th:text="${orders.totalPages}"></span>
                &nbsp;·&nbsp;<span th:text="${orders.totalElements}"></span> orders
            </div>
            <div class="pagination">
                <a th:if="${orders.number > 0}"
                   th:href="@{/admin/orders(page=${orders.number - 1}, keyword=${keyword}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
                   class="page-btn">←</a>

                <a th:if="${pageWindowStart > 0}"
                   th:href="@{/admin/orders(page=0, keyword=${keyword}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
                   class="page-btn">1</a>
                <span th:if="${showStartEllipsis}" class="page-btn" style="border:none;cursor:default;color:#9ca3af;">…</span>

                <th:block th:each="i : ${#numbers.sequence(pageWindowStart, pageWindowEnd)}">
                    <a th:href="@{/admin/orders(page=${i}, keyword=${keyword}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
                       th:text="${i + 1}"
                       class="page-btn"
                       th:classappend="${i == orders.number} ? ' active' : ''"></a>
                </th:block>

                <span th:if="${showEndEllipsis}" class="page-btn" style="border:none;cursor:default;color:#9ca3af;">…</span>
                <a th:if="${pageWindowEnd < orders.totalPages - 1}"
                   th:href="@{/admin/orders(page=${orders.totalPages - 1}, keyword=${keyword}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
                   class="page-btn" th:text="${orders.totalPages}"></a>

                <a th:if="${orders.number < orders.totalPages - 1}"
                   th:href="@{/admin/orders(page=${orders.number + 1}, keyword=${keyword}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
                   class="page-btn">→</a>
            </div>
        </div>
    </div>

</div>
</html>
