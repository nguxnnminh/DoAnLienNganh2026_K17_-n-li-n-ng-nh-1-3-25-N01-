<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Trang chủ')}">

<div th:fragment="content" class="space-y-28">


    <!-- ================= HERO ================= -->
    <section class="relative w-screen h-screen left-1/2 right-1/2 -ml-[50vw] -mr-[50vw] overflow-hidden">

        <!-- BACKGROUND -->
        <img src="/images/winter-collection.png" alt="NOVA Essentials"
            class="absolute inset-0 w-full h-full object-cover object-center" />

        <!-- OVERLAY -->
        <div class="absolute inset-0 bg-black/30"></div>

        <!-- BUTTON -->
        <div class="absolute bottom-16 left-1/2 -translate-x-1/2 z-10">

            <a th:href="@{/products}" class="px-12 py-3 border border-white text-sm tracking-[0.25em]
                      text-white uppercase
                      transition duration-300
                      hover:bg-white hover:text-black">

                Mua sắm ngay

            </a>

        </div>

    </section>


    <!-- ================= FEATURED ================= -->
    <section class="space-y-16">

        <div class="text-center space-y-2">

            <h2 class="text-3xl font-semibold tracking-tight">
                Sản phẩm bán chạy
            </h2>

            <p class="text-zinc-500 text-sm">
                Những thiết kế được khách hàng yêu thích nhất
            </p>

        </div>


        <!-- GRID -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10">


            <!-- ===== 2 sản phẩm TOP ===== -->
            <div th:each="product : ${topProducts}" class="group">

                <a th:href="@{'/products/' + ${product.subCategory.category.slug} + '/' + ${product.subCategory.slug} + '/' + ${product.id}}"
                    class="block space-y-4">

                    <div class="relative aspect-[3/4] overflow-hidden rounded-2xl bg-zinc-100 dark:bg-zinc-800">

                        <img th:if="${product.images != null and !product.images.isEmpty()}"
                            th:src="${product.images[0].imageUrl}"
                            class="w-full h-full object-cover transition duration-700 group-hover:scale-105" />

                        <img th:if="${product.images != null and product.images.size() > 1}"
                            th:src="${product.images[1].imageUrl}"
                            class="absolute inset-0 w-full h-full object-cover opacity-0 transition duration-500 group-hover:opacity-100" />

                    </div>

                    <div class="space-y-1">

                        <h3 class="text-sm font-medium uppercase tracking-wide" th:text="${product.name}">
                        </h3>

                        <p class="text-sm text-zinc-500">

                            <span th:text="${product.productVariants != null and !product.productVariants.isEmpty()}
    ? ${#numbers.formatDecimal(product.productVariants[0].price,0,'COMMA',0,'POINT')}
    : 'Giá đang cập nhật
'"></span>
                            ₫

                        </p>

                    </div>

                </a>

            </div>


            <!-- ===== 1 sản phẩm BOTTOM ===== -->
            <div th:each="product : ${bottomProducts}" class="group">

                <a th:href="@{'/products/' + ${product.subCategory.category.slug} + '/' + ${product.subCategory.slug} + '/' + ${product.id}}"
                    class="block space-y-4">

                    <div class="relative aspect-[3/4] overflow-hidden rounded-2xl bg-zinc-100 dark:bg-zinc-800">

                        <img th:if="${product.images != null and !product.images.isEmpty()}"
                            th:src="${product.images[0].imageUrl}"
                            class="w-full h-full object-cover transition duration-700 group-hover:scale-105" />

                        <img th:if="${product.images != null and product.images.size() > 1}"
                            th:src="${product.images[1].imageUrl}"
                            class="absolute inset-0 w-full h-full object-cover opacity-0 transition duration-500 group-hover:opacity-100" />

                    </div>

                    <div class="space-y-1">

                        <h3 class="text-sm font-medium uppercase tracking-wide" th:text="${product.name}">
                        </h3>

                        <p class="text-sm text-zinc-500">

                            <span th:text="${product.productVariants != null and !product.productVariants.isEmpty()}
    ? ${#numbers.formatDecimal(product.productVariants[0].price,0,'COMMA',0,'POINT')}
    : 'Giá đang cập nhật
'"></span>
                            ₫

                        </p>

                    </div>

                </a>

            </div>


            <!-- ===== 1 sản phẩm ACCESSORIES ===== -->
            <div th:each="product : ${accessoriesProducts}" class="group">

                <a th:href="@{'/products/' + ${product.subCategory.category.slug} + '/' + ${product.subCategory.slug} + '/' + ${product.id}}"
                    class="block space-y-4">

                    <div class="relative aspect-[3/4] overflow-hidden rounded-2xl bg-zinc-100 dark:bg-zinc-800">

                        <img th:if="${product.images != null and !product.images.isEmpty()}"
                            th:src="${product.images[0].imageUrl}"
                            class="w-full h-full object-cover transition duration-700 group-hover:scale-105" />

                        <img th:if="${product.images != null and product.images.size() > 1}"
                            th:src="${product.images[1].imageUrl}"
                            class="absolute inset-0 w-full h-full object-cover opacity-0 transition duration-500 group-hover:opacity-100" />

                    </div>

                    <div class="space-y-1">

                        <h3 class="text-sm font-medium uppercase tracking-wide" th:text="${product.name}">
                        </h3>

                        <p class="text-sm text-zinc-500">

                            <span th:text="${product.productVariants != null and !product.productVariants.isEmpty()}
                                ? ${#numbers.formatDecimal(product.productVariants[0].price,0,'COMMA',0,'POINT')}
                                : 'Giá đang cập nhật'"></span>
                            ₫

                        </p>

                    </div>

                </a>

            </div>


        </div>

    </section>

</div>

</html>
