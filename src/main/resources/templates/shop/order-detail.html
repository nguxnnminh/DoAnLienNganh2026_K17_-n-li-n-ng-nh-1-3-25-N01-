<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Order Detail — Nova')}">
<div th:fragment="content">
  <style>
    .status-badge { display:inline-block; font-size:.5rem; letter-spacing:.25em; text-transform:uppercase; padding:5px 14px; border:1px solid; }
    .status-PENDING        { border-color:#4a3a10; color:#c8a52b; }
    .status-CONFIRMED,
    .status-PROCESSING     { border-color:#1a3a4a; color:#4a9bbf; }
    .status-SHIPPING       { border-color:#2a1a4a; color:#8a6dbf; }
    .status-COMPLETED      { border-color:#1a4a2a; color:#6dbf6d; }
    .status-CANCELLED         { border-color:#4a1a1a; color:#bf6d6d; }
    .status-CANCEL_REQUESTED  { border-color:#4a3010; color:#c87a20; }

    .star { font-size:1.2rem; cursor:pointer; color:#444; transition:color .2s; }
    .star.lit { color:#f5f5f3; }

    .review-input {
      width:100%; background:transparent; border:1px solid #303030; color:#f5f5f3;
      padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:.75rem; resize:none; outline:none;
      transition:border-color .2s;
    }
    .review-input:focus { border-color:#777; }
    .review-input::placeholder { color:#555; font-size:.65rem; letter-spacing:.08em; }
  </style>

  <div class="max-w-[1400px] mx-auto px-4 md:px-8 lg:px-12 py-10 md:py-16">

    <!-- BACK + HEADER -->
    <div class="mb-8 md:mb-12">
      <a th:href="@{/my-orders}"
        class="text-[0.55rem] tracking-widest uppercase text-zinc-600 no-underline inline-flex items-center gap-2 mb-6 transition-colors duration-200 hover:text-[#f5f5f3]">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Orders
      </a>

      <div class="flex justify-between items-end border-b border-zinc-900 pb-6 md:pb-8">
        <div>
          <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-2">Order</p>
          <h1 class="font-display text-4xl md:text-6xl tracking-wide leading-none text-[#f5f5f3]">
            #<span th:text="${order.id}"></span>
          </h1>
          <p class="text-[0.6rem] tracking-widest uppercase text-zinc-600 mt-2"
            th:text="${#temporals.format(order.createdAt,'dd MMM yyyy · HH:mm')}"></p>
        </div>
        <span class="status-badge self-start sm:self-auto" th:classappend="'status-' + ${order.status.name()}"
          th:text="${order.status}"></span>
      </div>
    </div>

    <!-- FLASH MESSAGES -->
    <div th:if="${success}" class="mb-6 px-4 py-3 border text-[0.6rem] tracking-widest uppercase"
         style="border-color:#2a4a2a; color:#6dbf6d; background:rgba(109,191,109,0.06);"
         th:text="${success}"></div>
    <div th:if="${error}" class="mb-6 px-4 py-3 border text-[0.6rem] tracking-widest uppercase"
         style="border-color:#4a1a1a; color:#bf6d6d; background:rgba(191,109,109,0.06);"
         th:text="${error}"></div>

    <!-- CANCEL REQUEST REVIEW BANNER -->
    <div th:if="${order.status?.name() == 'CANCEL_REQUESTED'}"
         class="mb-8 px-5 py-4 border flex flex-col gap-3"
         style="border-color:#4a3010; background:rgba(200,122,32,0.05);">
      <p class="text-[0.55rem] tracking-widest uppercase" style="color:#c87a20;">
        Cancellation Request Under Review
      </p>
      <p class="text-[0.65rem] text-zinc-500" th:if="${order.cancelReason != null and !order.cancelReason.isEmpty()}">
        Your reason: <span class="text-zinc-400" th:text="${order.cancelReason}"></span>
      </p>
      <p class="text-[0.55rem] tracking-widest uppercase text-zinc-700">
        The shop will review your request and respond shortly.
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-8 md:gap-12 items-start">

      <!-- ITEMS + REVIEWS -->
      <div>
        <p class="text-[0.5rem] tracking-widest3 uppercase text-zinc-700 mb-6">Items</p>

        <div th:each="item : ${order.items}" class="py-6 border-b border-zinc-900">
          <div class="flex justify-between items-start mb-4">
            <div>
              <p class="text-[0.75rem] tracking-widest uppercase text-[#f5f5f3] mb-1.5"
                th:text="${item.productName}"></p>
              <p class="text-[0.6rem] tracking-widest uppercase text-zinc-600">
                <span th:text="${item.size}"></span> · <span th:text="${item.color}"></span> · ×<span th:text="${item.quantity}"></span>
              </p>
            </div>
            <span class="text-[0.75rem] text-zinc-500"
              th:text="${#numbers.formatDecimal(item.price,0,'POINT',0,'COMMA')} + ' ₫'"></span>
          </div>

          <!-- REVIEW SECTION -->
          <div th:if="${isCompleted}">
            <span th:if="${reviewedItemIds.contains(item.id)}"
              class="text-[0.55rem] tracking-widest uppercase text-[#6dbf6d] border border-[#2a4a2a] px-3 py-1 inline-block">
              Reviewed
            </span>

            <div th:unless="${reviewedItemIds.contains(item.id)}">
              <button th:attr="onclick='toggleReview(' + ${item.id} + ')'"
                class="text-[0.55rem] tracking-widest uppercase text-zinc-500 bg-transparent border border-zinc-800 px-3.5 py-1.5 cursor-pointer transition-all duration-200 hover:border-zinc-500 hover:text-[#f5f5f3] font-body">
                Leave Review
              </button>

              <form th:id="'rf-' + ${item.id}" th:action="@{/reviews/{id}(id=${item.id})}" method="post"
                enctype="multipart/form-data"
                class="hidden mt-4 p-5 border border-zinc-800 bg-[#161616]">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="starSelect flex gap-1.5 mb-4" th:data-item-id="${item.id}">
                  <input type="hidden" name="rating" th:id="'ri-' + ${item.id}" />
                  <span th:each="i : ${#numbers.sequence(1,5)}" class="star" th:data-value="${i}">★</span>
                </div>

                <textarea name="comment" required rows="3" class="review-input mb-3"
                  placeholder="Share your thoughts..."></textarea>

                <!-- Attach photos (optional, max 5, each ≤ 5MB) -->
                <label class="block text-[0.55rem] tracking-widest uppercase text-zinc-500 mb-2">
                  Attach Photos (optional)
                </label>
                <input type="file" name="images" accept="image/jpeg,image/png,image/webp" multiple
                  class="block w-full text-[0.6rem] text-zinc-500 mb-3
                         file:mr-3 file:py-1.5 file:px-3 file:border-0 file:bg-zinc-800 file:text-zinc-300
                         file:text-[0.55rem] file:uppercase file:tracking-widest file:cursor-pointer" />

                <button type="submit"
                  class="px-6 py-2.5 bg-[#f5f5f3] text-[#0a0a0a] border-none font-body text-[0.6rem] tracking-widest uppercase font-medium cursor-pointer transition-colors duration-200 hover:bg-[#ccc]">
                  Submit
                </button>
              </form>
            </div>
          </div>

          <button th:unless="${isCompleted}" disabled
            class="text-[0.55rem] tracking-widest uppercase text-zinc-800 bg-transparent border border-zinc-900 px-3 py-1.5 cursor-not-allowed font-body">
            Review after delivery
          </button>
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="lg:sticky lg:top-24 border border-zinc-800/60 p-6 md:p-7">
        <p class="text-[0.5rem] tracking-widest3 uppercase text-zinc-700 mb-5">Summary</p>

        <div class="flex flex-col gap-2.5 mb-5">
          <div class="flex justify-between">
            <span class="text-[0.6rem] tracking-widest uppercase text-zinc-600">Name</span>
            <span class="text-[0.6rem] text-zinc-500" th:text="${order.customerName}"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-[0.6rem] tracking-widest uppercase text-zinc-600">Phone</span>
            <span class="text-[0.6rem] text-zinc-500" th:text="${order.phone}"></span>
          </div>
          <div>
            <span class="text-[0.6rem] tracking-widest uppercase text-zinc-600 block mb-1">Address</span>
            <span class="text-[0.6rem] text-zinc-500 leading-relaxed" th:text="${order.address}"></span>
          </div>
        </div>

        <div class="h-px bg-zinc-900 mb-5"></div>

        <div class="flex justify-between mb-2">
          <span class="text-[0.6rem] tracking-widest uppercase text-zinc-600">Subtotal</span>
          <span class="text-[0.6rem] text-zinc-500"
            th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')} + ' ₫'"></span>
        </div>
        <div class="flex justify-between mb-5">
          <span class="text-[0.6rem] tracking-widest uppercase text-zinc-600">Shipping</span>
          <span th:if="${order.shippingFee == null or order.shippingFee == 0}"
                class="text-[0.6rem] text-[#6dbf6d]">Free</span>
          <span th:unless="${order.shippingFee == null or order.shippingFee == 0}"
                class="text-[0.6rem] text-zinc-500"
                th:text="${#numbers.formatDecimal(order.shippingFee,0,'POINT',0,'COMMA')}+' ₫'"></span>
        </div>

        <div class="h-px bg-zinc-900 mb-5"></div>
        <div class="flex justify-between">
          <span class="text-[0.65rem] tracking-widest uppercase text-[#f5f5f3]">Total</span>
          <span class="text-[0.9rem] text-[#f5f5f3]"
            th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')} + ' ₫'"></span>
        </div>

        <!-- CANCEL (PENDING) -->
        <div th:if="${order.status?.name() == 'PENDING'}" class="mt-6 pt-5 border-t border-zinc-900">
          <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post"
                onsubmit="return confirm('Cancel this order? This cannot be undone.')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
              class="w-full py-2.5 bg-transparent border border-zinc-800 text-[0.55rem] tracking-widest uppercase text-zinc-500 cursor-pointer transition-all duration-200 hover:border-[#bf6d6d] hover:text-[#bf6d6d] font-body">
              Cancel Order
            </button>
          </form>
        </div>

        <!-- REQUEST CANCELLATION (PROCESSING) -->
        <div th:if="${order.status?.name() == 'PROCESSING'}" class="mt-6 pt-5 border-t border-zinc-900">
          <button onclick="document.getElementById('cancelReqForm').classList.toggle('hidden')"
            class="w-full py-2.5 bg-transparent border border-zinc-800 text-[0.55rem] tracking-widest uppercase text-zinc-500 cursor-pointer transition-all duration-200 hover:border-[#c87a20] hover:text-[#c87a20] font-body">
            Request Cancellation
          </button>
          <form id="cancelReqForm" th:action="@{/orders/{id}/cancel-request(id=${order.id})}" method="post"
                class="hidden mt-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <textarea name="reason" rows="3" maxlength="500"
              class="review-input mb-3" placeholder="Reason for cancellation (optional)…"></textarea>
            <button type="submit"
              class="w-full py-2.5 bg-transparent border text-[0.55rem] tracking-widest uppercase cursor-pointer transition-colors duration-200 font-body"
              style="border-color:#4a3010; color:#c87a20;"
              onmouseover="this.style.background='rgba(200,122,32,0.08)'"
              onmouseout="this.style.background='transparent'">
              Submit Request
            </button>
          </form>
        </div>

      </div>

    </div>
  </div>

  <script>
    function toggleReview(id) {
      const f = document.getElementById('rf-' + id);
      f.classList.toggle('hidden');
    }

    document.querySelectorAll('.starSelect').forEach(function(container) {
      const stars = container.querySelectorAll('.star');
      const id = container.dataset.itemId;
      const input = document.getElementById('ri-' + id);
      let selected = 0;

      function paint(n) {
        stars.forEach(function(s) {
          s.classList.toggle('lit', Number(s.dataset.value) <= n);
        });
      }

      stars.forEach(function(s) {
        s.addEventListener('mouseenter', function() { paint(this.dataset.value); });
        s.addEventListener('mouseleave', function() { paint(selected); });
        s.addEventListener('click', function() {
          selected = Number(this.dataset.value);
          input.value = selected;
          paint(selected);
        });
      });

      const form = container.closest('form');
      if (form) {
        form.addEventListener('submit', function(e) {
          if (!input.value) { e.preventDefault(); alert('Please select a star rating.'); }
        });
      }
    });
  </script>
</div>
</html>
