<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, ${product.name})}">

<div th:fragment="content" class="py-10 space-y-20">

    <!-- ================= PRODUCT ================= -->
    <div class="grid lg:grid-cols-2 gap-12 items-start">

        <!-- ================= IMAGE ================= -->
        <div class="space-y-4">

            <!-- MAIN IMAGE -->
            <img id="mainImage"
                class="w-full aspect-square object-cover rounded-2xl border border-zinc-200 dark:border-zinc-800"
                th:src="${product.images != null and !product.images.isEmpty()
                         ? product.images[0].imageUrl
                         : '/images/no-image.png'}" />

            <!-- THUMBNAILS -->
            <div class="flex gap-3 overflow-x-auto pb-2">

                <img th:each="img,iter : ${product.images}" th:src="${img.imageUrl}" th:data-src="${img.imageUrl}"
                    th:classappend="${iter.index == 0 ? 'active-thumb' : ''}" class="thumb w-20 h-20 object-cover rounded-xl border
                            border-zinc-200 dark:border-zinc-800
                            cursor-pointer hover:opacity-100" />

            </div>

        </div>



        <!-- ================= INFO ================= -->
        <div class="space-y-6 lg:sticky lg:top-28 h-fit">

            <!-- NAME -->
            <h1 class="text-3xl font-semibold tracking-tight" th:text="${product.name}">
            </h1>


            <!-- PRICE -->
            <p id="priceText" class="text-xl font-medium text-blue-600">
                Vui lòng chọn size và màu
            </p>


            <!-- DESCRIPTION -->
            <p class="text-zinc-600 dark:text-zinc-400" th:text="${product.description}">
            </p>



            <!-- ================= VARIANTS ================= -->
            <div class="space-y-6">

                <!-- SIZE -->
                <div>

                    <p class="text-sm font-medium mb-2">
                        Size
                    </p>

                    <div class="flex gap-2 flex-wrap">

                        <button th:each="s : ${sizes}" type="button" th:data-size="${s}" th:text="${s}" class="variant-btn size-btn
                                       px-4 py-2 border rounded-md text-sm
                                       border-zinc-300 dark:border-zinc-700
                                       transition">
                        </button>

                    </div>

                </div>



                <!-- COLOR -->
                <div>

                    <p class="text-sm font-medium mb-2">
                        Màu
                    </p>

                    <div class="flex gap-2 flex-wrap">

                        <button th:each="c : ${colors}" type="button" th:data-color="${c}" th:text="${c}" class="variant-btn color-btn
                                       px-4 py-2 border rounded-md text-sm
                                       border-zinc-300 dark:border-zinc-700
                                       transition">
                        </button>

                    </div>

                </div>

            </div>



            <!-- ================= ADD TO CART ================= -->
            <form method="post" th:action="@{/cart/add}" class="space-y-4">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <input type="hidden" id="variantIdInput" name="variantId" />


                <div class="flex gap-4">

                    <input type="number" name="quantity" min="1" value="1" class="w-20 border border-zinc-300 dark:border-zinc-700
                                  rounded-lg px-3 py-2 text-center
                                  bg-white dark:bg-zinc-900" />

                    <button type="submit" id="addBtn" class="flex-1 bg-black text-white
                                   py-3 rounded-xl
                                   hover:bg-zinc-800 transition">

                        Thêm vào giỏ

                    </button>

                </div>

            </form>

        </div>

    </div>



    <!-- ================= REVIEWS ================= -->
    <div class="border-t border-zinc-200 dark:border-zinc-800 pt-10">

        <h2 class="text-2xl font-semibold mb-6">
            Đánh giá sản phẩm
        </h2>



        <!-- AVERAGE -->
        <div class="flex items-center gap-3 mb-8">

            <div class="flex text-2xl">

                <span th:each="i : ${#numbers.sequence(1,5)}"
                    th:classappend="${averageRating >= i} ? 'text-yellow-400' : 'text-gray-300'">
                    ★
                </span>

            </div>

            <span class="text-zinc-600">

                <strong th:text="${#numbers.formatDecimal(averageRating,1,1)}"></strong>

                (<span th:text="${reviewCount}"></span> đánh giá)

            </span>

        </div>



        <!-- REVIEW LIST -->
        <div class="space-y-6">

            <div th:each="review : ${reviews}" class="border-b border-zinc-200 dark:border-zinc-800 pb-4">

                <div class="flex justify-between">

                    <strong th:text="${review.actor.fullName}"></strong>

                    <small th:text="${#temporals.format(review.createdAt,'dd/MM/yyyy')}"></small>

                </div>


                <div class="flex text-lg mt-1">

                    <span th:each="i : ${#numbers.sequence(1,5)}"
                        th:classappend="${review.rating >= i} ? 'text-yellow-400' : 'text-gray-300'">
                        ★
                    </span>

                </div>


                <p class="mt-2 text-zinc-700 dark:text-zinc-400" th:text="${review.comment}">
                </p>

            </div>

        </div>

    </div>



    <style>
        .thumb {
            opacity: 0.6;
            transition: 0.2s;
        }

        .thumb.active-thumb {
            opacity: 1;
            border: 2px solid black !important;
        }

        .variant-btn.active {
            background: black !important;
            color: white !important;
            border-color: black !important;
        }

        .variant-btn.out {
            opacity: 0.4;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .add-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>

    <!-- ================= SCRIPT ================= -->
    <script th:inline="javascript">

        document.addEventListener("DOMContentLoaded", function () {

            const variants = /*[[${variantsJson}]]*/[];

            let selectedSize = null;
            let selectedColor = null;
            let currentVariant = null;

            const priceText = document.getElementById("priceText");
            const variantInput = document.getElementById("variantIdInput");
            const addBtn = document.getElementById("addBtn");
            const qtyInput = document.querySelector("input[name='quantity']");

            const stockMsg = document.createElement("p");
            stockMsg.className = "text-sm font-medium";
            priceText.after(stockMsg);


            /* INIT */
            addBtn.disabled = true;
            addBtn.classList.add("add-disabled");


            /* IMAGE SWITCH */
            document.querySelectorAll(".thumb").forEach(el => {
                el.addEventListener("click", () => {
                    document.getElementById("mainImage").src = el.dataset.src;

                    document.querySelectorAll(".thumb").forEach(t => {
                        t.classList.remove("active-thumb");
                    });

                    el.classList.add("active-thumb");
                });
            });


            function findVariant(size, color) {
                return variants.find(v => v.size === size && v.color === color);
            }


            function disableAdd() {
                addBtn.disabled = true;
                addBtn.classList.add("add-disabled");
            }

            function enableAdd() {
                addBtn.disabled = false;
                addBtn.classList.remove("add-disabled");
            }


            function updateAvailability() {

                document.querySelectorAll(".size-btn").forEach(btn => {
                    const size = btn.dataset.size;
                    const hasStock = variants.some(v => v.size === size && v.stock > 0);

                    btn.classList.toggle("out", !hasStock);
                    btn.disabled = !hasStock;
                });

                document.querySelectorAll(".color-btn").forEach(btn => {
                    const color = btn.dataset.color;
                    const hasStock = variants.some(v => v.color === color && v.stock > 0);

                    btn.classList.toggle("out", !hasStock);
                    btn.disabled = !hasStock;
                });

            }


            function updateStockUI(v) {

                if (!v || v.stock === 0) {
                    stockMsg.innerHTML = "Hết hàng";
                    stockMsg.className = "text-red-500 text-sm font-medium";
                    disableAdd();
                    return;
                }

                if (Number(qtyInput.value) > v.stock) {
                    stockMsg.innerHTML = "Số lượng vượt quá tồn kho";
                    stockMsg.className = "text-red-500 text-sm font-medium";
                    disableAdd();
                    return;
                }

                if (v.stock <= 5) {
                    stockMsg.innerHTML = "Chỉ còn " + v.stock + " sản phẩm";
                    stockMsg.className = "text-orange-500 text-sm font-medium";
                } else {
                    stockMsg.innerHTML = "";
                }

                enableAdd();

            }


            function updateVariant() {

                if (!selectedSize || !selectedColor) {
                    disableAdd();
                    stockMsg.innerHTML = "";
                    return;
                }

                const v = findVariant(selectedSize, selectedColor);
                if (!v) return;

                currentVariant = v;
                variantInput.value = v.id;

                if (!v.price || v.price === 0) {
                    priceText.innerHTML = "Liên hệ";
                } else {
                    priceText.innerHTML = Number(v.price).toLocaleString("vi-VN") + " ₫";
                }

                updateStockUI(v);

            }


            document.querySelectorAll(".size-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));

                    btn.classList.add("active");
                    selectedSize = btn.dataset.size;

                    updateVariant();
                });
            });


            document.querySelectorAll(".color-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));

                    btn.classList.add("active");
                    selectedColor = btn.dataset.color;

                    updateVariant();
                });
            });


            qtyInput.addEventListener("input", () => {
                if (!currentVariant) return;
                updateStockUI(currentVariant);
            });


            updateAvailability();


            if (variants.length && variants.every(v => v.stock === 0)) {

                stockMsg.innerHTML = "Sản phẩm đã hết hàng";
                stockMsg.className = "text-red-500 text-sm font-medium";

                disableAdd();

                document.querySelectorAll(".variant-btn").forEach(b => {
                    b.classList.add("out");
                });

            }

        });
    </script>

</div>

</html>
