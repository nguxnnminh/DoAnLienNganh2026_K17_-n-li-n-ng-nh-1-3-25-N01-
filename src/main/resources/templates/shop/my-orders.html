<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'My Orders — Nova')}">
<div th:fragment="content">
  <style>
    .status-badge {
      display: inline-block;
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      padding: 5px 13px;
      border: 1px solid;
    }

    .status-PENDING {
      border-color: #4a3a10;
      color: #c8a52b;
    }

    .status-CONFIRMED,
    .status-PROCESSING {
      border-color: #1a3a4a;
      color: #5a9bbf;
    }

    .status-SHIPPING {
      border-color: #2a1a4a;
      color: #8a6dbf;
    }

    .status-COMPLETED {
      border-color: #1a4a2a;
      color: #6dbf6d;
    }

    .status-CANCELLED {
      border-color: #4a1a1a;
      color: #bf7070;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      padding: 32px 0;
      border-bottom: 1px solid #1a1a1a;
      text-decoration: none;
      color: inherit;
      transition: opacity .2s;
    }

    .order-row:hover {
      opacity: .78;
    }
  </style>

  <div style="max-width:960px; margin:0 auto; padding:64px 56px;">
    <div style="margin-bottom:52px; border-bottom:1px solid #1a1a1a; padding-bottom:28px;">
      <p style="font-size:.6rem; letter-spacing:.42em; text-transform:uppercase; color:#444; margin-bottom:10px;">
        Account</p>
      <h1
        style="font-family:'Bebas Neue',sans-serif; font-size:4rem; letter-spacing:.06em; line-height:1; color:#f5f5f3;">
        My Orders</h1>
    </div>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(orders)}" style="text-align:center; padding:80px 0; border:1px solid #1a1a1a;">
      <p
        style="font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:.08em; color:#1e1e1e; margin-bottom:28px;">
        No Orders Yet</p>
      <a th:href="@{/products}"
        style="font-size:.68rem; letter-spacing:.28em; text-transform:uppercase; color:#555; text-decoration:none; display:inline-flex; align-items:center; gap:8px; transition:color .2s;"
        onmouseover="this.style.color='#c0c0bc'" onmouseout="this.style.color='#555'">
        Start Shopping
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </a>
    </div>

    <!-- ORDERS -->
    <div th:unless="${#lists.isEmpty(orders)}">
      <a th:each="order : ${orders}" th:href="@{/orders/{id}(id=${order.id})}" class="order-row">
        <div style="flex:1;">
          <div style="display:flex; align-items:center; gap:16px; margin-bottom:12px; flex-wrap:wrap;">
            <span style="font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:#e8e8e4;"
              th:text="'Order #' + ${order.id}"></span>
            <span class="status-badge" th:classappend="'status-' + ${order.status.name()}"
              th:text="${order.status}"></span>
          </div>
          <p style="font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:#555; margin-bottom:6px;"
            th:text="${#temporals.format(order.createdAt,'dd MMM yyyy · HH:mm')}"></p>
          <p style="font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:#3a3a3a;">
            <span th:text="${order.items.size()}"></span>&nbsp;item<span th:if="${order.items.size() > 1}">s</span>
          </p>
        </div>
        <div style="text-align:right; flex-shrink:0;">
          <p style="font-size:.95rem; letter-spacing:.05em; color:#c0c0bc; margin-bottom:10px;"
            th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')} + ' ₫'"></p>
          <span
            style="font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:#444; display:flex; align-items:center; gap:6px; justify-content:flex-end;">
            View
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </span>
        </div>
      </a>
    </div>
  </div>
</div>

</html>
