<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Trang chủ')}">

<div th:fragment="content" class="space-y-28">

    <!-- ================= HERO ================= -->
    <section class="text-center max-w-3xl mx-auto space-y-8">

        <h1 class="text-5xl md:text-6xl font-semibold tracking-tight leading-tight">
            Modern Essentials
        </h1>

        <p class="text-zinc-500 text-lg">
            Premium basics designed for everyday wear
        </p>

        <a th:href="@{/products}"
           class="inline-block px-10 py-3 border border-zinc-900 dark:border-zinc-100 
                  text-sm uppercase tracking-wider 
                  hover:bg-zinc-900 hover:text-white 
                  dark:hover:bg-white dark:hover:text-black 
                  transition">
            Shop Now
        </a>

    </section>



    <!-- ================= FEATURED ================= -->
    <section class="space-y-16">

        <div class="text-center space-y-2">
            <h2 class="text-3xl font-semibold tracking-tight">
                Featured Products
            </h2>

            <p class="text-zinc-500 text-sm">
                Curated pieces selected by NOVA
            </p>
        </div>



        <!-- GRID -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10">

            <div th:each="product : ${products}"
                 class="group">

                <a th:href="${
                        product.subCategory != null and product.subCategory.category != null
                        ? '/products/' + product.subCategory.category.slug + '/' + product.subCategory.slug + '/' + product.id
                        : '/product/' + product.id
                }"
                   class="block space-y-4">

                    <!-- IMAGE -->
                    <div class="relative aspect-[3/4] overflow-hidden rounded-2xl bg-zinc-100 dark:bg-zinc-800">

                        <!-- PRIMARY -->
                        <img th:if="${product.images != null and !product.images.isEmpty()}"
                             th:src="${product.images[0].imageUrl}"
                             class="w-full h-full object-cover transition duration-700 group-hover:scale-105" />

                        <!-- SECOND IMAGE -->
                        <img th:if="${product.images != null and product.images.size() > 1}"
                             th:src="${product.images[1].imageUrl}"
                             class="absolute inset-0 w-full h-full object-cover opacity-0 transition duration-500 group-hover:opacity-100" />

                        <!-- FALLBACK -->
                        <div th:if="${product.images == null or product.images.isEmpty()}"
                             class="flex items-center justify-center h-full text-sm text-zinc-400">
                            No image
                        </div>

                    </div>


                    <!-- INFO -->
                    <div class="space-y-1">

                        <h3 class="text-sm font-medium tracking-wide uppercase 
                                   group-hover:text-blue-600 transition"
                            th:text="${product.name}">
                        </h3>

                        <p class="text-sm text-zinc-500">

                            <span th:if="${product.productVariants != null and !product.productVariants.isEmpty()}"
                                  th:text="${#numbers.formatDecimal(product.productVariants[0].price, 0, 'COMMA', 0, 'POINT')}">
                            </span>

                            <span th:if="${product.productVariants == null or product.productVariants.isEmpty()}">
                                Liên hệ
                            </span>

                            ₫
                        </p>

                    </div>

                </a>

            </div>



            <!-- EMPTY -->
            <div th:if="${#lists.isEmpty(products)}"
                 class="col-span-full text-center py-20 text-zinc-400">
                Chưa có sản phẩm nổi bật.
            </div>

        </div>

    </section>

</div>

</html>
