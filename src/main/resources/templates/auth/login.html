<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Đăng nhập')}">

<div th:fragment="content" class="max-w-md mx-auto py-20">

    <h1 class="text-2xl font-semibold mb-8 text-center">
        Login
    </h1>

    <form method="post" th:action="@{/login}" class="space-y-5">

        <!-- EMAIL -->
        <input type="email"
               name="username"
               placeholder="Email"
               required
               class="w-full border px-4 py-3 focus:outline-none focus:border-black">

        <!-- PASSWORD -->
        <input type="password"
               name="password"
               placeholder="Password"
               required
               class="w-full border px-4 py-3 focus:outline-none focus:border-black">

        <!-- SUBMIT -->
        <button
            class="w-full bg-black text-white py-3 hover:opacity-90 transition">
            LOGIN
        </button>
    </form>

    <!-- LINKS -->
    <div class="text-center text-sm mt-6 space-y-2">
        <a href="/forgot-password"
           class="underline hover:text-gray-500">
            Forgot password?
        </a>

        <div>
            <a href="/register"
               class="underline hover:text-gray-500">
                Create account
            </a>
        </div>
    </div>

</div>
</html>
