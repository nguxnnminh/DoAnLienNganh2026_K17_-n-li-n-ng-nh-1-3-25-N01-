<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — Nova</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body{background:#0a0a0a;color:#f5f5f3;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;}
    body{opacity:0;animation:fadeIn .6s ease forwards;}
    @keyframes fadeIn{to{opacity:1;}}
  </style>
</head>
<body>
  <div style="text-align:center;max-width:480px;">
    <p style="font-size:.55rem;letter-spacing:.45em;text-transform:uppercase;color:#333;margin-bottom:16px;">Nova</p>
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:8rem;line-height:1;letter-spacing:.04em;color:#1a1a1a;margin-bottom:0;" th:text="${status} ?: '500'">500</h1>
    <p style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em;color:#f5f5f3;margin-bottom:16px;" th:text="${error} ?: 'Something went wrong'">Error</p>
    <p style="font-size:.7rem;letter-spacing:.08em;color:#444;line-height:1.8;margin-bottom:48px;" th:text="${message} ?: 'An unexpected error occurred. Please try again or contact support.'">An error occurred.</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <a href="/" style="padding:14px 28px;background:#f5f5f3;color:#0a0a0a;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;text-decoration:none;font-weight:500;transition:background .25s;" onmouseover="this.style.background='#ccc'" onmouseout="this.style.background='#f5f5f3'">Home</a>
      <button onclick="history.back()" style="padding:14px 28px;background:transparent;color:#555;border:1px solid #2a2a2a;font-family:'DM Sans',sans-serif;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:all .2s;" onmouseover="this.style.borderColor='#555';this.style.color='#f5f5f3'" onmouseout="this.style.borderColor='#2a2a2a';this.style.color='#555'">Go Back</button>
    </div>
  </div>
  <p style="position:fixed;bottom:24px;font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:#222;">© 2026 Nova</p>
</body>
</html>
