# ================= DATASOURCE CONFIG =================
spring.datasource.url=jdbc:mysql://localhost:3306/clothingstore
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — fail fast with a clear error if DB is unreachable
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.hiddenmethod.filter.enabled=true

# ================= EMAIL CONFIG =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================= SESSION CONFIG =================
spring.session.jdbc.initialize-schema=always
spring.session.timeout=7d

# ================= LOGGING CONFIG =================
logging.level.org.hibernate.SQL=WARN
logging.level.com.shop.clothingstore=DEBUG

# ================= CACHE CONFIG =================
spring.cache.type=simple

# ================= JWT CONFIG =================
# Dev: default is used automatically. Production: set JWT_SECRET env var (>= 32 chars).
jwt.secret=${JWT_SECRET:super-secret-jwt-key-at-least-32-chars-long-for-dev-testing-only-do-not-use-in-prod}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
jwt.expiration=86400000

# ================= ASYNC CONFIG =================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# ================= CHATBOT AI (Optional) =================
# Default OFF. Enable by setting:
# - chatbot.ai.enabled=true
chatbot.ai.enabled=${CHATBOT_AI_ENABLED:true}
chatbot.ai.timeout-ms=${CHATBOT_AI_TIMEOUT_MS:120000}
chatbot.ai.cooldown-seconds=${CHATBOT_AI_COOLDOWN_SECONDS:300}

# ---- OLLAMA (local) ----
chatbot.ai.ollama-base-url=${OLLAMA_BASE_URL:http://localhost:11434}
chatbot.ai.ollama-model=${OLLAMA_MODEL:llama3.2:3b}