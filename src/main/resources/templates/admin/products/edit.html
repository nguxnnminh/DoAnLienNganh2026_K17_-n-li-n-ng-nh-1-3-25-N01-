<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- PAGE TITLE -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-semibold">Chỉnh sửa sản phẩm</h1>
        <a th:href="@{/admin/products}" class="text-sm text-zinc-500 hover:underline">
            ← Quay lại danh sách
        </a>
    </div>

    <!-- Thông báo -->
    <div th:if="${success}" class="bg-green-100 border border-green-400 text-green-700 px-5 py-4 rounded-2xl mb-6">
        <strong>Thành công:</strong> <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-5 py-4 rounded-2xl mb-6">
        <strong>Lỗi:</strong> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/admin/products/{id}(id=${productDTO.id})}"
          th:object="${productDTO}"
          method="post"
          enctype="multipart/form-data"
          class="space-y-8 bg-white border border-zinc-200 rounded-2xl p-8">

        <!-- CATEGORY -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">
                Danh mục chính <span class="text-red-500">*</span>
            </label>
            <select id="categorySelect" name="categoryId" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Chọn danh mục</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:selected="${cat.id == selectedCategoryId}"
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <!-- SUB CATEGORY -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">
                Danh mục phụ <span class="text-red-500">*</span>
            </label>
            <select th:field="*{subCategoryId}"
                    id="subCategorySelect"
                    class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                    disabled>
                <option value="">Chọn danh mục chính trước</option>
            </select>
        </div>

        <!-- NAME -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">
                Tên sản phẩm <span class="text-red-500">*</span>
            </label>
            <input type="text"
                   th:field="*{name}"
                   class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- DESCRIPTION -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">
                Mô tả
            </label>
            <textarea th:field="*{description}"
                      rows="4"
                      class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <!-- VARIANTS -->
        <div>
            <label class="block text-sm text-zinc-500 mb-3">
                Biến thể
            </label>
            <div id="variants-container" class="space-y-4">
                <div th:each="v, i : *{variants}"
                     class="variant-row flex gap-3">
                    <input type="text"
                           th:field="*{variants[__${i.index}__].size}"
                           placeholder="Size"
                           class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="text"
                           th:field="*{variants[__${i.index}__].color}"
                           placeholder="Màu"
                           class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number"
                           th:field="*{variants[__${i.index}__].price}"
                           step="0.01"
                           class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number"
                           th:field="*{variants[__${i.index}__].stock}"
                           placeholder="Tồn kho"
                           class="flex-1 px-4 py-3 border rounded-xl">
                    <button type="button" class="remove-variant text-red-500">
                        Xóa
                    </button>
                </div>
            </div>

            <button type="button" id="add-variant" class="text-blue-600 mt-3">
                + Thêm biến thể
            </button>
        </div>

        <!-- EXISTING IMAGES -->
        <div>
            <label class="block text-sm text-zinc-500 mb-3">
                Ảnh hiện có
            </label>
            <div class="grid grid-cols-4 gap-4">
                <div th:each="img : ${existingImages}" class="relative group">
                    <img th:src="${img.imageUrl}"
                         class="w-full h-32 object-cover rounded-xl border">
                    <label class="absolute top-2 right-2 bg-white px-2 py-1 text-xs rounded opacity-0 group-hover:opacity-100">
                        <input type="checkbox" name="imagesToDelete" th:value="${img.id}">
                        Xóa
                    </label>
                </div>
            </div>
        </div>

        <!-- NEW IMAGES -->
        <div>
            <label class="block text-sm text-zinc-500 mb-2">
                Thêm ảnh mới
            </label>
            <input type="file" name="newImages" multiple class="w-full px-4 py-3 border rounded-xl">
        </div>

        <!-- ACTIVE -->
        <div class="flex items-center gap-3">
            <input type="checkbox" th:field="*{active}" class="w-5 h-5">
            <label class="text-sm text-zinc-500">
                Hiển thị sản phẩm
            </label>
        </div>

        <!-- SUBMIT -->
        <div class="flex justify-end gap-4 pt-6 border-t">
            <a th:href="@{/admin/products}" class="px-6 py-3 border rounded-xl">
                Hủy
            </a>
            <button type="submit" class="bg-black text-white px-8 py-3 rounded-xl hover:bg-zinc-800">
                Cập nhật sản phẩm
            </button>
        </div>

    </form>

    <!-- JavaScript -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const categorySelect = document.getElementById('categorySelect');
        const subCategorySelect = document.getElementById('subCategorySelect');

        const selectedSubId = /*[[${productDTO.subCategoryId}]]*/ null;
        let variantIndex = /*[[${productDTO.variants.size()}]]*/ 0;

        async function loadSubCategories(categoryId) {
            if (!categoryId) {
                subCategorySelect.innerHTML = '<option value="">Chọn danh mục chính trước</option>';
                subCategorySelect.disabled = true;
                return;
            }

            subCategorySelect.disabled = true;
            subCategorySelect.innerHTML = '<option value="">Đang tải...</option>';

            try {
                const response = await fetch(`/api/subcategories/by-category/${categoryId}`);
                const subs = await response.json();

                subCategorySelect.innerHTML = '<option value="">Chọn danh mục phụ</option>';
                subs.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub.id;
                    option.textContent = sub.name;
                    if (sub.id == selectedSubId) {
                        option.selected = true;
                    }
                    subCategorySelect.appendChild(option);
                });
                subCategorySelect.disabled = false;
            } catch (error) {
                subCategorySelect.innerHTML = '<option value="">Lỗi tải danh mục phụ</option>';
            }
        }

        categorySelect.addEventListener('change', function() {
            loadSubCategories(this.value);
        });

        // Load ngay khi mở trang edit
        window.onload = function() {
            if (categorySelect.value) {
                loadSubCategories(categorySelect.value);
            }
        };

        // Thêm/xóa variant
        document.getElementById('add-variant').addEventListener('click', function() {
            const container = document.getElementById('variants-container');
            const html = `
                <div class="variant-row flex gap-3">
                    <input type="text" name="variants[${variantIndex}].size" placeholder="Size" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="text" name="variants[${variantIndex}].color" placeholder="Màu" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number" name="variants[${variantIndex}].price" step="0.01" placeholder="Giá" class="flex-1 px-4 py-3 border rounded-xl">
                    <input type="number" name="variants[${variantIndex}].stock" placeholder="Tồn kho" class="flex-1 px-4 py-3 border rounded-xl">
                    <button type="button" class="remove-variant text-red-500">Xóa</button>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            variantIndex++;
        });

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('remove-variant')) {
                e.target.closest('.variant-row').remove();
            }
        });
        /*]]>*/
    </script>

</div>
</html>
