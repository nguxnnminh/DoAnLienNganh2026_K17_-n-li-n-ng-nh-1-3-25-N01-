<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Chi tiết đơn hàng')}">

<div th:fragment="content" class="py-10 space-y-10">

    <!-- BACK -->
    <a th:href="@{/my-orders}" class="text-sm underline underline-offset-4
              hover:text-blue-600 transition inline-block">
        ← Quay lại đơn hàng
    </a>


    <!-- TITLE -->
    <div class="space-y-2">

        <h1 class="text-3xl font-semibold tracking-tight">
            Đơn hàng #
            <span th:text="${order.id}"></span>
        </h1>

        <p class="text-zinc-500 text-sm">
            Đặt lúc:
            <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
        </p>

    </div>



    <div class="grid md:grid-cols-3 gap-10">

        <!-- ================= ITEMS ================= -->
        <div class="md:col-span-2 space-y-6">

            <div th:each="item : ${order.items}" class="flex flex-wrap md:flex-nowrap
                        justify-between items-start
                        gap-6
                        border-b border-zinc-200 dark:border-zinc-800
                        pb-6">

                <!-- LEFT -->
                <div class="space-y-2 flex-1">

                    <p class="font-medium text-lg" th:text="${item.productName}">
                    </p>

                    <p class="text-sm text-zinc-500">
                        Size:
                        <span th:text="${item.size}"></span>
                        ·
                        Màu:
                        <span th:text="${item.color}"></span>
                    </p>

                    <p class="text-sm">
                        Số lượng:
                        <span th:text="${item.quantity}"></span>
                    </p>



                    <!-- REVIEW BUTTON -->
                    <div class="mt-3">

                        <!-- NOT COMPLETED -->
                        <button th:if="${!isCompleted}" disabled class="px-4 py-2 text-sm rounded-lg
                                       bg-gray-300 text-gray-600 cursor-not-allowed">
                            Đánh giá
                        </button>


                        <!-- COMPLETED -->
                        <div th:if="${isCompleted}">

                            <!-- REVIEWED -->
                            <span th:if="${reviewedItemIds.contains(item.id)}" class="px-4 py-2 text-sm rounded-lg
                                         bg-green-100 text-green-700">
                                Đã đánh giá
                            </span>

                            <!-- NOT REVIEWED -->
                            <button th:if="${!reviewedItemIds.contains(item.id)}"
                                th:attr="onclick='toggleReviewForm(' + ${item.id} + ')'" class="px-4 py-2 text-sm rounded-lg
                                           bg-black text-white
                                           hover:bg-zinc-800 transition">
                                Đánh giá
                            </button>

                        </div>

                    </div>



                    <!-- REVIEW FORM -->
                    <form th:id="'review-form-' + ${item.id}" th:action="@{/reviews/{id}(id=${item.id})}" method="post"
                        class="hidden mt-4 space-y-4">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />



                        <!-- STAR SELECT -->
                        <div class="flex gap-2 text-2xl cursor-pointer select-none starSelect"
                            th:data-item-id="${item.id}">

                            <input type="hidden" name="rating" th:id="'ratingInput-' + ${item.id}" />

                            <span data-value="1" class="star text-gray-300">★</span>
                            <span data-value="2" class="star text-gray-300">★</span>
                            <span data-value="3" class="star text-gray-300">★</span>
                            <span data-value="4" class="star text-gray-300">★</span>
                            <span data-value="5" class="star text-gray-300">★</span>

                        </div>



                        <textarea name="comment" required placeholder="Nhập đánh giá của bạn..." class="w-full border rounded px-3 py-2 text-sm
                                         border-zinc-300 dark:border-zinc-700
                                         bg-white dark:bg-zinc-900">
                        </textarea>



                        <button type="submit" class="px-4 py-2 bg-green-600 text-white
                                       rounded-lg hover:bg-green-700 transition">
                            Gửi đánh giá
                        </button>

                    </form>

                </div>



                <!-- RIGHT -->
                <div class="font-semibold text-lg whitespace-nowrap">

                    <span th:text="${#numbers.formatDecimal(item.price,0,'POINT',0,'COMMA')}"></span>
                    ₫

                </div>

            </div>

        </div>



        <!-- ================= SUMMARY ================= -->
        <div class="sticky top-28 h-fit
                    border border-zinc-200 dark:border-zinc-800
                    rounded-2xl p-6
                    bg-white dark:bg-zinc-900">

            <h3 class="font-semibold text-lg mb-6">
                Tóm tắt đơn hàng
            </h3>



            <!-- STATUS -->
            <div class="mb-6">

                <p class="text-sm text-zinc-500 mb-1">
                    Trạng thái
                </p>

                <span class="px-3 py-1 rounded-full text-xs font-medium" th:text="${order.status}" th:classappend="
                      ${order.status.name() == 'PENDING'} ? ' bg-yellow-100 text-yellow-700' :
                      (${order.status.name() == 'CONFIRMED'} ? ' bg-blue-100 text-blue-700' :
                      (${order.status.name() == 'SHIPPING'} ? ' bg-purple-100 text-purple-700' :
                      (${order.status.name() == 'COMPLETED'} ? ' bg-green-100 text-green-700' :
                      ' bg-red-100 text-red-700')))">
                </span>

            </div>



            <!-- PRICE -->
            <div class="space-y-3 text-sm">

                <div class="flex justify-between">
                    <span>Tạm tính</span>
                    <span>
                        <span th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')}"></span>
                        ₫
                    </span>
                </div>

                <div class="flex justify-between">
                    <span>Vận chuyển</span>
                    <span>Miễn phí</span>
                </div>

            </div>



            <hr class="my-6 border-zinc-200 dark:border-zinc-800">



            <div class="flex justify-between text-xl font-semibold tracking-tight">

                <span>Tổng cộng</span>

                <span>
                    <span th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')}"></span>
                    ₫
                </span>

            </div>

        </div>

    </div>



    <script>
        document.addEventListener("DOMContentLoaded", function () {

            window.toggleReviewForm = function (id) {
                const form = document.getElementById('review-form-' + id);
                if (form) {
                    form.classList.toggle('hidden');
                }
            };

            document.querySelectorAll(".starSelect").forEach(container => {

                const stars = container.querySelectorAll(".star");
                const itemId = container.dataset.itemId;
                const ratingInput = document.getElementById("ratingInput-" + itemId);
                const form = container.closest("form");

                let selectedRating = 0;

                function paint(rating) {
                    stars.forEach(star => {
                        star.classList.remove("text-yellow-400");
                        star.classList.add("text-gray-300");

                        if (Number(star.dataset.value) <= rating) {
                            star.classList.remove("text-gray-300");
                            star.classList.add("text-yellow-400");
                        }
                    });
                }

                stars.forEach(star => {

                    star.addEventListener("mouseenter", function () {
                        paint(this.dataset.value);
                    });

                    star.addEventListener("mouseleave", function () {
                        paint(selectedRating);
                    });

                    star.addEventListener("click", function () {
                        selectedRating = Number(this.dataset.value);
                        ratingInput.value = selectedRating;
                        paint(selectedRating);
                    });

                });

                form.addEventListener("submit", function (e) {
                    if (!ratingInput.value) {
                        e.preventDefault();
                        alert("Vui lòng chọn số sao trước khi gửi đánh giá.");
                    }
                });

            });

        });
    </script>

</div>

</html>
