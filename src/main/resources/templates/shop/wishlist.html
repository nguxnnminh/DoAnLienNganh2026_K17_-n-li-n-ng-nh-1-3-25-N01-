<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Wishlist — Nova')}">
<div th:fragment="content">
  <style>
    .wish-card {
      border: 1px solid #1a1a1a;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
      position: relative;
    }
    .wish-card:hover { border-color: #333; }

    .wish-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .wish-card-body { padding: 12px 12px 14px; }

    .wish-remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(10,10,10,0.85);
      border: 1px solid #333;
      color: #888;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      padding: 0;
    }
    .wish-remove-btn:hover { border-color: #888; color: #f5f5f3; }

    .empty-state {
      border: 1px dashed #1e1e1e;
      padding: 80px 20px;
      text-align: center;
    }
  </style>

  <div class="max-w-[1400px] mx-auto px-4 md:px-8 lg:px-12 py-10 md:py-16">

    <!-- HEADER -->
    <div class="mb-8 md:mb-12 border-b border-zinc-900 pb-6 md:pb-8">
      <p class="text-[0.6rem] tracking-widest3 uppercase text-zinc-600 mb-2">Account</p>
      <h1 class="font-display text-4xl md:text-6xl tracking-wide leading-none text-[#f5f5f3]">Wishlist</h1>
      <p class="text-xs tracking-wide text-zinc-600 mt-3">
        <span th:text="${#lists.size(wishlistItems)}">0</span> item(s)
      </p>
    </div>

    <!-- BREADCRUMB -->
    <div class="flex items-center gap-3 mb-8 text-[0.62rem] tracking-widest uppercase">
      <a th:href="@{/}" class="text-zinc-700 no-underline hover:text-[#f5f5f3] transition-colors">Home</a>
      <span class="text-zinc-800">&mdash;</span>
      <span class="text-zinc-500">Wishlist</span>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(wishlistItems)}" class="empty-state">
      <p class="font-display text-5xl tracking-wide text-zinc-900 mb-4">Nothing here yet</p>
      <p class="text-[0.72rem] tracking-widest uppercase text-zinc-600 mb-6">
        Browse the shop and save items you love.
      </p>
      <a th:href="@{/products}"
         class="text-[0.7rem] tracking-widest uppercase text-zinc-500 no-underline transition-colors hover:text-[#f5f5f3]"
         style="border-bottom:1px solid #333; padding-bottom:2px;">
        Browse Shop
      </a>
    </div>

    <!-- GRID -->
    <div th:unless="${#lists.isEmpty(wishlistItems)}"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">

      <div th:each="item : ${wishlistItems}" class="wish-card">

        <!-- Remove button -->
        <form th:action="@{/wishlist/{id}/remove(id=${item.product.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="wish-remove-btn" title="Remove from wishlist">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
              <path d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </form>

        <!-- Product image (links to detail) -->
        <a th:href="@{/products/{slug}(slug=${item.product.slug})}" class="block">
          <img th:src="${item.product.images != null and !item.product.images.isEmpty()
                         ? item.product.images[0].imageUrl
                         : '/images/sample.jpg'}"
               th:alt="${item.product.name}" />
        </a>

        <div class="wish-card-body">
          <a th:href="@{/products/{slug}(slug=${item.product.slug})}"
             class="block text-[0.68rem] tracking-widest uppercase text-zinc-400 no-underline hover:text-[#f5f5f3] transition-colors leading-tight truncate"
             th:text="${item.product.name}">Product Name</a>

          <p class="text-[0.65rem] tracking-wide text-zinc-600 mt-1"
             th:text="${item.product.minPrice != null and item.product.minPrice.compareTo(T(java.math.BigDecimal).ZERO) > 0}
                       ? ${#numbers.formatDecimal(item.product.minPrice, 0, 'POINT', 0, 'COMMA')} + ' ₫'
                       : '—'">120.000 ₫</p>

          <a th:href="@{/products/{slug}(slug=${item.product.slug})}"
             class="mt-3 block text-center text-[0.6rem] tracking-widest uppercase text-zinc-600 border border-zinc-800 py-2 no-underline hover:border-zinc-600 hover:text-zinc-300 transition-all">
            View
          </a>
        </div>
      </div>

    </div>

  </div>
</div>
</html>
