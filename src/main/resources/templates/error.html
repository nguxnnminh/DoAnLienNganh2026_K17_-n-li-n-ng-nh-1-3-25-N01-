<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lỗi</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg text-center max-w-md">
        <h1 class="text-6xl font-bold text-red-600 mb-4">Oops!</h1>
        <h2 class="text-2xl font-semibold mb-4" th:text="${status} + ' - ' + ${error}">500 - Internal Server Error</h2>
        <p class="text-gray-600 mb-6" th:text="${message}">Có lỗi xảy ra. Vui lòng thử lại hoặc liên hệ admin.</p>
        <a href="/" class="inline-block bg-black text-white px-6 py-3 rounded hover:bg-gray-800">
            Quay về trang chủ
        </a>
    </div>
</body>
</html>
