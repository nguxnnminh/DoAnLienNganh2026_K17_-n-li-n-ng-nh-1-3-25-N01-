# ================= TEST DATASOURCE (H2 in-memory) =================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ================= SESSION CONFIG (disable JDBC session for tests) =================
spring.session.store-type=none

# ================= DISABLE MAIL =================
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=

# ================= LOGGING =================
logging.level.org.hibernate.SQL=WARN
logging.level.com.shop.clothingstore=WARN

# ================= CACHE =================
spring.cache.type=simple

# ================= JWT =================
jwt.secret=super-secret-jwt-key-at-least-32-chars-long-for-dev-testing-only-do-not-use-in-prod
jwt.expiration=86400000

# ================= APP =================
app.public-base-url=http://localhost:8080

# ================= MULTIPART =================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.hiddenmethod.filter.enabled=true

# ================= ASYNC =================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=10

# ================= DISABLE DATA INITIALIZER IN TESTS =================
spring.profiles.active=production
