<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Chi tiết đơn hàng')}">

<div th:fragment="content" class="max-w-6xl mx-auto">

    <!-- BACK -->
    <a th:href="@{/my-orders}"
       class="text-sm underline underline-offset-4 hover:text-blue-600 transition inline-block mb-8">
        ← Quay lại đơn hàng
    </a>


    <!-- TITLE -->
    <div class="mb-10">
        <h1 class="text-3xl font-semibold tracking-tight">
            Đơn hàng #<span th:text="${order.id}"></span>
        </h1>

        <p class="text-zinc-500 text-sm mt-2">
            Đặt lúc:
            <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
        </p>
    </div>


    <div class="grid md:grid-cols-3 gap-10">

        <!-- ================= ITEMS ================= -->
        <div class="md:col-span-2 space-y-6">

            <div th:each="item : ${order.items}"
                 class="flex justify-between items-start border-b border-zinc-200 dark:border-zinc-800 pb-6">

                <!-- LEFT -->
                <div class="space-y-2">

                    <p class="font-medium text-lg"
                       th:text="${item.productName}">
                    </p>

                    <p class="text-sm text-zinc-500">
                        Size:
                        <span th:text="${item.size}"></span>
                        ·
                        Màu:
                        <span th:text="${item.color}"></span>
                    </p>

                    <p class="text-sm">
                        Số lượng:
                        <span th:text="${item.quantity}"></span>
                    </p>

                </div>


                <!-- RIGHT -->
                <div class="font-semibold text-lg">
                    <span th:text="${#numbers.formatDecimal(item.price,0,'POINT',0,'COMMA')}"></span> ₫
                </div>

            </div>

        </div>


        <!-- ================= SUMMARY ================= -->
        <div class="border border-zinc-200 dark:border-zinc-800
                    rounded-2xl p-6 bg-white dark:bg-zinc-900 h-fit">

            <h3 class="font-semibold text-lg mb-6">
                Tóm tắt đơn hàng
            </h3>


            <!-- STATUS -->
            <div class="mb-6">
                <p class="text-sm text-zinc-500 mb-1">
                    Trạng thái
                </p>

                <span class="px-3 py-1 rounded-full text-xs font-medium"
                      th:text="${order.status}"
                      th:classappend="
                      ${order.status.name() == 'PENDING'} ? ' bg-yellow-100 text-yellow-700' :
                      (${order.status.name() == 'CONFIRMED'} ? ' bg-blue-100 text-blue-700' :
                      (${order.status.name() == 'SHIPPING'} ? ' bg-purple-100 text-purple-700' :
                      (${order.status.name() == 'COMPLETED'} ? ' bg-green-100 text-green-700' :
                      ' bg-red-100 text-red-700')))
                      ">
                </span>
            </div>


            <!-- PRICE -->
            <div class="space-y-3 text-sm">

                <div class="flex justify-between">
                    <span>Tạm tính</span>
                    <span>
                        <span th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')}"></span> ₫
                    </span>
                </div>

                <div class="flex justify-between">
                    <span>Vận chuyển</span>
                    <span>Miễn phí</span>
                </div>

            </div>

            <hr class="my-6 border-zinc-200 dark:border-zinc-800">

            <div class="flex justify-between text-xl font-semibold tracking-tight">
                <span>Tổng cộng</span>
                <span>
                    <span th:text="${#numbers.formatDecimal(order.total,0,'POINT',0,'COMMA')}"></span> ₫
                </span>
            </div>

        </div>

    </div>

</div>

</html>
