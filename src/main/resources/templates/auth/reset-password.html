<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: html">

<div th:fragment="content" class="max-w-md mx-auto py-20">

    <h1 class="text-2xl font-semibold mb-8 text-center">
        Reset Password
    </h1>

    <form method="post"
          th:action="@{/reset-password}"
          class="space-y-5">

        <input type="hidden"
               name="token"
               th:value="${token}">

        <input type="password"
               name="password"
               placeholder="New password"
               required
               class="w-full border px-4 py-3 focus:outline-none focus:border-black">

        <button
            class="w-full bg-black text-white py-3 hover:opacity-90 transition">
            Reset password
        </button>
    </form>

</div>
</html>
