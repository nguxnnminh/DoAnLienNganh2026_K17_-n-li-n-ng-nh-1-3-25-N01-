<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Quên mật khẩu')}">

<div th:fragment="content">

    <div class="max-w-md mx-auto py-20">

        <!-- TITLE -->
        <h1 class="text-3xl font-semibold mb-3 text-center tracking-tight">
            Quên mật khẩu
        </h1>

        <p class="text-center text-sm text-zinc-500 mb-10">
            Nhập email để nhận link đặt lại mật khẩu
        </p>

        <!-- FORM -->
        <form method="post"
              th:action="@{/forgot-password}"
              class="space-y-6">

            <!-- EMAIL -->
            <div>
                <label class="block text-sm font-medium mb-2">
                    Email
                </label>

                <input type="email"
                       name="email"
                       placeholder="example@email.com"
                       required
                       class="w-full border border-zinc-300 dark:border-zinc-700
                              bg-white dark:bg-zinc-900
                              px-4 py-3 rounded-xl
                              focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <!-- SUBMIT -->
            <button
                class="w-full bg-black text-white py-3 rounded-xl
                       hover:opacity-90 transition font-medium tracking-wide">

                Gửi link đặt lại mật khẩu
            </button>

        </form>

        <!-- BACK LOGIN -->
        <div class="text-center text-sm mt-8 text-zinc-500">

            <a th:href="@{/login}"
               class="underline hover:text-black dark:hover:text-white transition">

                Quay lại đăng nhập
            </a>

        </div>

    </div>

</div>
</html>
