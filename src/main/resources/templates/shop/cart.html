<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content}, 'Cart — Nova')}">
<div th:fragment="content">
  <style>
    .n-qty {
      width:52px;background:transparent;border:1px solid #2a2a2a;color:#f5f5f3;
      text-align:center;padding:10px 6px;font-family:'DM Sans',sans-serif;
      font-size:.85rem;outline:none;transition:border-color .2s;
    }
    .n-qty:focus { border-color:#555; }

    .cart-row {
      display:flex;flex-direction:column;gap:16px;padding:24px 0;
      border-bottom:1px solid #1a1a1a;transition:opacity .2s;
    }
    @media(min-width:640px){
      .cart-row { flex-direction:row;gap:24px;padding:28px 0;align-items:flex-start; }
    }
    .cart-row:hover { opacity:.85; }

    .cart-img { width:100%;aspect-ratio:3/4;object-fit:cover;background:#111;display:block; }
    @media(min-width:640px){ .cart-img { width:96px;height:122px;flex-shrink:0; } }
  </style>

  <div class="max-w-[1400px] mx-auto px-4 md:px-8 lg:px-12 py-10 md:py-16">

    <!-- HEADER -->
    <div class="flex justify-between items-end mb-8 md:mb-12 border-b border-zinc-900 pb-6 md:pb-8">
      <div>
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-2">Review</p>
        <h1 class="font-display text-4xl md:text-6xl tracking-wide leading-none text-[#f5f5f3]">Your Cart</h1>
      </div>
      <p class="text-xs tracking-widest uppercase text-zinc-500">
        <span th:text="${cartItems.size()}">0</span>&nbsp;Items
      </p>
    </div>

    <!-- EMPTY -->
    <div th:if="${cartItems.isEmpty()}" class="text-center py-20 md:py-28">
      <p class="font-display text-5xl md:text-7xl tracking-wide text-zinc-900 mb-10">Empty Bag</p>
      <a th:href="@{/products}"
         class="h-11 md:h-12 px-8 bg-[#f5f5f3] text-[#0a0a0a] text-xs tracking-widest uppercase
                no-underline font-medium inline-flex items-center transition-colors duration-200 hover:bg-[#d8d8d4]">
        Continue Shopping
      </a>
    </div>

    <!-- CONTENT -->
    <div th:unless="${cartItems.isEmpty()}"
         class="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-8 md:gap-16 items-start">

      <!-- ITEMS -->
      <div>
        <div th:each="item : ${cartItems}" class="cart-row">
          <img class="cart-img"
               th:src="${item.imageUrl!=null and !item.imageUrl.isEmpty()?item.imageUrl:'/images/no-image.png'}"
               alt="" />
          <div class="flex-1 flex flex-col gap-3">
            <div class="flex justify-between items-start gap-4">
              <div>
                <h3 class="text-xs tracking-widest uppercase text-[#e8e8e4] font-normal mb-1.5"
                    th:text="${item.productName}"></h3>
                <p class="text-xs tracking-widest uppercase text-zinc-600">
                  <span th:text="${item.size}"></span>
                  <span class="mx-2 text-zinc-800">·</span>
                  <span th:text="${item.color}"></span>
                </p>
              </div>
              <p class="text-sm tracking-wide text-zinc-500 whitespace-nowrap"
                 th:text="${#numbers.formatDecimal(item.price,0,'POINT',0,'COMMA')}+' ₫'"></p>
            </div>

            <div class="flex items-center gap-4 mt-1">
              <form method="post" th:action="@{/cart/update}" class="flex items-center gap-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="variantId" th:value="${item.variantId}" />
                <input type="number" name="quantity" min="1" th:value="${item.quantity}" class="n-qty" />
                <button type="submit"
                        class="bg-transparent border-none font-body text-xs tracking-widest uppercase
                               cursor-pointer text-zinc-600 transition-colors hover:text-[#c0c0bc] p-0">
                  Update
                </button>
              </form>
              <form method="post" th:action="@{/cart/remove}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="variantId" th:value="${item.variantId}" />
                <button type="submit"
                        class="bg-transparent border-none font-body text-xs tracking-widest uppercase
                               cursor-pointer text-zinc-800 transition-colors hover:text-[#bf6d6d] p-0">
                  Remove
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- SUMMARY PANEL -->
      <div class="lg:sticky lg:top-24 border border-zinc-800/60 p-6 md:p-8">
        <p class="text-xs tracking-widest3 uppercase text-zinc-600 mb-6">Order Summary</p>

        <div class="flex flex-col gap-4 mb-6">
          <div class="flex justify-between">
            <span class="text-xs tracking-widest uppercase text-zinc-500">Subtotal</span>
            <span class="text-xs text-zinc-400"
                  th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')}+' ₫'"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-xs tracking-widest uppercase text-zinc-500">Shipping</span>
            <span class="text-xs text-[#6dbf6d]">Free</span>
          </div>
        </div>

        <div class="h-px bg-zinc-900 mb-6"></div>

        <div class="flex justify-between mb-8">
          <span class="text-xs tracking-widest uppercase text-[#c0c0bc]">Total</span>
          <span class="text-base tracking-wide text-[#f5f5f3]"
                th:text="${#numbers.formatDecimal(total,0,'POINT',0,'COMMA')}+' ₫'"></span>
        </div>

        <a th:href="@{/checkout}"
           class="flex items-center justify-center h-11 md:h-12 bg-[#f5f5f3] text-[#0a0a0a]
                  text-xs tracking-widest uppercase no-underline font-medium mb-3
                  transition-colors duration-200 hover:bg-[#d8d8d4]">
          Checkout
        </a>

        <form method="post" th:action="@{/cart/clear}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit"
                  class="w-full h-11 bg-transparent border border-zinc-900 text-zinc-600
                         font-body text-xs tracking-widest uppercase cursor-pointer
                         transition-all duration-200 hover:border-zinc-700 hover:text-zinc-400">
            Clear Cart
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
</html>
