<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html}">

<div th:fragment="content">

    <div class="grid grid-cols-12 gap-10">

        <!-- FORM -->
        <div class="col-span-7">

            <h1 class="text-2xl font-semibold mb-8">
                Checkout
            </h1>

            <form th:action="@{/checkout}" method="post" class="space-y-6">

                <!-- FULL NAME -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        Full name
                    </label>
                    <input type="text"
                           name="customerName"
                           th:value="${user != null ? user.fullName : ''}"
                           required
                           class="w-full border px-4 py-3 focus:outline-none focus:border-black">
                </div>

                <!-- PHONE -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        Phone
                    </label>
                    <input type="text"
                           name="phone"
                           th:value="${user != null ? user.phone : ''}"
                           required
                           class="w-full border px-4 py-3 focus:outline-none focus:border-black">
                </div>

                <!-- ADDRESS -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        Address
                    </label>
                    <textarea name="address"
                              rows="4"
                              required
                              class="w-full border px-4 py-3 focus:outline-none focus:border-black"
                              th:text="${user != null ? user.address : ''}">
                    </textarea>
                </div>

                <!-- ERROR -->
                <div th:if="${error}"
                     class="border border-red-500 text-red-600 px-4 py-3 text-sm">
                    <span th:text="${error}"></span>
                </div>

                <!-- SUBMIT -->
                <button class="bg-black text-white px-10 py-3 hover:opacity-90 transition">
                    PLACE ORDER
                </button>

            </form>
        </div>

        <!-- SUMMARY -->
        <div class="col-span-5 border p-6 h-fit">

            <h3 class="font-semibold mb-4">
                Order Summary
            </h3>

            <div class="flex justify-between text-sm mb-2">
                <span>Subtotal</span>
                <span>
                    <span th:text="${total}"></span> ₫
                </span>
            </div>

            <div class="flex justify-between text-sm mb-4">
                <span>Shipping</span>
                <span>Free</span>
            </div>

            <hr class="mb-4">

            <div class="flex justify-between font-medium text-lg">
                <span>Total</span>
                <span>
                    <span th:text="${total}"></span> ₫
                </span>
            </div>

        </div>

    </div>

</div>
</html>
