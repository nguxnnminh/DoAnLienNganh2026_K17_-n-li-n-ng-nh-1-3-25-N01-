<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Đăng nhập')}">

<div th:fragment="content" class="max-w-md mx-auto py-24">

    <!-- TITLE -->
    <div class="text-center mb-10">
        <h1 class="text-3xl font-semibold tracking-tight">
            Đăng nhập
        </h1>

        <p class="text-sm text-zinc-500 mt-2">
            Chào mừng bạn quay lại NOVA
        </p>
    </div>

    <!-- ================= TOAST SUCCESS ================= -->
    <div th:if="${success}"
        id="toastSuccess"
        class="fixed top-6 right-6 z-50
                bg-white dark:bg-zinc-900
                border border-green-400
                text-green-600 dark:text-green-400
                px-6 py-4 rounded-2xl
                shadow-xl
                animate-slideIn">

        <div class="flex items-center gap-3">

            <!-- ICON -->
            <svg class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24">
                <path stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M5 13l4 4L19 7"/>
            </svg>

            <span th:text="${success}"></span>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const toast = document.getElementById("toastSuccess");
            if (toast) {

                setTimeout(() => {
                    toast.style.opacity = "0";
                    toast.style.transform = "translateX(40px)";
                    setTimeout(() => toast.remove(), 300);
                }, 3000);

            }
        });
    </script>

    <style>
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(40px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .animate-slideIn {
        animation: slideIn 0.4s ease forwards;
    }
    </style>

    <!-- LOGIN FORM -->
    <form method="post"
          th:action="@{/login}"
          class="space-y-6">

        <!-- ERROR MESSAGE -->
        <div th:if="${param.error}"
             class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg">
            Email hoặc mật khẩu không đúng
        </div>

        <!-- LOGOUT SUCCESS -->
        <div th:if="${param.logout}"
             class="bg-green-50 border border-green-200 text-green-600 text-sm px-4 py-3 rounded-lg">
            Bạn đã đăng xuất thành công
        </div>

        <!-- EMAIL -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Email
            </label>

            <input type="email"
                   name="username"
                   placeholder="example@email.com"
                   required
                   class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">
        </div>

        <!-- PASSWORD -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Mật khẩu
            </label>

            <input type="password"
                   name="password"
                   placeholder="••••••••"
                   required
                   class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">
        </div>

        <!-- REMEMBER + FORGOT -->
        <div class="flex justify-between items-center text-sm">

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox"
                       name="remember-me"
                       class="rounded border-zinc-300">
                Ghi nhớ đăng nhập
            </label>

            <a th:href="@{/forgot-password}"
               class="text-zinc-500 hover:text-black dark:hover:text-white transition">
                Quên mật khẩu?
            </a>

        </div>

        <!-- SUBMIT -->
        <button type="submit"
                class="w-full bg-black text-white py-3 rounded-xl
                       hover:bg-zinc-800 transition
                       font-medium tracking-wide">
            Đăng nhập
        </button>

    </form>

    <!-- REGISTER -->
    <div class="text-center text-sm text-zinc-500 mt-8">
        Chưa có tài khoản?
        <a th:href="@{/register}"
           class="text-black dark:text-white font-medium hover:underline ml-1">
            Đăng ký ngay
        </a>
    </div>

</div>

</html>
