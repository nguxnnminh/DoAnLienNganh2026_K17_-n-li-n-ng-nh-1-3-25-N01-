<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: html}">

<div th:fragment="content">

    <!-- PAGE TITLE -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
        <h1 class="text-2xl font-semibold tracking-tight">
            Quản lý khách hàng
        </h1>
    </div>


    <!-- ================= DESKTOP TABLE ================= -->
    <div class="hidden lg:block glass rounded-2xl overflow-x-auto border border-zinc-200 dark:border-zinc-800">

        <table class="min-w-[1100px] w-full table-fixed text-sm text-zinc-700 dark:text-zinc-300">

            <thead class="bg-zinc-100/80 dark:bg-zinc-800/80 text-zinc-500 uppercase text-xs tracking-wide">
                <tr>
                    <th class="px-6 py-5 text-left">ID</th>
                    <th class="px-6 py-5 text-left">Email</th>
                    <th class="px-6 py-5 text-left">Họ tên</th>
                    <th class="px-6 py-5 text-left">SĐT</th>
                    <th class="px-6 py-5 text-left">Địa chỉ</th>
                    <th class="px-6 py-5 text-center whitespace-nowrap">Vai trò</th>
                    <th class="px-6 py-5 text-center whitespace-nowrap">Hành động</th>
                </tr>
            </thead>

            <tbody class="divide-y divide-zinc-200 dark:divide-zinc-800">

                <tr th:each="user : ${users}"
                    class="hover:bg-zinc-50 dark:hover:bg-zinc-800/40 transition">

                    <!-- ID -->
                    <td class="px-6 py-5 whitespace-nowrap font-medium text-zinc-900 dark:text-zinc-100">
                        #<span th:text="${user.id}"></span>
                    </td>

                    <!-- EMAIL -->
                    <td class="px-6 py-5 truncate font-medium text-zinc-900 dark:text-zinc-100">
                        <span th:text="${user.email}"></span>
                    </td>

                    <!-- FULLNAME -->
                    <td class="px-6 py-5 truncate text-zinc-500">
                        <span th:text="${user.fullName} ?: 'Chưa cập nhật'"></span>
                    </td>

                    <!-- PHONE -->
                    <td class="px-6 py-5 whitespace-nowrap text-zinc-500">
                        <span th:text="${user.phone} ?: 'Chưa cập nhật'"></span>
                    </td>

                    <!-- ADDRESS -->
                    <td class="px-6 py-5 truncate text-zinc-500">
                        <span th:text="${user.address} ?: 'Chưa cập nhật'"></span>
                    </td>

                    <!-- ROLE -->
                    <td class="px-6 py-5 text-center whitespace-nowrap">
                        <span class="inline-flex px-3 py-1 rounded-full text-xs font-medium"
                              th:classappend="${user.role == 'ADMIN'
                              ? 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300'
                              : 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300'}">
                            <span th:text="${user.role}"></span>
                        </span>
                    </td>

                    <!-- ACTION -->
                    <td class="px-6 py-5 text-center whitespace-nowrap">
                        <div class="flex justify-center items-center gap-3">

                            <!-- EDIT -->
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                               class="px-4 py-2 rounded-xl text-sm font-medium
                                      bg-indigo-50 text-indigo-600
                                      hover:bg-indigo-100
                                      dark:bg-indigo-900/30 dark:text-indigo-300
                                      dark:hover:bg-indigo-900/50
                                      transition">
                                Sửa
                            </a>

                            <!-- DELETE -->
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                  method="post">

                                <button type="submit"
                                        data-confirm="Bạn chắc chắn muốn xóa người dùng này? Hành động không thể khôi phục."
                                        class="px-4 py-2 rounded-xl text-sm font-medium
                                               bg-red-50 text-red-600
                                               hover:bg-red-100
                                               dark:bg-red-900/30 dark:text-red-300
                                               dark:hover:bg-red-900/50
                                               transition">
                                    Xóa
                                </button>

                            </form>

                        </div>
                    </td>

                </tr>

                <!-- EMPTY -->
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7"
                        class="px-6 py-16 text-center text-zinc-500">
                        Chưa có khách hàng nào.
                    </td>
                </tr>

            </tbody>

        </table>
    </div>



    <!-- ================= MOBILE CARD VIEW ================= -->
    <div class="lg:hidden space-y-4">

        <div th:each="user : ${users}"
            class="glass rounded-2xl p-5 border border-zinc-200 dark:border-zinc-800 shadow-sm">

            <!-- Header -->
            <div class="flex justify-between items-start mb-3">
                <div>
                    <div class="font-semibold text-lg text-zinc-900 dark:text-zinc-100">
                        <span th:text="${user.fullName} ?: 'Chưa cập nhật'"></span>
                    </div>
                    <div class="text-xs text-zinc-500">
                        #<span th:text="${user.id}"></span>
                    </div>
                </div>

                <span class="inline-flex px-3 py-1 rounded-full text-xs font-medium"
                      th:classappend="${user.role == 'ADMIN'
                      ? 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300'
                      : 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300'}">
                    <span th:text="${user.role}"></span>
                </span>
            </div>

            <!-- Email -->
            <div class="mb-2 text-sm text-zinc-700 dark:text-zinc-300">
                <span class="font-medium">Email:</span>
                <span th:text="${user.email}"></span>
            </div>

            <!-- Phone -->
            <div class="mb-2 text-sm text-zinc-700 dark:text-zinc-300">
                <span class="font-medium">SĐT:</span>
                <span th:text="${user.phone} ?: 'Chưa cập nhật'"></span>
            </div>

            <!-- Address -->
            <div class="mb-4 text-sm text-zinc-700 dark:text-zinc-300">
                <span class="font-medium">Địa chỉ:</span>
                <span th:text="${user.address} ?: 'Chưa cập nhật'"></span>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3">

                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                   class="px-4 py-2 rounded-xl text-sm font-medium
                          bg-indigo-50 text-indigo-600
                          hover:bg-indigo-100
                          dark:bg-indigo-900/30 dark:text-indigo-300
                          dark:hover:bg-indigo-900/50
                          transition">
                    Sửa
                </a>

                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                      method="post">

                    <button type="submit"
                            data-confirm="Bạn chắc chắn muốn xóa người dùng này? Hành động không thể khôi phục."
                            class="px-4 py-2 rounded-xl text-sm font-medium
                                   bg-red-50 text-red-600
                                   hover:bg-red-100
                                   dark:bg-red-900/30 dark:text-red-300
                                   dark:hover:bg-red-900/50
                                   transition">
                        Xóa
                    </button>

                </form>

            </div>

        </div>

        <!-- EMPTY MOBILE -->
        <div th:if="${#lists.isEmpty(users)}"
            class="text-center text-zinc-500 py-16">
            Chưa có khách hàng nào.
        </div>

    </div>

</div>

</html>
