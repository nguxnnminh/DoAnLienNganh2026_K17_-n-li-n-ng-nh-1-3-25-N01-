spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clothingstore}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.hiddenmethod.filter.enabled=true

# ================= EMAIL CONFIG =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================= SESSION CONFIG =================
# Lưu session vào MySQL thay vì memory
# → Cart không mất khi restart server
spring.session.jdbc.initialize-schema=always
spring.session.timeout=7d

# ================= LOGGING CONFIG =================
# Tắt Hibernate SQL logging (dùng logback-spring.xml quản lý)
logging.level.org.hibernate.SQL=WARN
logging.level.com.shop.clothingstore=DEBUG

# ================= CACHE CONFIG =================
# Dùng ConcurrentMap (in-memory, zero setup)
# Đổi sang redis: spring.cache.type=redis
spring.cache.type=simple

