<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, 'Đăng nhập')}">

<div th:fragment="content" class="max-w-md mx-auto py-24">

    <!-- TITLE -->
    <div class="text-center mb-10">
        <h1 class="text-3xl font-semibold tracking-tight">
            Đăng nhập
        </h1>

        <p class="text-sm text-zinc-500 mt-2">
            Chào mừng bạn quay lại NOVA
        </p>
    </div>

    <!-- LOGIN FORM -->
    <form method="post"
          th:action="@{/login}"
          class="space-y-6">

        <!-- ERROR MESSAGE -->
        <div th:if="${param.error}"
             class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg">
            Email hoặc mật khẩu không đúng
        </div>

        <!-- LOGOUT SUCCESS -->
        <div th:if="${param.logout}"
             class="bg-green-50 border border-green-200 text-green-600 text-sm px-4 py-3 rounded-lg">
            Bạn đã đăng xuất thành công
        </div>

        <!-- EMAIL -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Email
            </label>

            <input type="email"
                   name="username"
                   placeholder="example@email.com"
                   required
                   class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">
        </div>

        <!-- PASSWORD -->
        <div>
            <label class="block text-sm font-medium mb-2">
                Mật khẩu
            </label>

            <input type="password"
                   name="password"
                   placeholder="••••••••"
                   required
                   class="w-full border border-zinc-300 dark:border-zinc-700
                          bg-white dark:bg-zinc-900
                          rounded-xl px-4 py-3
                          focus:outline-none focus:ring-2 focus:ring-black dark:focus:ring-white
                          transition">
        </div>

        <!-- REMEMBER + FORGOT -->
        <div class="flex justify-between items-center text-sm">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox"
                       name="remember-me"
                       class="rounded border-zinc-300">
                Ghi nhớ đăng nhập
            </label>

            <a th:href="@{/forgot-password}"
               class="text-zinc-500 hover:text-black dark:hover:text-white transition">
                Quên mật khẩu?
            </a>
        </div>

        <!-- SUBMIT -->
        <button type="submit"
                class="w-full bg-black text-white py-3 rounded-xl
                       hover:bg-zinc-800 transition
                       font-medium tracking-wide">
            Đăng nhập
        </button>

    </form>

    <!-- REGISTER -->
    <div class="text-center text-sm text-zinc-500 mt-8">
        Chưa có tài khoản?
        <a th:href="@{/register}"
           class="text-black dark:text-white font-medium hover:underline ml-1">
            Đăng ký ngay
        </a>
    </div>

</div>

</html>
